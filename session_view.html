<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Hub | Session Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --panel: #1a1a1a; --border: #333; --blue: #5dade2; --gray: #aaaaaa; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* VIEWER BEREICH */
        .main-content { flex: 3; display: flex; flex-direction: column; background: #000; border-right: 2px solid var(--border); }
        .viewer-box { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        iframe { width: 100%; height: 100%; border: none; }
        
        /* INTERAKTIVES TAKTIK BOARD IM SESSION VIEW */
        #tactic-container { 
            display: none; width: 960px; height: 560px; background: #fff; border: 4px solid #000; 
            border-radius: 60px; position: relative; overflow: hidden; transform: scale(0.85);
        }
        .line { position: absolute; background: #000; pointer-events: none; }
        .center-line { width: 3px; height: 100%; left: 50%; transform: translateX(-50%); }
        .center-circle { width: 40px; height: 40px; border: 3px solid #000; border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%, -50%); position: absolute; }
        .torraum { position: absolute; border: 3px solid #000; width: 120px; height: 180px; top: 50%; transform: translateY(-50%); }
        .schutzraum { position: absolute; border: 3px solid #000; width: 40px; height: 100px; top: 50%; transform: translateY(-50%); }
        .goal-box { position: absolute; width: 24px; height: 64px; border: 4px solid #000; top: 50%; transform: translateY(-50%); background: #fff; z-index: 5; }

        .player { width: 34px; height: 34px; border-radius: 50%; position: absolute; z-index: 100; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid #000; cursor: move; color: #fff; }
        .p-falcons { background: var(--red); }
        .p-opponent { background: #fff; color: #000; }
        .p-ball { width: 16px; height: 16px; background: orange; border-radius: 50%; border: 2px solid #000; }
        
        #tactic-canvas { position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 50; pointer-events: none; }
        #tactic-canvas.active { pointer-events: auto; cursor: crosshair; }

        /* SESSION NAVIGATION */
        .nav-btns { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #000; border-top: 1px solid var(--border); }
        .btn { background: var(--red); color: white; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .btn:disabled { background: #333; }

        /* TAKTIK TOOLS (Nur für Admins sichtbar) */
        .tactic-tools { display: none; background: #111; padding: 10px; gap: 10px; justify-content: center; border-bottom: 1px solid #333; }
        .tool-btn { background: #222; border: 1px solid #444; color: white; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.75rem; }
        .tool-btn.active { background: var(--red); border-color: white; }

        /* SIDEBAR */
        .side-panel { flex: 1; background: var(--panel); display: flex; flex-direction: column; min-width: 380px; }
        .info-area { padding: 20px; border-bottom: 1px solid var(--border); background: #000; }
        .clip-list { flex: 1; overflow-y: auto; padding: 10px; max-height: 25%; background: #111; }
        .clip-item { padding: 12px; background: #222; margin-bottom: 8px; border-radius: 5px; cursor: pointer; border-left: 5px solid transparent; font-size: 0.8rem; }
        .clip-item.active { border-left-color: var(--red); background: #333; }
        
        .comment-area { flex: 2; display: flex; flex-direction: column; background: #111; }
        .comment-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .mini-comment { background: #1e1e1e; padding: 12px; border-radius: 8px; border-left: 4px solid var(--red); font-size: 0.85rem; color: var(--gray); }
        .mention { color: var(--blue) !important; font-weight: bold !important; }
    </style>
</head>
<body>

<div class="main-content">
    <!-- Taktik Werkzeuge (Admin only) -->
    <div id="tactic-tools" class="tactic-tools">
        <button class="tool-btn active" id="mode-move" onclick="setTacticMode('move')">🖐️ BEWEGEN</button>
        <button class="tool-btn" id="mode-draw" onclick="setTacticMode('draw')">✏️ ZEICHNEN</button>
        <button class="tool-btn" onclick="clearTacticDraw()">🗑 LÖSCHEN</button>
        <button class="tool-btn" style="background:var(--green); color:white; font-weight:900;" onclick="updateTacticInDB()">💾 ÄNDERUNGEN SPEICHERN</button>
    </div>

    <div class="viewer-box">
        <iframe id="video-player" src="" allowfullscreen></iframe>
        
        <!-- INTERAKTIVES BOARD -->
        <div id="tactic-container">
            <div class="line center-line"></div>
            <div class="center-circle"></div>
            <div class="torraum" style="left: 120px; border-left: none;"></div>
            <div class="schutzraum" style="left: 120px; border-left: none;"></div>
            <div class="goal-box" style="left: 120px;"></div>
            <div class="torraum" style="right: 120px; border-right: none;"></div>
            <div class="schutzraum" style="right: 120px; border-right: none;"></div>
            <div class="goal-box" style="right: 120px;"></div>
            <canvas id="tactic-canvas"></canvas>
            <div id="tactic-players-layer"></div>
        </div>
    </div>
    
    <div class="nav-btns">
        <button class="btn" id="btn-prev" onclick="prevClip()">← ZURÜCK</button>
        <div id="progress-text">Lade...</div>
        <button class="btn" id="btn-next" onclick="nextClip()">WEITER →</button>
    </div>
</div>

<div class="side-panel">
    <div class="info-area">
        <h2 id="s-title">Session</h2>
        <p id="s-desc" style="font-size:0.75rem; color:#666; margin-top:5px;"></p>
    </div>
    <div class="clip-list" id="toc"></div>
    <div class="comment-area">
        <div class="comment-list" id="comment-display"></div>
        <div style="padding:15px; background:#000;">
            <textarea id="com-input" placeholder="Feedback @Nr..." style="width:100%; height:50px; background:#222; border:1px solid #444; color:white; padding:8px; box-sizing:border-box;"></textarea>
            <button class="btn" style="width:100%; margin-top:8px;" onclick="sendComment()">Senden</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const sessionId = new URLSearchParams(window.location.search).get('id');
    const user = JSON.parse(localStorage.getItem('falcons_user') || '{}');
    let currentIdx = 0, videoData = [], playerMap = {}, commentUnsubscribe = null, isAdmin = false;

    // Taktik State
    let tacticMode = 'move', isPainting = false, draggedEl = null, offset = {x:0,y:0};
    const canvas = document.getElementById('tactic-canvas');
    const ctx = canvas.getContext('2d');

    async function init() {
        const [sDoc, pSnap, adminDoc, driveRes, ytSnap, tSnap] = await Promise.all([
            db.collection("sessions").doc(sessionId).get(),
            db.collection("players").get(),
            db.collection("admins").doc(user.nr || "0").get(),
            fetch('https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec').then(r => r.json()),
            db.collection("youtube_clips").get(),
            db.collection("tactics").get()
        ]);
        
        if(user.nr === "22" || adminDoc.exists) isAdmin = true;
        pSnap.forEach(doc => { playerMap[doc.id] = doc.data().name; });

        const allMedia = [
            ...driveRes.map(v => ({ id: v.link.split('/d/')[1].split('/')[0], title: v.title, link: `https://drive.google.com/file/d/${v.link.split('/d/')[1].split('/')[0]}/preview`, type: 'drive' })),
            ...ytSnap.docs.map(d => ({ id: d.id, title: d.data().title, link: `https://www.youtube.com/embed/${d.data().ytId}?start=${d.data().startTime}&autoplay=1`, type: 'youtube' })),
            ...tSnap.docs.map(d => ({ id: d.id, title: d.data().title, type: 'tactic', tacticData: d.data() }))
        ];

        videoData = sDoc.data().videoIds.map(id => allMedia.find(m => m.id === id)).filter(m => m);
        playClip(0);
    }

    function playClip(idx) {
        currentIdx = idx;
        const m = videoData[idx];
        const vPlayer = document.getElementById('video-player');
        const tContainer = document.getElementById('tactic-container');
        const tTools = document.getElementById('tactic-tools');

        if(m.type === 'tactic') {
            vPlayer.style.display = 'none'; tContainer.style.display = 'block';
            if(isAdmin) tTools.style.display = 'flex';
            setupTacticBoard(m.tacticData);
        } else {
            tContainer.style.display = 'none'; tTools.style.display = 'none'; vPlayer.style.display = 'block';
            vPlayer.src = m.link;
        }
        renderTOC(); listenForComments(m.id);
    }

    // --- TAKTIK BOARD SETUP & LOGIK ---
    function setupTacticBoard(data) {
        const layer = document.getElementById('tactic-players-layer');
        canvas.width = 960; canvas.height = 560;
        layer.innerHTML = "";
        ctx.clearRect(0,0,960,560);

        data.players.forEach(p => {
            const el = document.createElement('div');
            el.className = 'player ' + (p.type === 'ball' ? 'p-ball' : (p.type === 'falcons' ? 'p-falcons' : 'p-opponent'));
            el.innerHTML = p.type === 'ball' ? '' : (p.type === 'falcons' ? 'F' : 'G');
            el.style.left = p.x; el.style.top = p.y;
            if(isAdmin) {
                el.onmousedown = (e) => {
                    if(tacticMode !== 'move') return;
                    draggedEl = el;
                    const rect = el.getBoundingClientRect();
                    offset.x = e.clientX - rect.left; offset.y = e.clientY - rect.top;
                };
            }
            layer.appendChild(el);
        });

        const img = new Image(); img.src = data.drawing;
        img.onload = () => ctx.drawImage(img, 0, 0);
    }

    document.addEventListener('mousemove', e => {
        if(!draggedEl || tacticMode !== 'move') return;
        const rect = document.getElementById('tactic-container').getBoundingClientRect();
        draggedEl.style.left = (e.clientX - rect.left - offset.x) + 'px';
        draggedEl.style.top = (e.clientY - rect.top - offset.y) + 'px';
    });
    document.addEventListener('mouseup', () => draggedEl = null);

    function setTacticMode(m) {
        tacticMode = m;
        document.getElementById('mode-move').classList.toggle('active', m === 'move');
        document.getElementById('mode-draw').classList.toggle('active', m === 'draw');
        canvas.classList.toggle('active', m === 'draw');
    }

    canvas.onmousedown = (e) => {
        if(tacticMode !== 'draw' || !isAdmin) return;
        isPainting = true; ctx.beginPath(); ctx.strokeStyle = "#e30613"; ctx.lineWidth = 4; ctx.lineCap = 'round';
        const rect = canvas.getBoundingClientRect(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    };
    canvas.onmousemove = (e) => {
        if(!isPainting) return;
        const rect = canvas.getBoundingClientRect(); ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top); ctx.stroke();
    };
    canvas.onmouseup = () => isPainting = false;

    async function updateTacticInDB() {
        const m = videoData[currentIdx];
        const players = [];
        document.querySelectorAll('.player').forEach(p => {
            players.push({ type: p.classList.contains('p-falcons')?'falcons':(p.classList.contains('p-ball')?'ball':'opponent'), x: p.style.left, y: p.style.top });
        });
        await db.collection("tactics").doc(m.id).update({
            players: players,
            drawing: canvas.toDataURL()
        });
        alert("Taktik-Änderungen gespeichert!");
    }

    function clearTacticDraw() { ctx.clearRect(0,0,canvas.width,canvas.height); }

    // --- KOMMENTARE & SESSIONS ---
    function renderTOC() {
        const toc = document.getElementById('toc'); toc.innerHTML = "";
        videoData.forEach((v, i) => {
            toc.innerHTML += `<div class="clip-item ${i===currentIdx?'active':''}" onclick="playClip(${i})"><strong>${i+1}.</strong> ${v.title}</div>`;
        });
    }

    function listenForComments(vid) {
        if(commentUnsubscribe) commentUnsubscribe();
        commentUnsubscribe = db.collection("comments").where("videoId", "==", vid).onSnapshot(snap => {
            const display = document.getElementById('comment-display'); display.innerHTML = "";
            let docs = []; snap.forEach(d => docs.push(d.data()));
            docs.sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
            docs.forEach(c => {
                const formatted = c.text.replace(/(@\d+ \| [^*]+|@\d+)\*/g, '<span class="mention">$1</span>');
                display.innerHTML += `<div class="mini-comment"><small>${c.author}</small><div>${formatted}</div></div>`;
            });
            display.scrollTop = display.scrollHeight;
        });
    }

    async function sendComment() {
        const input = document.getElementById('com-input'); let text = input.value.trim(); if(!text) return;
        let resolvedText = text.replace(/@(\d+)/g, (match, nr) => playerMap[nr] ? `@${nr} | ${playerMap[nr]}*` : `${match}*`);
        await db.collection("comments").add({ videoId: videoData[currentIdx].id, text: resolvedText, author: user.name, authorNr: user.nr, createdAt: firebase.firestore.FieldValue.serverTimestamp(), readBy: [], mentions: [] });
        input.value = "";
    }

    function nextClip() { if(currentIdx < videoData.length-1) playClip(currentIdx+1); }
    function prevClip() { if(currentIdx > 0) playClip(currentIdx-1); }
    init();
</script>
</body>
</html>
