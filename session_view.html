<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Hub | Session</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="falcons-init.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --panel: #1a1a1a; }
        body { font-family: 'Montserrat'; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .main-content { flex: 3; display: flex; flex-direction: column; background: #000; }
        .viewer-box { flex: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .nav-btns { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #000; border-top: 1px solid #333; }
        .btn { background: var(--red); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .side-panel { flex: 1; background: var(--panel); display: flex; flex-direction: column; min-width: 380px; }
        .clip-list { flex: 1; overflow-y: auto; padding: 10px; background: #111; }
        .clip-item { padding: 12px; background: #222; margin-bottom: 8px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .clip-item.active { border-left: 4px solid var(--red); }
    </style>
</head>
<body>
<div class="main-content">
    <div class="viewer-box"><div id="player-target" style="width:100%;height:100%"></div></div>
    <div class="nav-btns"><button class="btn" onclick="prev()">← ZURÜCK</button><div id="stat">Lade...</div><button class="btn" onclick="next()">WEITER →</button></div>
</div>
<div class="side-panel">
    <div id="clip-list" class="clip-list"></div>
    <button class="btn" style="margin:20px; background:#333;" onclick="location.href='index.html'">BEENDEN</button>
</div>

<script>
    const sessionId = new URLSearchParams(window.location.search).get('id');
    let videoData = [], currentIdx = 0, ytPlayer = null;

    async function init() {
        const [sDoc, ytSnap, driveRes] = await Promise.all([
            db.collection("sessions").doc(sessionId).get(),
            db.collection("youtube_clips").get(),
            fetch('https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec').then(r => r.json())
        ]);
        const all = [
            ...driveRes.map(v => ({ id: v.link.split('/d/')[1].split('/')[0], title: v.title, link: `https://drive.google.com/file/d/${v.link.split('/d/')[1].split('/')[0]}/preview`, type: 'drive' })),
            ...ytSnap.docs.map(d => ({ id: d.id, title: d.data().title, ytId: d.data().ytId, start: d.data().startTime, type: 'youtube' }))
        ];
        videoData = sDoc.data().videoIds.map(id => all.find(m => m.id === id)).filter(x => x);
        renderList();
        loadPlayer(0);
    }

    function loadPlayer(idx) {
        currentIdx = idx;
        const v = videoData[idx];
        document.getElementById('stat').innerText = `CLIP ${idx+1} / ${videoData.length}`;
        
        if(v.type === 'youtube') {
            if(ytPlayer) { ytPlayer.loadVideoById({videoId: v.ytId, startSeconds: v.start}); }
            else {
                window.onYouTubeIframeAPIReady = () => {
                    ytPlayer = new YT.Player('player-target', {
                        videoId: v.ytId, playerVars: { start: v.start, autoplay: 1 },
                        events: { onStateChange: e => { if(e.data === 0) next(); } }
                    });
                };
            }
        } else {
            document.getElementById('player-target').innerHTML = `<iframe src="${v.link}" style="width:100%;height:100%"></iframe>`;
        }
        updateProgress();
    }

    function next() { if(currentIdx < videoData.length-1) loadPlayer(currentIdx+1); }
    function prev() { if(currentIdx > 0) loadPlayer(currentIdx-1); }
    function renderList() {
        const l = document.getElementById('clip-list'); l.innerHTML = "";
        videoData.forEach((v,i) => { l.innerHTML += `<div class="clip-item ${i===currentIdx?'active':''}" onclick="loadPlayer(${i})">${v.title}</div>`; });
    }
    async function updateProgress() { await db.collection("progress").doc(currentUser.nr).set({ [sessionId]: currentIdx + 1 }, { merge: true }); }
    init();
</script>
</body>
</html>
