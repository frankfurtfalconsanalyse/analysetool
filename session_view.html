<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Hub | Session Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --panel: #1a1a1a; --border: #333; --blue: #5dade2; --gray: #aaaaaa; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* VIEWER BEREICH */
        .main-content { flex: 3; display: flex; flex-direction: column; background: #000; border-right: 2px solid var(--border); }
        .viewer-box { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        iframe { width: 100%; height: 100%; border: none; display: block; }
        
        /* TAKTIK RENDER AREA (Wird statt Iframe angezeigt) */
        #tactic-render { 
            display: none; width: 900px; height: 500px; background: #fff; border: 4px solid #000; 
            border-radius: 70px; position: relative; overflow: hidden; transform: scale(0.9);
        }
        .line { position: absolute; background: #000; pointer-events: none; }
        .center-line { width: 3px; height: 100%; left: 50%; transform: translateX(-50%); }
        .center-dot { width: 22px; height: 22px; background: #000; border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        .cross { position: absolute; width: 30px; height: 30px; }
        .cross::before { content: ""; position: absolute; background: #000; width: 100%; height: 2.5px; top: 50%; left: 0; }
        .cross::after { content: ""; position: absolute; background: #000; width: 2.5px; height: 100%; left: 50%; top: 0; }
        .goal-area { position: absolute; border: 3px solid #000; }
        .area-large { width: 110px; height: 130px; top: 50%; transform: translateY(-50%); }
        .area-small { width: 25px; height: 70px; top: 50%; transform: translateY(-50%); }
        .player { width: 36px; height: 36px; border-radius: 50%; position: absolute; z-index: 100; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid #000; color: #fff; font-size: 0.8rem; }
        .p-falcons { background: var(--red); }
        .p-opponent { background: #fff; color: #000; }
        .p-ball { width: 16px; height: 16px; background: orange; border-radius: 50%; border: 2px solid #000; }
        #tactic-canvas { position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 50; }

        /* NAVIGATION */
        .nav-btns { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #000; border-top: 1px solid var(--border); }
        .btn { background: var(--red); color: white; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 0.8rem; }
        .btn:disabled { background: #333; }

        /* SIDEBAR */
        .side-panel { flex: 1; background: var(--panel); display: flex; flex-direction: column; min-width: 380px; }
        .info-area { padding: 20px; border-bottom: 1px solid var(--border); background: #000; }
        .info-area h2 { margin: 0; font-size: 1.1rem; color: var(--red); text-transform: uppercase; }
        
        .clip-list { flex: 1; overflow-y: auto; padding: 10px; border-bottom: 1px solid var(--border); max-height: 30%; background: #111; }
        .clip-item { padding: 12px; background: #222; margin-bottom: 8px; border-radius: 5px; cursor: pointer; border-left: 5px solid transparent; font-size: 0.8rem; }
        .clip-item.active { border-left-color: var(--red); background: #333; }

        .comment-area { flex: 2; display: flex; flex-direction: column; background: #111; }
        .comment-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .mini-comment { background: #1e1e1e; padding: 12px; border-radius: 8px; border-left: 4px solid var(--red); font-size: 0.85rem; color: var(--gray); line-height: 1.4; }
        .mini-comment small { color: var(--red); font-weight: 900; display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.65rem; }
        .mention { color: var(--blue) !important; font-weight: bold !important; }
        .timestamp { background: var(--blue); color: white; padding: 2px 5px; border-radius: 3px; cursor: pointer; font-weight: bold; }
        .hub-check-btn { background: #28a745; color: white; border: none; border-radius: 3px; padding: 2px 6px; cursor: pointer; font-size: 0.6rem; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="viewer-box">
        <!-- VIDEO PLAYER -->
        <iframe id="video-player" src="" allowfullscreen></iframe>
        
        <!-- TAKTIK RENDERER -->
        <div id="tactic-render">
            <div class="line center-line"></div>
            <div class="center-dot"></div>
            <div class="cross" style="top: 15%; left: 10%;"></div>
            <div class="cross" style="bottom: 15%; left: 10%;"></div>
            <div class="cross" style="top: 15%; right: 10%;"></div>
            <div class="cross" style="bottom: 15%; right: 10%;"></div>
            <div class="goal-area area-large" style="left:20px; border-left:none;"></div>
            <div class="goal-area area-small" style="left:20px; border-left:none;"></div>
            <div class="goal-area area-large" style="right:20px; border-right:none;"></div>
            <div class="goal-area area-small" style="right:20px; border-right:none;"></div>
            <canvas id="tactic-canvas"></canvas>
            <div id="tactic-players"></div>
        </div>
    </div>
    
    <div class="nav-btns">
        <button class="btn" id="btn-prev" onclick="prevClip()">← ZURÜCK</button>
        <div id="progress-text">Lade...</div>
        <button class="btn" id="btn-next" onclick="nextClip()">WEITER →</button>
    </div>
</div>

<div class="side-panel">
    <div class="info-area">
        <h2 id="s-title">Session</h2>
        <p id="s-desc" style="font-size:0.75rem; color:#666; margin-top:5px;"></p>
    </div>
    <div class="clip-list" id="toc"></div>
    <div class="comment-area">
        <div class="comment-list" id="comment-display"></div>
        <div style="padding:15px; background:#000;">
            <textarea id="com-input" placeholder="Feedback schreiben (@Nr)..." style="width:100%; height:50px; background:#222; border:1px solid #444; color:white; padding:8px; box-sizing:border-box;"></textarea>
            <button class="btn" style="width:100%; margin-top:8px;" onclick="sendComment()">Senden</button>
        </div>
    </div>
    <button class="btn" style="margin:10px; background:#333;" onclick="location.href='index.html'">HUB BEENDEN</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const sessionId = new URLSearchParams(window.location.search).get('id');
    const user = JSON.parse(localStorage.getItem('falcons_user') || '{}');
    let currentIdx = 0, videoData = [], playerMap = {}, commentUnsubscribe = null;

    async function init() {
        if(!sessionId) return location.href='index.html';

        const [sDoc, pSnap, driveRes, ytSnap, tSnap] = await Promise.all([
            db.collection("sessions").doc(sessionId).get(),
            db.collection("players").get(),
            fetch('https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec').then(r => r.json()),
            db.collection("youtube_clips").get(),
            db.collection("tactics").get()
        ]);
        
        const session = sDoc.data();
        document.getElementById('s-title').innerText = session.title;
        document.getElementById('s-desc').innerText = session.description || "";
        pSnap.forEach(doc => { playerMap[doc.id] = doc.data().name; });

        const allMedia = [
            ...driveRes.map(v => ({ id: v.link.split('/d/')[1].split('/')[0], title: v.title, link: `https://drive.google.com/file/d/${v.link.split('/d/')[1].split('/')[0]}/preview`, type: 'drive' })),
            ...ytSnap.docs.map(d => ({ id: d.id, title: d.data().title, link: `https://www.youtube.com/embed/${d.data().ytId}?start=${d.data().startTime}&autoplay=1`, type: 'youtube', ytId: d.data().ytId })),
            ...tSnap.docs.map(d => ({ id: d.id, title: d.data().title, type: 'tactic', data: d.data() }))
        ];

        videoData = session.videoIds.map(id => allMedia.find(m => m.id === id)).filter(m => m);
        playClip(0);
    }

    async function playClip(idx) {
        currentIdx = idx;
        const m = videoData[idx];
        const vPlayer = document.getElementById('video-player');
        const tRender = document.getElementById('tactic-render');

        if(m.type === 'tactic') {
            vPlayer.style.display = 'none';
            tRender.style.display = 'block';
            renderTactic(m.data);
        } else {
            tRender.style.display = 'none';
            vPlayer.style.display = 'block';
            vPlayer.src = m.link;
        }

        document.getElementById('progress-text').innerText = `CLIP ${idx+1} / ${videoData.length}`;
        document.getElementById('btn-prev').disabled = (idx === 0);
        document.getElementById('btn-next').disabled = (idx === videoData.length - 1);

        renderTOC();
        listenForComments(m.id);
        updateProgress();
    }

    function renderTactic(data) {
        const playerLayer = document.getElementById('tactic-players');
        const canvas = document.getElementById('tactic-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 900; canvas.height = 500;
        
        playerLayer.innerHTML = "";
        ctx.clearRect(0,0,900,500);

        // 1. Spieler zeichnen
        data.players.forEach(p => {
            const el = document.createElement('div');
            el.className = 'player ' + (p.type === 'ball' ? 'p-ball' : (p.type === 'falcons' ? 'p-falcons' : 'p-opponent'));
            el.innerHTML = p.type === 'ball' ? '' : (p.type === 'falcons' ? 'F' : 'G');
            el.style.left = p.x; el.style.top = p.y;
            playerLayer.appendChild(el);
        });

        // 2. Zeichnung laden
        const img = new Image();
        img.src = data.drawing;
        img.onload = () => ctx.drawImage(img, 0, 0);
    }

    function renderTOC() {
        const toc = document.getElementById('toc'); toc.innerHTML = "";
        videoData.forEach((v, i) => {
            toc.innerHTML += `<div class="clip-item ${i===currentIdx?'active':''}" onclick="playClip(${i})"><strong>${i+1}.</strong> ${v.title}</div>`;
        });
    }

    function listenForComments(vid) {
        if(commentUnsubscribe) commentUnsubscribe();
        commentUnsubscribe = db.collection("comments").where("videoId", "==", vid).onSnapshot(snap => {
            const display = document.getElementById('comment-display'); display.innerHTML = "";
            let docs = []; snap.forEach(d => docs.push({id: d.id, ...d.data()}));
            docs.sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
            docs.forEach(c => {
                const isRead = (c.readBy || []).includes(user.nr), isMentioned = (c.mentions || []).includes(user.nr);
                const formatted = c.text.replace(/(@\d+ \| [^*]+|@\d+)\*/g, '<span class="mention">$1</span>');
                let checkBtn = isMentioned ? `<button class="hub-check-btn ${isRead?'uncheck':''}" onclick="markRead('${c.id}', ${isRead})">${isRead?'↺':'✓'}</button>` : '';
                display.innerHTML += `<div class="mini-comment ${isRead ? 'is-read' : ''}"><small><span>${c.author}</span> ${checkBtn}</small><div>${formatted}</div></div>`;
            });
            display.scrollTop = display.scrollHeight;
        });
    }

    async function sendComment() {
        const input = document.getElementById('com-input'); let text = input.value.trim(); if(!text) return;
        let resolvedText = text.replace(/@(\d+)/g, (match, nr) => playerMap[nr] ? `@${nr} | ${playerMap[nr]}*` : `${match}*`);
        await db.collection("comments").add({ videoId: videoData[currentIdx].id, text: resolvedText, author: user.name, authorNr: user.nr, createdAt: firebase.firestore.FieldValue.serverTimestamp(), mentions: [], readBy: [] });
        input.value = "";
    }

    async function markRead(cid, isReadNow) {
        const ref = db.collection("comments").doc(cid);
        if(isReadNow) await ref.update({ readBy: firebase.firestore.FieldValue.arrayRemove(user.nr) });
        else await ref.update({ readBy: firebase.firestore.FieldValue.arrayUnion(user.nr) });
    }

    async function updateProgress() {
        if(!user.nr) return;
        await db.collection("progress").doc(user.nr).set({ [sessionId]: currentIdx + 1 }, { merge: true });
    }

    function nextClip() { if(currentIdx < videoData.length-1) playClip(currentIdx+1); }
    function prevClip() { if(currentIdx > 0) playClip(currentIdx-1); }
    init();
</script>
</body>
</html>
