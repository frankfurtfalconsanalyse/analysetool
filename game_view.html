<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons | Game Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- YouTube API Script -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --panel: #161616; --blue: #3498db; }
        body { font-family: 'Montserrat'; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* VIDEO BEREICH */
        .video-side { flex: 2.5; background: #000; position: relative; display: flex; flex-direction: column; }
        #yt-player { width: 100%; height: 100%; border: none; }
        #block-warning { display: none; background: #d35400; color: white; padding: 10px; text-align: center; font-weight: bold; font-size: 0.8rem; }

        /* SEITENLEISTE */
        .comment-side { flex: 1; min-width: 360px; background: var(--panel); border-left: 2px solid #333; display: flex; flex-direction: column; }
        .header { padding: 20px; border-bottom: 2px solid var(--red); background: #000; }
        .btn-back { background: #333; color: #ccc; border: 1px solid #444; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 15px; transition: 0.2s; }
        .btn-back:hover { color: white; border-color: white; }

        .player-select { width: 100%; padding: 12px; background: #222; color: white; border: 1px solid var(--red); border-radius: 5px; margin-bottom: 15px; font-family: inherit; font-weight: bold; }
        
        /* KOMMENTAR LISTE */
        .comment-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #111; }
        .game-comment { background: #1e1e1e; padding: 15px; border-radius: 10px; border-left: 4px solid var(--red); position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .game-comment small { color: var(--red); font-weight: 900; font-size: 0.65rem; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* ZEITSTEMPEL */
        .timestamp { background: var(--blue); color: white; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-weight: 900; font-size: 0.8rem; margin-right: 5px; display: inline-block; transition: 0.2s; }
        .timestamp:hover { background: white; color: var(--blue); }

        .comment-text { color: #bbb; font-size: 0.9rem; line-height: 1.5; }

        /* INPUT AREA */
        .input-area { padding: 20px; border-top: 1px solid #333; background: #000; }
        textarea { width: 100%; height: 70px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; padding: 12px; box-sizing: border-box; resize: none; font-family: inherit; margin-bottom: 10px; }
        .btn-send { background: var(--red); color: white; border: none; width: 100%; padding: 12px; border-radius: 5px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        
        .del-com { position: absolute; right: 12px; top: 12px; color: #444; cursor: pointer; border:none; background:none; font-size: 1rem; }
        .del-com:hover { color: var(--red); }
    </style>
</head>
<body>

<div class="video-side">
    <div id="block-warning">⚠️ Einbetten deaktiviert. Zeitstempel öffnen YouTube im neuen Tab.</div>
    <div id="yt-player"></div>
</div>

<div class="comment-side">
    <div class="header">
        <button class="btn-back" onclick="location.href='games.html'">← Zurück zum Hub</button>
        <h3 id="game-title" style="margin:0 0 15px 0; text-transform: uppercase; letter-spacing: 1px;">Spiel-Analyse</h3>
        
        <select id="admin-player-select" class="player-select" style="display:none;" onchange="loadGameComments()">
            <option value="">Spieler auswählen...</option>
        </select>
        <div id="player-info-view" style="font-size: 0.8rem; color: #888; font-weight: bold;"></div>
    </div>

    <div class="comment-list" id="comment-display"></div>

    <div class="input-area" id="admin-input-area" style="display:none;">
        <textarea id="com-text" placeholder="Privates Feedback... Nutze H:M:S (z.B. 0:45:12)"></textarea>
        <button class="btn-send" onclick="sendGameComment()">Feedback senden</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const gameId = new URLSearchParams(window.location.search).get('id');
    const user = JSON.parse(localStorage.getItem('falcons_user') || '{}');
    
    let isAdmin = false;
    let ytPlayer = null;
    let currentYtId = "";
    let isVideoBlocked = false;

    async function init() {
        if(!gameId) return location.href='games.html';

        const gameDoc = await db.collection("games").doc(gameId).get();
        const gd = gameDoc.data();
        currentYtId = gd.ytId;
        document.getElementById('game-title').innerText = gd.title;

        const adminDoc = await db.collection("admins").doc(user.nr).get();
        if(user.nr === "22" || adminDoc.exists) {
            isAdmin = true;
            document.getElementById('admin-player-select').style.display = "block";
            document.getElementById('admin-input-area').style.display = "block";
            const pSnap = await db.collection("players").get();
            pSnap.forEach(d => document.getElementById('admin-player-select').innerHTML += `<option value="${d.id}">#${d.id} ${d.data().name}</option>`);
        } else {
            document.getElementById('player-info-view').innerText = `Feedback für ${user.name}`;
            loadGameComments();
        }

        onYouTubeIframeAPIReady();
    }

    function onYouTubeIframeAPIReady() {
        if(!currentYtId) return;
        ytPlayer = new YT.Player('yt-player', {
            videoId: currentYtId,
            playerVars: { 'autoplay': 0, 'rel': 0, 'enablejsapi': 1 },
            events: {
                'onError': (e) => {
                    if(e.data == 101 || e.data == 150) {
                        isVideoBlocked = true;
                        document.getElementById('block-warning').style.display = 'block';
                    }
                }
            }
        });
    }

    // Zeitstempel aus Text in Sekunden umwandeln für Sortierung
    function getSecondsFromText(text) {
        const match = text.match(/(\d{1,2}):(\d{2}):(\d{2})/);
        if(!match) return 0;
        return (parseInt(match[1]) * 3600) + (parseInt(match[2]) * 60) + parseInt(match[3]);
    }

    function jumpTo(sec) {
        if(isVideoBlocked) {
            window.open(`https://www.youtube.com/watch?v=${currentYtId}&t=${sec}s`, '_blank');
        } else {
            ytPlayer.seekTo(sec, true);
            ytPlayer.playVideo();
        }
    }

    async function sendGameComment() {
        const targetNr = document.getElementById('admin-player-select').value;
        const text = document.getElementById('com-text').value.trim();
        if(!targetNr || !text) return alert("Spieler und Text fehlen!");

        await db.collection("game_comments").add({
            gameId, targetNr, text, author: user.name, authorNr: user.nr, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('com-text').value = "";
    }

    function loadGameComments() {
        const targetNr = isAdmin ? document.getElementById('admin-player-select').value : user.nr;
        const display = document.getElementById('comment-display');
        if(!targetNr) return display.innerHTML = "";

        db.collection("game_comments")
          .where("gameId", "==", gameId)
          .where("targetNr", "==", targetNr)
          .onSnapshot(snap => {
              display.innerHTML = "";
              let docs = [];
              snap.forEach(d => docs.push({id: d.id, ...d.data()}));

              // SORTIERUNG NACH ZEITSTEMPEL (Chronologisch)
              docs.sort((a, b) => getSecondsFromText(a.text) - getSecondsFromText(b.text));

              docs.forEach(c => {
                  const formatted = c.text.replace(/(\d{1,2}):(\d{2}):(\d{2})/g, (match, h, m, s) => {
                      const totalSec = (parseInt(h)*3600) + (parseInt(m)*60) + parseInt(s);
                      return `<span class="timestamp" onclick="jumpTo(${totalSec})">${match}</span>`;
                  });
                  const del = isAdmin ? `<button class="del-com" onclick="deleteComment('${c.id}')">🗑</button>` : '';
                  
                  display.innerHTML += `
                    <div class="game-comment">
                        <small>VON: ${c.author} (#${c.authorNr})</small>
                        <div class="comment-text">${formatted}</div>
                        ${del}
                    </div>`;
              });
          });
    }

    async function deleteComment(id) { if(confirm("Löschen?")) await db.collection("game_comments").doc(id).delete(); }

    init();
</script>
</body>
</html>
