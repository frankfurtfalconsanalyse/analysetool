<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons | Game Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --panel: #161616; --blue: #3498db; }
        body { font-family: 'Montserrat'; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .video-side { flex: 2.5; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .comment-side { flex: 1; min-width: 350px; background: var(--panel); border-left: 2px solid #333; display: flex; flex-direction: column; }
        .header { padding: 20px; border-bottom: 2px solid var(--red); background: #000; }
        .player-select { width: 100%; padding: 10px; background: #222; color: white; border: 1px solid var(--red); border-radius: 5px; margin-bottom: 10px; }
        .comment-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .game-comment { background: #222; padding: 12px; border-radius: 8px; border-left: 4px solid var(--red); font-size: 0.9rem; color: #ccc; }
        .timestamp { background: var(--blue); color: white; padding: 2px 6px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .input-area { padding: 15px; border-top: 1px solid #333; }
        textarea { width: 100%; height: 60px; background: #111; border: 1px solid #444; color: white; border-radius: 5px; padding: 8px; box-sizing: border-box; }
        .btn { background: var(--red); color: white; border: none; width: 100%; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<div class="video-side">
    <iframe id="yt-player" src="" allow="autoplay; fullscreen"></iframe>
</div>

<div class="comment-side">
    <div class="header">
        <h3 id="game-title">Spiel-Analyse</h3>
        <!-- NUR FÜR ADMINS SICHTBAR -->
        <select id="admin-player-select" class="player-select" style="display:none;" onchange="loadGameComments()">
            <option value="">Spieler auswählen...</option>
        </select>
        <div id="player-info-view" style="font-size: 0.8rem; color: #888;"></div>
    </div>

    <div class="comment-list" id="comment-display"></div>

    <div class="input-area" id="admin-input-area" style="display:none;">
        <textarea id="com-text" placeholder="Feedback schreiben... Zeitstempel H:M:S eingeben (z.B. 0:12:05)"></textarea>
        <button class="btn" onclick="sendGameComment()">FEEDBACK SENDEN</button>
        <button class="btn" style="background:#333; margin-top:10px;" onclick="location.href='games.html'">ZURÜCK</button>
    </div>
    <div class="input-area" id="player-back-area">
        <button class="btn" onclick="location.href='games.html'">ZURÜCK ZUM HUB</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const gameId = new URLSearchParams(window.location.search).get('id');
    const user = JSON.parse(localStorage.getItem('falcons_user') || '{}');
    let isAdmin = false;

    async function init() {
        const gameDoc = await db.collection("games").doc(gameId).get();
        const g = gameDoc.data();
        document.getElementById('game-title').innerText = g.title;
        document.getElementById('yt-player').src = `https://www.youtube.com/embed/${g.ytId}?enablejsapi=1&rel=0`;

        const adminDoc = await db.collection("admins").doc(user.nr).get();
        if(user.nr === "22" || adminDoc.exists) {
            isAdmin = true;
            document.getElementById('admin-player-select').style.display = "block";
            document.getElementById('admin-input-area').style.display = "block";
            await loadPlayerList();
        } else {
            document.getElementById('player-info-view').innerText = `Dein Feedback (${user.name})`;
            loadGameComments();
        }
    }

    async function loadPlayerList() {
        const snap = await db.collection("players").get();
        const sel = document.getElementById('admin-player-select');
        snap.forEach(doc => {
            sel.innerHTML += `<option value="${doc.id}">#${doc.id} ${doc.data().name}</option>`;
        });
    }

    async function sendGameComment() {
        const targetNr = document.getElementById('admin-player-select').value;
        let text = document.getElementById('com-text').value.trim();
        if(!targetNr || !text) return alert("Spieler und Text wählen!");

        await db.collection("game_comments").add({
            gameId, targetNr, text, authorNr: user.nr, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('com-text').value = "";
    }

    function loadGameComments() {
        const targetNr = isAdmin ? document.getElementById('admin-player-select').value : user.nr;
        if(!targetNr) return document.getElementById('comment-display').innerHTML = "";

        db.collection("game_comments")
          .where("gameId", "==", gameId)
          .where("targetNr", "==", targetNr)
          .onSnapshot(snap => {
              const display = document.getElementById('comment-display');
              display.innerHTML = "";
              let docs = []; snap.forEach(d => docs.push(d.data()));
              docs.sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));

              docs.forEach(c => {
                  // ZEITSTEMPEL PARSING: H:M:S -> Clickable Blue Span
                  const formatted = c.text.replace(/(\d{1,2}):(\d{2}):(\d{2})/g, (match, h, m, s) => {
                      const totalSec = (parseInt(h)*3600) + (parseInt(m)*60) + parseInt(s);
                      return `<span class="timestamp" onclick="jumpTo(${totalSec})">${match}</span>`;
                  });
                  display.innerHTML += `<div class="game-comment">${formatted}</div>`;
              });
              display.scrollTop = display.scrollHeight;
          });
    }

    function jumpTo(sec) {
        const iframe = document.getElementById('yt-player');
        const currentSrc = iframe.src.split('?')[0];
        iframe.src = `${currentSrc}?start=${sec}&autoplay=1&enablejsapi=1`;
    }

    init();
</script>
</body>
</html>
