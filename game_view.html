<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons | Game Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --panel: #161616; --blue: #3498db; }
        body { font-family: 'Montserrat'; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .video-side { flex: 2.5; background: #000; position: relative; display: flex; flex-direction: column; }
        #yt-player { width: 100%; height: 100%; border: none; }

        .comment-side { flex: 1; min-width: 360px; background: var(--panel); border-left: 2px solid #333; display: flex; flex-direction: column; }
        .header { padding: 20px; border-bottom: 2px solid var(--red); background: #000; }
        .btn-back { background: #333; color: #ccc; border: 1px solid #444; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 15px; transition: 0.2s; }

        /* REGLER DESIGN */
        .mode-switch { display: flex; background: #222; border-radius: 5px; padding: 3px; margin-bottom: 15px; border: 1px solid #444; }
        .mode-btn { flex: 1; padding: 8px; border: none; background: none; color: #777; cursor: pointer; font-weight: bold; font-size: 0.65rem; text-transform: uppercase; }
        .mode-btn.active { background: var(--red); color: white; border-radius: 3px; }

        .comment-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #111; }
        .game-comment { background: #1e1e1e; padding: 15px; border-radius: 10px; border-left: 4px solid var(--red); position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .game-comment small { color: var(--red); font-weight: 900; font-size: 0.65rem; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .timestamp { background: var(--blue); color: white; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-weight: 900; font-size: 0.8rem; margin-right: 5px; display: inline-block; }

        .input-area { padding: 20px; border-top: 1px solid #333; background: #000; }
        textarea { width: 100%; height: 70px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; padding: 12px; box-sizing: border-box; resize: none; font-family: inherit; margin-bottom: 10px; }
        .btn-send { background: var(--red); color: white; border: none; width: 100%; padding: 12px; border-radius: 5px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .del-com { position: absolute; right: 12px; top: 12px; color: #444; cursor: pointer; border:none; background:none; font-size: 1rem; }
    </style>
</head>
<body>

<div class="video-side"><div id="yt-player"></div></div>

<div class="comment-side">
    <div class="header">
        <button class="btn-back" onclick="location.href='games.html'">← Zurück zum Hub</button>
        <h3 id="game-title" style="margin:0 0 15px 0; text-transform: uppercase; letter-spacing: 1px; font-size:1rem;">Spiel-Analyse</h3>
        
        <div class="mode-switch">
            <button class="mode-btn active" id="btn-mode-events" onclick="switchMode('events')">Ereignisse</button>
            <button class="mode-btn" id="btn-mode-comments" onclick="switchMode('comments')">Indiv. Feedback</button>
        </div>

        <select id="admin-player-select" style="display:none; width:100%; padding:10px; background:#222; color:white; border:1px solid var(--red); border-radius:5px;" onchange="loadGameComments()">
            <option value="">Spieler auswählen...</option>
        </select>
    </div>

    <div class="comment-list" id="comment-display"></div>

    <div class="input-area" id="admin-area" style="display:none;">
        <div id="form-events">
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <select id="ev-type" style="flex:1; background:#222; color:white; border:1px solid #444; padding:5px; border-radius:5px;">
                    <option value="goal">🦅 FALCONS TOR</option>
                    <option value="conceded">🥅 GEGENTOR</option>
                    <option value="pp">🔵 ÜBERZAHL</option>
                    <option value="pk">🟠 UNTERZAHL</option>
                    <option value="other">⚙️ SONSTIGES</option>
                </select>
                <input type="text" id="ev-time" placeholder="H:M:S" style="width:80px; background:#222; color:white; border:1px solid #444; padding:5px; border-radius:5px;">
            </div>
            <textarea id="ev-desc" placeholder="Details zum Ereignis..."></textarea>
            <button class="btn-send" onclick="sendGameEvent()">Ereignis speichern</button>
        </div>
        <div id="form-comments" style="display:none;">
            <textarea id="com-text" placeholder="Privates Feedback (H:M:S nutzen)..."></textarea>
            <button class="btn-send" onclick="sendGameComment()">Feedback senden</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const gameId = new URLSearchParams(window.location.search).get('id'), user = JSON.parse(localStorage.getItem('falcons_user') || '{}');
    let isAdmin = false, ytPlayer = null, currentYtId = "";

    async function init() {
        if(!gameId) return location.href='games.html';
        const gameDoc = await db.collection("games").doc(gameId).get();
        currentYtId = gameDoc.data().ytId;
        document.getElementById('game-title').innerText = gameDoc.data().title;
        
        if(user.nr) await db.collection("game_views").doc(user.nr).set({ [gameId]: true }, { merge: true });

        const adminDoc = await db.collection("admins").doc(user.nr).get();
        if(user.nr === "22" || adminDoc.exists) {
            isAdmin = true; document.getElementById('admin-area').style.display = "block";
            document.getElementById('admin-player-select').style.display = "block";
            const pSnap = await db.collection("players").get();
            pSnap.forEach(d => document.getElementById('admin-player-select').innerHTML += `<option value="${d.id}">#${d.id} ${d.data().name}</option>`);
        }
        const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api"; document.head.appendChild(tag);
        switchMode('events');
    }

    window.onYouTubeIframeAPIReady = () => {
        ytPlayer = new YT.Player('yt-player', { videoId: currentYtId, playerVars: { 'enablejsapi': 1, 'origin': window.location.origin } });
    };

    function switchMode(mode) {
        document.getElementById('btn-mode-events').classList.toggle('active', mode === 'events');
        document.getElementById('btn-mode-comments').classList.toggle('active', mode === 'comments');
        if(isAdmin) {
            document.getElementById('form-events').style.display = mode === 'events' ? 'block' : 'none';
            document.getElementById('form-comments').style.display = mode === 'comments' ? 'block' : 'none';
        }
        if(mode === 'events') loadGameEvents(); else loadGameComments();
    }

    function jumpTo(sec) { ytPlayer.seekTo(sec, true); ytPlayer.playVideo(); }
    function parseTimeToSec(t) { const m = t.match(/(\d{1,2}):(\d{2}):(\d{2})/); return m ? (parseInt(m[1])*3600) + (parseInt(m[2])*60) + parseInt(m[3]) : 0; }

    async function sendGameEvent() {
        const type = document.getElementById('ev-type').value, time = document.getElementById('ev-time').value, desc = document.getElementById('ev-desc').value;
        await db.collection("game_events").add({ gameId, type, time, desc, sec: parseTimeToSec(time), createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById('ev-time').value = ""; document.getElementById('ev-desc').value = "";
    }

    function loadGameEvents() {
        db.collection("game_events").where("gameId", "==", gameId).onSnapshot(snap => {
            const display = document.getElementById('comment-display'); display.innerHTML = "";
            let docs = []; snap.forEach(d => docs.push({id: d.id, ...d.data()}));
            docs.sort((a,b) => a.sec - b.sec);
            const icons = { goal: "🦅", conceded: "🥅", pp: "🔵", pk: "🟠", other: "⚙️" }, names = { goal: "FALCONS TOR", conceded: "GEGENTOR", pp: "ÜBERZAHL", pk: "UNTERZAHL", other: "SONSTIGES" };
            docs.forEach(e => {
                display.innerHTML += `<div class="game-comment" onclick="jumpTo(${e.sec})" style="cursor:pointer;"><small>${icons[e.type]} ${names[e.type]} - ${e.time}</small><div style="color:#bbb; font-size:0.9rem;">${e.desc}</div>${isAdmin?`<button class="del-com" onclick="event.stopPropagation(); deleteDoc('game_events','${e.id}')">🗑</button>`:''}</div>`;
            });
        });
    }

    async function sendGameComment() {
        const nr = document.getElementById('admin-player-select').value, text = document.getElementById('com-text').value;
        await db.collection("game_comments").add({ gameId, targetNr: nr, text, author: user.name, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById('com-text').value = "";
    }

    function loadGameComments() {
        const nr = isAdmin ? document.getElementById('admin-player-select').value : user.nr;
        const display = document.getElementById('comment-display');
        if(!nr) { display.innerHTML = "Wähle einen Spieler..."; return; }
        db.collection("game_comments").where("gameId", "==", gameId).where("targetNr", "==", nr).onSnapshot(snap => {
            display.innerHTML = "";
            let docs = []; snap.forEach(d => docs.push({id: d.id, ...d.data()}));
            docs.sort((a,b) => parseTimeToSec(a.text) - parseTimeToSec(b.text));
            docs.forEach(c => {
                const formatted = c.text.replace(/(\d{1,2}):(\d{2}):(\d{2})/g, (m) => `<span class="timestamp" onclick="jumpTo(${parseTimeToSec(m)})">${m}</span>`);
                display.innerHTML += `<div class="game-comment"><small>VON: ${c.author}</small><div style="color:#bbb; font-size:0.9rem;">${formatted}</div>${isAdmin?`<button class="del-com" onclick="deleteDoc('game_comments','${c.id}')">🗑</button>`:''}</div>`;
            });
        });
    }

    async function deleteDoc(col, id) { if(confirm("Löschen?")) await db.collection(col).doc(id).delete(); }
    init();
</script>
</body>
</html>
