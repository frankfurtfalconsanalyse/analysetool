<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons | Game Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- YouTube API Script -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --panel: #161616; --blue: #3498db; }
        body { font-family: 'Montserrat'; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .video-side { flex: 2.5; background: #000; position: relative; display: flex; flex-direction: column; }
        #yt-player { width: 100%; height: 100%; border: none; }
        
        /* Warnmeldung falls blockiert */
        #block-warning { display: none; background: orange; color: black; padding: 10px; text-align: center; font-weight: bold; font-size: 0.8rem; }

        .comment-side { flex: 1; min-width: 350px; background: var(--panel); border-left: 2px solid #333; display: flex; flex-direction: column; }
        .header { padding: 20px; border-bottom: 2px solid var(--red); background: #000; }
        .btn-back-main { background: #333; color: #aaa; border: 1px solid #444; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 15px; }
        .player-select { width: 100%; padding: 10px; background: #222; color: white; border: 1px solid var(--red); border-radius: 5px; margin-bottom: 10px; font-family: inherit; }
        
        .comment-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .game-comment { background: #222; padding: 12px; border-radius: 8px; border-left: 4px solid var(--red); position: relative; font-size: 0.9rem; }
        .game-comment small { color: var(--red); font-weight: bold; font-size: 0.65rem; display: block; margin-bottom: 5px; text-transform: uppercase; }
        
        /* ZEITSTEMPEL DESIGN */
        .timestamp { background: var(--blue); color: white; padding: 2px 6px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .timestamp:hover { background: #2980b9; }

        .input-area { padding: 15px; border-top: 1px solid #333; background: #000; }
        textarea { width: 100%; height: 60px; background: #111; border: 1px solid #444; color: white; border-radius: 5px; padding: 10px; box-sizing: border-box; resize: none; }
        .btn-send { background: var(--red); color: white; border: none; width: 100%; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 8px; text-transform: uppercase; }
        .del-com { position: absolute; right: 10px; top: 10px; color: #444; cursor: pointer; border:none; background:none; }
    </style>
</head>
<body>

<div class="video-side">
    <div id="block-warning">⚠️ Dieses Video erlaubt kein Einbetten. Zeitstempel öffnen sich in neuem Tab.</div>
    <div id="yt-player"></div>
</div>

<div class="comment-side">
    <div class="header">
        <button class="btn-back-main" onclick="location.href='games.html'">← ZURÜCK</button>
        <h3 id="game-title" style="margin:0 0 10px 0; font-size:1.1rem; text-transform: uppercase;">Spiel-Analyse</h3>
        
        <select id="admin-player-select" class="player-select" style="display:none;" onchange="loadGameComments()">
            <option value="">Spieler wählen...</option>
        </select>
        <div id="player-info-view" style="font-size: 0.8rem; color: #888;"></div>
    </div>

    <div class="comment-list" id="comment-display"></div>

    <div class="input-area" id="admin-input-area" style="display:none;">
        <textarea id="com-text" placeholder="Privates Feedback... (Tippe Zeiten wie 0:12:05)"></textarea>
        <button class="btn-send" onclick="sendGameComment()">Senden</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const gameId = new URLSearchParams(window.location.search).get('id');
    const user = JSON.parse(localStorage.getItem('falcons_user') || '{}');
    
    let isAdmin = false;
    let ytPlayer = null;
    let currentYtId = "";
    let isVideoBlocked = false;

    async function init() {
        const gameDoc = await db.collection("games").doc(gameId).get();
        const gd = gameDoc.data();
        currentYtId = gd.ytId;
        document.getElementById('game-title').innerText = gd.title;

        // Admin Check
        const adminDoc = await db.collection("admins").doc(user.nr).get();
        if(user.nr === "22" || adminDoc.exists) {
            isAdmin = true;
            document.getElementById('admin-player-select').style.display = "block";
            document.getElementById('admin-input-area').style.display = "block";
            const pSnap = await db.collection("players").get();
            pSnap.forEach(d => document.getElementById('admin-player-select').innerHTML += `<option value="${d.id}">#${d.id} ${d.data().name}</option>`);
        } else {
            document.getElementById('player-info-view').innerText = `Feedback für ${user.name}`;
            loadGameComments();
        }

        // YouTube Player initialisieren
        onYouTubeIframeAPIReady();
    }

    // YOUTUBE API SETUP
    function onYouTubeIframeAPIReady() {
        if(!currentYtId) return;
        ytPlayer = new YT.Player('yt-player', {
            videoId: currentYtId,
            playerVars: { 'autoplay': 0, 'rel': 0, 'enablejsapi': 1 },
            events: {
                'onError': (e) => {
                    // Fehler 101 & 150 bedeuten "Inhaber verbietet Einbetten"
                    if(e.data == 101 || e.data == 150) {
                        isVideoBlocked = true;
                        document.getElementById('block-warning').style.display = 'block';
                    }
                }
            }
        });
    }

    function jumpTo(sec) {
        if(isVideoBlocked) {
            // Falls blockiert: Neuen Tab öffnen
            window.open(`https://www.youtube.com/watch?v=${currentYtId}&t=${sec}s`, '_blank');
        } else {
            // Falls ok: Im Player springen
            ytPlayer.seekTo(sec, true);
            ytPlayer.playVideo();
        }
    }

    async function sendGameComment() {
        const targetNr = document.getElementById('admin-player-select').value;
        const text = document.getElementById('com-text').value.trim();
        if(!targetNr || !text) return alert("Fehler!");
        await db.collection("game_comments").add({
            gameId, targetNr, text, author: user.name, authorNr: user.nr, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('com-text').value = "";
    }

    function loadGameComments() {
        const targetNr = isAdmin ? document.getElementById('admin-player-select').value : user.nr;
        if(!targetNr) return;

        db.collection("game_comments")
          .where("gameId", "==", gameId)
          .where("targetNr", "==", targetNr)
          .onSnapshot(snap => {
              const display = document.getElementById('comment-display');
              display.innerHTML = "";
              let docs = []; snap.forEach(d => docs.push({id: d.id, ...d.data()}));
              docs.sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));

              docs.forEach(c => {
                  const formatted = c.text.replace(/(\d{1,2}):(\d{2}):(\d{2})/g, (match, h, min, s) => {
                      const sec = (parseInt(h)*3600)+(parseInt(min)*60)+parseInt(s);
                      return `<span class="timestamp" onclick="jumpTo(${sec})">${match}</span>`;
                  });
                  const del = isAdmin ? `<button class="del-com" onclick="deleteComment('${c.id}')">🗑</button>` : '';
                  display.innerHTML += `
                    <div class="game-comment">
                        <small>VON: ${c.author} (#${c.authorNr})</small>
                        <div>${formatted}</div>
                        ${del}
                    </div>`;
              });
              display.scrollTop = display.scrollHeight;
          });
    }

    async function deleteComment(id) { if(confirm("Löschen?")) await db.collection("game_comments").doc(id).delete(); }

    init();
</script>
</body>
</html>
