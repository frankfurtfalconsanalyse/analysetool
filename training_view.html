<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons | Trainings Analyse</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --panel: #161616; --blue: #3498db; }
        body { font-family: 'Montserrat'; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .video-side { flex: 2.5; background: #000; position: relative; display: flex; flex-direction: column; }
        #yt-player { width: 100%; height: 100%; border: none; }
        
        .comment-side { flex: 1; min-width: 360px; background: var(--panel); border-left: 2px solid #333; display: flex; flex-direction: column; }
        .header { padding: 20px; border-bottom: 2px solid var(--red); background: #000; }
        .btn-back { background: #333; color: #ccc; border: 1px solid #444; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 15px; }
        .player-select { width: 100%; padding: 12px; background: #222; color: white; border: 1px solid var(--red); border-radius: 5px; margin-bottom: 15px; font-weight: bold; }
        
        .comment-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #111; }
        .training-comment { background: #1e1e1e; padding: 15px; border-radius: 10px; border-left: 4px solid var(--red); position: relative; }
        .training-comment small { color: var(--red); font-weight: 900; font-size: 0.65rem; display: block; margin-bottom: 8px; text-transform: uppercase; }
        
        .timestamp { background: var(--blue); color: white; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-weight: 900; font-size: 0.8rem; margin-right: 5px; display: inline-block; }
        .comment-text { color: #bbb; font-size: 0.9rem; line-height: 1.5; }

        .input-area { padding: 20px; border-top: 1px solid #333; background: #000; }
        textarea { width: 100%; height: 70px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; padding: 12px; box-sizing: border-box; resize: none; margin-bottom: 10px; }
        .btn-send { background: var(--red); color: white; border: none; width: 100%; padding: 12px; border-radius: 5px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .del-com { position: absolute; right: 12px; top: 12px; color: #444; cursor: pointer; border:none; background:none; }
    </style>
</head>
<body>

<div class="video-side">
    <div id="yt-player"></div>
</div>

<div class="comment-side">
    <div class="header">
        <button class="btn-back" onclick="location.href='trainings.html'">← Zurück zu Trainings</button>
        <h3 id="training-title" style="margin:0 0 15px 0; text-transform: uppercase;">Trainings-Analyse</h3>
        
        <select id="admin-player-select" class="player-select" style="display:none;" onchange="loadTrainingComments()">
            <option value="">Spieler auswählen...</option>
        </select>
        <div id="player-info-view" style="font-size: 0.8rem; color: #888; font-weight: bold;"></div>
    </div>

    <div class="comment-list" id="comment-display"></div>

    <div class="input-area" id="admin-input-area" style="display:none;">
        <textarea id="com-text" placeholder="Privates Feedback zum Training... Nutze H:M:S (z.B. 0:45:12)"></textarea>
        <button class="btn-send" onclick="sendTrainingComment()">Feedback senden</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const trainingId = new URLSearchParams(window.location.search).get('id');
    const user = JSON.parse(localStorage.getItem('falcons_user') || '{}');
    
    let isAdmin = false;
    let ytPlayer = null;
    let currentYtId = "";

    async function init() {
        if(!trainingId) return location.href='trainings.html';

        const trDoc = await db.collection("trainings").doc(trainingId).get();
        const td = trDoc.data();
        currentYtId = td.ytId;
        document.getElementById('training-title').innerText = td.title;

        const adminDoc = await db.collection("admins").doc(user.nr).get();
        if(user.nr === "22" || adminDoc.exists) {
            isAdmin = true;
            document.getElementById('admin-player-select').style.display = "block";
            document.getElementById('admin-input-area').style.display = "block";
            const pSnap = await db.collection("players").get();
            pSnap.forEach(d => document.getElementById('admin-player-select').innerHTML += `<option value="${d.id}">#${d.id} ${d.data().name}</option>`);
        } else {
            document.getElementById('player-info-view').innerText = `Feedback für ${user.name}`;
            loadTrainingComments();
        }

        onYouTubeIframeAPIReady();
    }

    function onYouTubeIframeAPIReady() {
        if(!currentYtId) return;
        ytPlayer = new YT.Player('yt-player', {
            videoId: currentYtId,
            playerVars: { 'autoplay': 0, 'rel': 0, 'enablejsapi': 1 }
        });
    }

    function getSecondsFromText(text) {
        const match = text.match(/(\d{1,2}):(\d{2}):(\d{2})/);
        return match ? (parseInt(match[1]) * 3600) + (parseInt(match[2]) * 60) + parseInt(match[3]) : 0;
    }

    function jumpTo(sec) {
        ytPlayer.seekTo(sec, true);
        ytPlayer.playVideo();
    }

    async function sendTrainingComment() {
        const targetNr = document.getElementById('admin-player-select').value;
        const text = document.getElementById('com-text').value.trim();
        if(!targetNr || !text) return alert("Spieler und Text fehlen!");

        await db.collection("training_comments").add({
            trainingId, targetNr, text, author: user.name, authorNr: user.nr, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('com-text').value = "";
    }

    function loadTrainingComments() {
        const targetNr = isAdmin ? document.getElementById('admin-player-select').value : user.nr;
        const display = document.getElementById('comment-display');
        if(!targetNr) return display.innerHTML = "";

        db.collection("training_comments")
          .where("trainingId", "==", trainingId)
          .where("targetNr", "==", targetNr)
          .onSnapshot(snap => {
              display.innerHTML = "";
              let docs = [];
              snap.forEach(d => docs.push({id: d.id, ...d.data()}));

              docs.sort((a, b) => getSecondsFromText(a.text) - getSecondsFromText(b.text));

              docs.forEach(c => {
                  const formatted = c.text.replace(/(\d{1,2}):(\d{2}):(\d{2})/g, (match, h, m, s) => {
                      const totalSec = (parseInt(h)*3600) + (parseInt(m)*60) + parseInt(s);
                      return `<span class="timestamp" onclick="jumpTo(${totalSec})">${match}</span>`;
                  });
                  const del = isAdmin ? `<button class="del-com" onclick="deleteComment('${c.id}')">🗑</button>` : '';
                  
                  display.innerHTML += `
                    <div class="training-comment">
                        <small>VON: ${c.author} (#${c.authorNr})</small>
                        <div class="comment-text">${formatted}</div>
                        ${del}
                    </div>`;
              });
          });
    }

    async function deleteComment(id) { if(confirm("Löschen?")) await db.collection("training_comments").doc(id).delete(); }

    init();
</script>
</body>
</html>
