<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons | Spiele Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --card: #1a1a1a; }
        body { font-family: 'Montserrat'; background: var(--bg); color: white; margin: 0; }
        header { background: #000; padding: 20px; border-bottom: 4px solid var(--red); text-align: center; }
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .game-card { background: var(--card); border-radius: 15px; border: 1px solid #333; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--red); transform: translateY(-5px); }
        .game-info { padding: 20px; }
        .game-info h3 { margin: 0; text-transform: uppercase; }
        .game-info p { color: #888; font-size: 0.8rem; margin-top: 5px; }
        .thumb { width: 100%; height: 170px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    </style>
</head>
<body>
    <header><h1 onclick="location.href='index.html'" style="cursor:pointer">FALCONS <span style="color:var(--red)">GAMES HUB</span></h1></header>
    <div class="container">
        <h2 style="border-left: 4px solid var(--red); padding-left: 15px; margin-bottom: 30px;">VERGANGENE SPIELE</h2>
        <div id="game-grid" class="grid"></div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadGames() {
            const snap = await db.collection("games").orderBy("date", "desc").get();
            const grid = document.getElementById('game-grid');
            snap.forEach(doc => {
                const g = doc.data();
                grid.innerHTML += `
                    <div class="game-card" onclick="location.href='game_view.html?id=${doc.id}'">
                        <div class="thumb">🏟</div>
                        <div class="game-info">
                            <h3>${g.title}</h3>
                            <p>${new Date(g.date).toLocaleDateString('de-DE')}</p>
                        </div>
                    </div>`;
            });
        }
        loadGames();
    </script>
</body>
</html>
