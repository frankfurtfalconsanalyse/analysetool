<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Admin | Zentrale</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --card: #1a1a1a; --border: #333; --green: #28a745; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; margin: 0; display: none; padding-bottom: 120px; }
        
        header { background: #000; padding: 20px 40px; border-bottom: 4px solid var(--red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem; }
        .btn-hub { text-decoration: none; color: white; background: #333; padding: 8px 15px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

        /* TABS NAVIGATION */
        .tab-nav { display: flex; gap: 5px; margin-bottom: 30px; border-bottom: 1px solid var(--border); overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: none; border: none; color: #666; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { color: var(--red); border-bottom: 3px solid var(--red); }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .admin-card { background: var(--card); border-radius: 12px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        h3 { margin-top: 0; text-transform: uppercase; font-size: 0.9rem; color: var(--red); letter-spacing: 1px; margin-bottom: 20px; border-left: 3px solid var(--red); padding-left: 10px; font-weight: 400; }
        
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; margin-bottom: 15px; }
        input, select, textarea { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 5px; font-family: inherit; }
        .btn-action { background: var(--red); color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; transition: 0.2s; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.65rem; color: #555; text-transform: uppercase; padding: 12px 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        
        .delete-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 1.1rem; margin: 0 5px; }
        .edit-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 1.1rem; margin-right: 10px; }

        /* STATUS CHECK ACCORDION */
        .status-row { background: #111; margin-bottom: 10px; border-radius: 8px; border: 1px solid #222; overflow: hidden; }
        .status-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .status-content { display: none; padding: 20px; background: #0a0a0a; border-top: 1px solid #222; }
        .player-status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .player-tag { background: #1a1a1a; padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; border: 1px solid #333; font-size: 0.8rem; }

        #save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 3px solid var(--green); padding: 20px; display: none; justify-content: center; gap: 20px; align-items: center; z-index: 1000; }
        .admin-badge { background: var(--red); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 3px; font-weight: 900; margin-left: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">Falcons <span>Admin</span></div>
    <div class="header-right">
        <a href="help.html" class="btn-hub" style="margin-right:10px;">HELP</a>
        <a href="index.html" class="btn-hub">HUB ÖFFNEN</a>
    </div>
</header>

<div id="save-bar">
    <span style="color:var(--green); font-weight:bold;">Änderungen erkannt!</span>
    <button class="btn-action" style="background:var(--green);" onclick="confirmGlobalSave()">Speichern & Übernehmen</button>
    <button class="btn-action" style="background:#333;" onclick="location.reload()">Verwerfen</button>
</div>

<div class="container">
    <nav class="tab-nav">
        <button class="tab-btn active" onclick="openTab('status')">Status-Check</button>
        <button class="tab-btn" onclick="openTab('sessions')">Sessions Editor</button>
        <button class="tab-btn" onclick="openTab('yt')">YouTube Clips</button>
        <button class="tab-btn" onclick="openTab('games')">Game Hub</button>
        <button class="tab-btn" onclick="openTab('trainings')">Trainings Hub</button>
        <button class="tab-btn" onclick="openTab('kader')">Kader & PINs</button>
    </nav>

    <!-- TAB: STATUS -->
    <div id="status" class="tab-content active">
        <div class="admin-card">
            <h3>Video-Konsum prüfen</h3>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn-action" onclick="loadStatusData('sessions')">Sessions</button>
            </div>
            <div id="status-list-container">Wähle einen Modus...</div>
        </div>
    </div>

    <!-- TAB: SESSIONS -->
    <div id="sessions" class="tab-content">
        <div class="admin-card">
            <h3 id="session-form-title">Neue Session erstellen</h3>
            <input type="text" id="s-title" placeholder="Titel" style="width:100%; margin-bottom:10px;">
            <textarea id="s-desc" placeholder="Anweisungen..." style="width:100%; height:60px; margin-bottom:15px;"></textarea>
            <div class="video-selector" id="s-video-list" style="max-height:200px; overflow-y:auto; background:#111; padding:10px; border:1px solid #333; margin-bottom:15px;"></div>
            <button class="btn-action" onclick="saveSession()">Speichern</button>
        </div>
        <div class="admin-card"><table id="session-table"><thead><tr><th>Titel</th><th>Aktion</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- TAB: YOUTUBE -->
    <div id="yt" class="tab-content">
        <div class="admin-card">
            <h3>YouTube Clip hinzufügen</h3>
            <div class="form-row">
                <input type="text" id="yt-title" placeholder="Titel">
                <input type="text" id="yt-url" placeholder="Link">
                <select id="yt-cat-in"><option value="Offense">Offense</option><option value="Defense">Defense</option><option value="Powerplay">Powerplay</option><option value="Penalty Kill">Penalty Kill</option><option value="Setplays">Setplays</option></select>
                <select id="yt-pos-in"><option value="Alle">Alle</option><option value="Angriff">Angriff</option><option value="Center">Center</option><option value="Verteidigung">Verteidigung</option><option value="Goalie">Goalie</option></select>
                <button class="btn-action" onclick="addYT()">Hinzufügen</button>
            </div>
        </div>
        <div class="admin-card"><table id="yt-table"><thead><tr><th>Clip</th><th>Kategorie</th><th>Löschen</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- TAB: GAMES -->
    <div id="games" class="tab-content">
        <div class="admin-card">
            <h3>Neues Spiel hinzufügen</h3>
            <div class="form-row">
                <input type="text" id="g-title" placeholder="Spiel Name">
                <input type="text" id="g-url" placeholder="YouTube Link">
                <input type="date" id="g-date">
                <button class="btn-action" onclick="addGame()">Speichern</button>
            </div>
        </div>
        <div class="admin-card"><table id="games-table"><tbody></tbody></table></div>
    </div>

    <!-- TAB: TRAININGS -->
    <div id="trainings" class="tab-content">
        <div class="admin-card">
            <h3>Neues Training hinzufügen</h3>
            <div class="form-row">
                <input type="text" id="t-title" placeholder="Trainings Fokus">
                <input type="text" id="t-url" placeholder="YouTube Link">
                <input type="date" id="t-date">
                <button class="btn-action" onclick="addTraining()">Training Speichern</button>
            </div>
        </div>
        <div class="admin-card"><table id="trainings-table"><tbody></tbody></table></div>
    </div>

    <!-- TAB: KADER -->
    <div id="kader" class="tab-content">
        <div class="admin-card">
            <h3>Mitglied hinzufügen</h3>
            <div class="form-row">
                <input type="number" id="p-nr" placeholder="Nr." style="width:70px;">
                <input type="text" id="p-name" placeholder="Name" style="width:200px;">
                <button class="btn-action" onclick="addMember()">Spieler Speichern</button>
            </div>
        </div>
        <div class="admin-card"><table id="full-member-table"><tbody></tbody></table></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const user = JSON.parse(localStorage.getItem('falcons_user') || '{}');

    let allPlayers = [], allVideos = [], selectedForSession = [];

    async function checkAuth() {
        const adminDoc = await db.collection("admins").doc(user.nr || "0").get();
        if (user.nr === "22" || adminDoc.exists) { document.body.style.display = "block"; loadBaseData(); }
        else { alert("Kein Zugriff!"); window.location.href = "index.html"; }
    }

    function openTab(id) {
        document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
    }

    async function loadBaseData() {
        const [pSnap, aSnap, ytSnap, gSnap, tSnap, trSnap, driveRes] = await Promise.all([
            db.collection("players").get(), db.collection("admins").get(), db.collection("youtube_clips").get(),
            db.collection("games").orderBy("date", "desc").get(), db.collection("tactics").get(),
            db.collection("trainings").orderBy("date", "desc").get(),
            fetch('https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec').then(r => r.json())
        ]);

        allPlayers = pSnap.docs.map(d => ({id: d.id, ...d.data()}));
        let admins = aSnap.docs.map(d => d.id);
        
        allVideos = [
            ...driveRes.map(v => ({ id: v.link.split('/d/')[1].split('/')[0], title: v.title, type: 'Drive' })),
            ...ytSnap.docs.map(d => ({ id: d.id, title: d.data().title, type: 'YouTube' })),
            ...tSnap.docs.map(d => ({ id: d.id, title: d.data().title, type: 'Taktik' }))
        ];

        renderKader(admins);
        renderYT(ytSnap);
        renderGames(gSnap);
        renderTrainings(trSnap);
        renderSessions();
        renderSessionSelector();
    }

    function renderKader(admins) {
        const tbody = document.querySelector("#full-member-table"); tbody.innerHTML = "";
        allPlayers.sort((a,b)=>a.id-b.id).forEach(p => {
            const isAdmin = (p.id === "22" || admins.includes(p.id));
            tbody.innerHTML += `<tr><td>#${p.id}</td><td>${p.name} ${isAdmin?'<span class="admin-badge">ADMIN</span>':''}</td>
                <td style="text-align:right;">
                    <button class="btn-action" style="background:#444; margin-right:5px;" onclick="resetPin('${p.id}')">PIN Reset</button>
                    <button class="delete-btn" onclick="deleteDoc('players','${p.id}')">🗑</button>
                </td></tr>`;
        });
    }

    function renderYT(snap) {
        const tbody = document.querySelector("#yt-table tbody"); tbody.innerHTML = "";
        snap.forEach(doc => { tbody.innerHTML += `<tr><td>${doc.data().title}</td><td>${doc.data().category}</td><td><button class="delete-btn" onclick="deleteDoc('youtube_clips','${doc.id}')">🗑</button></td></tr>`; });
    }

    function renderGames(snap) {
        const tbody = document.querySelector("#games-table"); tbody.innerHTML = "";
        snap.forEach(d => tbody.innerHTML += `<tr><td>${d.data().title}</td><td>${d.data().date}</td><td><button class="delete-btn" onclick="deleteDoc('games','${d.id}')">🗑</button></td></tr>`);
    }

    function renderTrainings(snap) {
        const tbody = document.querySelector("#trainings-table"); tbody.innerHTML = "";
        snap.forEach(d => tbody.innerHTML += `<tr><td>${d.data().title}</td><td>${d.data().date}</td><td><button class="delete-btn" onclick="deleteDoc('trainings','${d.id}')">🗑</button></td></tr>`);
    }

    async function renderSessions() {
        const snap = await db.collection("sessions").orderBy("createdAt", "desc").get();
        const tbody = document.querySelector("#session-table tbody"); tbody.innerHTML = "";
        snap.forEach(d => tbody.innerHTML += `<tr><td>${d.data().title}</td><td><button class="delete-btn" onclick="deleteDoc('sessions','${d.id}')">🗑</button></td></tr>`);
    }

    function renderSessionSelector() {
        const list = document.getElementById('s-video-list'); list.innerHTML = "";
        allVideos.forEach(v => list.innerHTML += `<div><input type="checkbox" onchange="toggleSelect('${v.id}')"> [${v.type}] ${v.title}</div>`);
    }

    function toggleSelect(id) { const i = selectedForSession.indexOf(id); if(i>-1) selectedForSession.splice(i,1); else selectedForSession.push(id); }

    async function saveSession() {
        const t = document.getElementById('s-title').value;
        if(!t || selectedForSession.length === 0) return alert("Titel oder Videos fehlen!");
        await db.collection("sessions").add({ title: t, description: document.getElementById('s-desc').value, videoIds: selectedForSession, createdAt: new Date() });
        location.reload();
    }

    async function addYT() {
        const u = document.getElementById('yt-url').value;
        const ytId = u.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/ytscreeningroom\?v=|live\/|shorts\/))([\w\-]{11})/)?.[1];
        await db.collection("youtube_clips").add({ title: document.getElementById('yt-title').value, ytId, category: document.getElementById('yt-cat-in').value, position: document.getElementById('yt-pos-in').value, startTime: 0, createdAt: new Date() });
        location.reload();
    }

    async function addGame() {
        const u = document.getElementById('g-url').value;
        const ytId = u.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/ytscreeningroom\?v=|live\/|shorts\/))([\w\-]{11})/)?.[1];
        await db.collection("games").add({ title: document.getElementById('g-title').value, ytId, date: document.getElementById('g-date').value, createdAt: new Date() });
        location.reload();
    }

    async function addTraining() {
        const u = document.getElementById('t-url').value;
        const ytId = u.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/ytscreeningroom\?v=|live\/|shorts\/))([\w\-]{11})/)?.[1];
        await db.collection("trainings").add({ title: document.getElementById('t-title').value, ytId, date: document.getElementById('t-date').value, createdAt: new Date() });
        location.reload();
    }

    async function addMember() {
        let nr = document.getElementById('p-nr').value; if(nr.length===1) nr="0"+nr;
        await db.collection("players").doc(nr).set({ name: document.getElementById('p-name').value, nr });
        location.reload();
    }

    async function resetPin(id) {
        if(confirm("PIN für Spieler #" + id + " zurücksetzen?")) {
            await db.collection("players").doc(id).update({ pin: firebase.firestore.FieldValue.delete() });
            alert("PIN gelöscht.");
        }
    }

    async function deleteDoc(col, id) { if(confirm("Löschen?")) { await db.collection(col).doc(id).delete(); location.reload(); } }
    
    checkAuth();
</script>
</body>
</html>
