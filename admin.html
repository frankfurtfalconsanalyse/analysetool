<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Falcons Admin | Positionen</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Montserrat'; background: #121212; color: white; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; font-size: 0.9rem; }
        th { background: #e30613; position: sticky; top: 0; }
        select { padding: 6px; background: #333; color: white; border: 1px solid #e30613; }
        .btn-save { background: #e30613; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-save:disabled { background: #555; cursor: not-allowed; }
        #loading-msg { padding: 40px; text-align: center; font-size: 1.2rem; color: #888; }
    </style>
</head>
<body>
    <h1>Falcons Video Management</h1>
    <div id="loading-msg">Synchronisiere mit Google Drive... bitte warten...</div>

    <table id="admin-table" style="display:none;">
        <thead>
            <tr><th>Video Name</th><th>Kategorie</th><th>Position zuweisen</th><th>Aktion</th></tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU",
            authDomain: "falcons-video-tool.firebaseapp.com",
            projectId: "falcons-video-tool",
            storageBucket: "falcons-video-tool.firebasestorage.app",
            messagingSenderId: "306689889088",
            appId: "1:306689889088:web:ad525fecd0682069c6e0a5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const DRIVE_API_URL = 'https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec';

        async function init() {
            try {
                const [driveRes, metaSnap] = await Promise.all([
                    fetch(DRIVE_API_URL).then(r => r.json()),
                    db.collection("video_metadata").get()
                ]);

                let metaData = {};
                metaSnap.forEach(doc => { metaData[doc.id] = doc.data().position; });

                const tbody = document.getElementById('table-body');
                driveRes.forEach(v => {
                    const fileId = v.link.split('/d/')[1].split('/')[0];
                    const currentPos = metaData[fileId] || "Nicht zugewiesen";
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${v.title}</td>
                        <td>${v.category}</td>
                        <td>
                            <select id="pos-${fileId}">
                                <option value="Nicht zugewiesen" ${currentPos==='Nicht zugewiesen'?'selected':''}>Wählen...</option>
                                <option value="Angriff" ${currentPos==='Angriff'?'selected':''}>Angriff</option>
                                <option value="Center" ${currentPos==='Center'?'selected':''}>Center</option>
                                <option value="Verteidigung" ${currentPos==='Verteidigung'?'selected':''}>Verteidigung</option>
                                <option value="Goalie" ${currentPos==='Goalie'?'selected':''}>Goalie</option>
                                <option value="Alle" ${currentPos==='Alle'?'selected':''}>Alle Positionen</option>
                            </select>
                        </td>
                        <td><button class="btn-save" id="btn-${fileId}" onclick="savePosition('${fileId}')">Speichern</button></td>
                    `;
                    tbody.appendChild(tr);
                });
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('admin-table').style.display = 'table';
            } catch (e) { document.getElementById('loading-msg').innerText = "Fehler beim Laden!"; }
        }

        async function savePosition(fileId) {
            const btn = document.getElementById('btn-' + fileId);
            const pos = document.getElementById('pos-' + fileId).value;
            btn.innerText = "Spart...";
            btn.disabled = true;

            try {
                await db.collection("video_metadata").doc(fileId).set({
                    position: pos,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                btn.innerText = "Gespeichert!";
                btn.style.background = "#28a745";
                setTimeout(() => { 
                    btn.innerText = "Speichern"; 
                    btn.style.background = "#e30613";
                    btn.disabled = false;
                }, 2000);
            } catch (e) {
                alert("Fehler beim Speichern: " + e.message);
                btn.disabled = false;
            }
        }
        init();
    </script>
</body>
</html>
