<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Admin | Zentrale</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --card: #1a1a1a; --border: #333; --green: #28a745; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; margin: 0; display: none; }
        header { background: #000; padding: 20px 40px; border-bottom: 4px solid var(--red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem; }
        .btn-hub { text-decoration: none; color: white; background: #333; padding: 8px 15px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .tab-nav { display: flex; gap: 5px; margin-bottom: 30px; border-bottom: 1px solid var(--border); overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: none; border: none; color: #666; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { color: var(--red); border-bottom: 3px solid var(--red); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .admin-card { background: var(--card); border-radius: 12px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        h3 { margin-top: 0; text-transform: uppercase; font-size: 1rem; color: var(--red); letter-spacing: 1px; margin-bottom: 20px; border-left: 3px solid var(--red); padding-left: 10px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.65rem; color: #888; text-transform: uppercase; font-weight: bold; }
        input, select, textarea { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; font-family: inherit; }
        .btn-action { background: var(--red); color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 0.65rem; color: #555; text-transform: uppercase; padding: 12px 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .delete-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 1.1rem; }
        .status-row { background: #111; margin-bottom: 10px; border-radius: 8px; border: 1px solid #222; overflow: hidden; }
        .status-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .status-content { display: none; padding: 20px; background: #0a0a0a; border-top: 1px solid #222; }
        .player-status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .player-tag { background: #1a1a1a; padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; border: 1px solid #333; font-size: 0.8rem; }
        .video-selector { max-height: 300px; overflow-y: auto; background: #111; padding: 10px; border-radius: 5px; border: 1px solid #333; }
        .video-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #222; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <div class="logo">Falcons <span>Admin</span></div>
    <a href="index.html" class="btn-hub">← HUB ÖFFNEN</a>
</header>

<div class="container">
    <nav class="tab-nav">
        <button class="tab-btn active" onclick="openTab('status')">📊 Status-Check</button>
        <button class="tab-btn" onclick="openTab('sessions')">Sessions Editor</button>
        <button class="tab-btn" onclick="openTab('yt')">YouTube Clips</button>
        <button class="tab-btn" onclick="openTab('drive')">Drive Zuordnung</button>
        <button class="tab-btn" onclick="openTab('kader')">Kader</button>
        <button class="tab-btn" onclick="openTab('rechte')">Rechte</button>
    </nav>

    <!-- STATUS CHECK -->
    <div id="status" class="tab-content active">
        <div class="admin-card">
            <h3>📈 Video-Konsum prüfen</h3>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn-action" onclick="loadStatusData('sessions')" id="btn-stat-s">Sessions</button>
                <button class="btn-action" style="background:#444" onclick="loadStatusData('videos')" id="btn-stat-v">Einzelvideos</button>
            </div>
            <div id="status-list-container">Lade Daten...</div>
        </div>
    </div>

    <!-- SESSIONS -->
    <div id="sessions" class="tab-content">
        <div class="admin-card">
            <h3>🆕 Neue Session erstellen</h3>
            <input type="text" id="s-title" placeholder="Titel" style="width:100%; margin-bottom:10px;">
            <textarea id="s-desc" placeholder="Anweisungen..." style="width:100%; height:60px; margin-bottom:15px;"></textarea>
            <button class="btn-action" onclick="saveSession()">Session Veröffentlichen</button>
            <div style="margin-top:20px;"><label style="font-size:0.7rem; color:#888;">VIDEOS WÄHLEN:</label>
            <div class="video-selector" id="s-video-list"></div></div>
        </div>
        <div class="admin-card"><table id="session-table"><thead><tr><th>Session Titel</th><th>Aktion</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- YOUTUBE -->
    <div id="yt" class="tab-content">
        <div class="admin-card">
            <h3>🎥 YouTube Clip hinzufügen</h3>
            <div class="form-row">
                <div class="form-group"><label>Titel</label><input type="text" id="yt-title" style="width:180px;"></div>
                <div class="form-group"><label>Link</label><input type="text" id="yt-url" style="width:180px;"></div>
                <div class="form-group"><label>Start (H:M:S)</label><div style="display:flex; gap:3px;">
                    <input type="number" id="yt-hr" value="0" style="width:40px;">:
                    <input type="number" id="yt-min" value="0" style="width:40px;">:
                    <input type="number" id="yt-sec" value="0" style="width:40px;">
                </div></div>
                <div class="form-group"><label>Kategorie</label><select id="yt-cat"><option value="Offense">Offense</option><option value="Defense">Defense</option><option value="Powerplay">Powerplay</option><option value="Penalty Kill">Penalty Kill</option><option value="Setplays">Setplays</option></select></div>
                <div class="form-group"><label>Position</label><select id="yt-pos"><option value="Alle">Alle</option><option value="Angriff">Angriff</option><option value="Center">Center</option><option value="Verteidigung">Verteidigung</option><option value="Goalie">Goalie</option></select></div>
                <button class="btn-action" onclick="addYT()">Speichern</button>
            </div>
        </div>
        <div class="admin-card"><table id="yt-table"><thead><tr><th>Titel</th><th>Aktion</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- DRIVE -->
    <div id="drive" class="tab-content">
        <div class="admin-card"><h3>📂 Drive Positionen zuweisen</h3><table id="drive-table"><thead><tr><th>Video</th><th>Position</th><th>Aktion</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- KADER -->
    <div id="kader" class="tab-content">
        <div class="admin-card">
            <h3>👥 Spieler hinzufügen</h3>
            <div class="form-row">
                <input type="number" id="p-nr" placeholder="Nr." style="width:60px;">
                <input type="text" id="p-name" placeholder="Name">
                <button class="btn-action" onclick="addPlayer()">Speichern</button>
            </div>
        </div>
        <div class="admin-card"><table id="player-table"><thead><tr><th>Nr</th><th>Name</th><th>Aktion</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- RECHTE -->
    <div id="rechte" class="tab-content">
        <div class="admin-card">
            <h3>🔑 Admins verwalten</h3>
            <div class="form-row">
                <input type="number" id="admin-nr" placeholder="Trikot Nr.">
                <button class="btn-action" onclick="addAdmin()">Admin-Rechte geben</button>
            </div>
        </div>
        <div class="admin-card"><table id="admin-table"><thead><tr><th>Nr</th><th>Aktion</th></tr></thead><tbody></tbody></table></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const user = JSON.parse(localStorage.getItem('falcons_user') || '{}');

    let allPlayers = [], allVideos = [], selectedForSession = [];

    async function checkAuth() {
        const adminDoc = await db.collection("admins").doc(user.nr || "0").get();
        if (user.nr === "22" || adminDoc.exists) { document.body.style.display = "block"; loadBaseData(); }
        else { alert("Kein Zugriff!"); window.location.href = "index.html"; }
    }

    function openTab(id) {
        document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    async function loadBaseData() {
        const [pSnap, ytSnap, metaSnap, driveRes] = await Promise.all([
            db.collection("players").get(),
            db.collection("youtube_clips").get(),
            db.collection("video_metadata").get(),
            fetch('https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec').then(r => r.json())
        ]);

        allPlayers = pSnap.docs.map(d => ({id: d.id, ...d.data()}));
        let meta = {}; metaSnap.forEach(d => meta[d.id] = d.data().position);
        allVideos = [...driveRes.map(v => ({ id: v.link.split('/d/')[1].split('/')[0], title: v.title, category: v.category, type: 'Drive' })), ...ytSnap.docs.map(d => ({ id: d.id, ...d.data(), type: 'YouTube' }))];

        // UI Refresh
        const pTable = document.querySelector("#player-table tbody"); pTable.innerHTML = "";
        allPlayers.sort((a,b)=>a.id-b.id).forEach(p => pTable.innerHTML += `<tr><td>#${p.id}</td><td>${p.name}</td><td><button class="delete-btn" onclick="deleteDoc('players','${p.id}')">🗑</button></td></tr>`);

        const sList = document.getElementById('s-video-list'); sList.innerHTML = "";
        const dTable = document.querySelector("#drive-table tbody"); dTable.innerHTML = "";
        const ytTable = document.querySelector("#yt-table tbody"); ytTable.innerHTML = "";

        allVideos.forEach(v => {
            sList.innerHTML += `<div class="video-item"><input type="checkbox" class="session-cb" value="${v.id}" onchange="toggleVideoSelection('${v.id}')"> [${v.type}] ${v.title}</div>`;
            if(v.type === 'Drive') {
                dTable.innerHTML += `<tr><td>${v.title}</td><td><select id="pos-${v.id}"><option value="Alle" ${meta[v.id]==='Alle'?'selected':''}>Alle</option><option value="Angriff" ${meta[v.id]==='Angriff'?'selected':''}>Angriff</option><option value="Center" ${meta[v.id]==='Center'?'selected':''}>Center</option><option value="Verteidigung" ${meta[v.id]==='Verteidigung'?'selected':''}>Verteidigung</option><option value="Goalie" ${meta[v.id]==='Goalie'?'selected':''}>Goalie</option></select></td><td><button class="btn-action" style="padding:5px 10px;" onclick="saveMeta('${v.id}')">Save</button></td></tr>`;
            } else {
                ytTable.innerHTML += `<tr><td>${v.title}</td><td><button class="delete-btn" onclick="deleteDoc('youtube_clips','${v.id}')">🗑</button></td></tr>`;
            }
        });
        loadSessions(); loadAdmins(); loadStatusData('sessions');
    }

    async function addYT() {
        const t = document.getElementById('yt-title'), u = document.getElementById('yt-url'), hr = document.getElementById('yt-hr'), min = document.getElementById('yt-min'), sec = document.getElementById('yt-sec');
        const ytId = u.value.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/ytscreeningroom\?v=))([\w\-]{11})/)?.[1];
        if(!ytId || !t.value) return alert("Eingabe prüfen!");
        const total = (parseInt(hr.value)||0)*3600 + (parseInt(min.value)||0)*60 + (parseInt(sec.value)||0);
        await db.collection("youtube_clips").add({ title: t.value, ytId, category: document.getElementById('yt-cat').value, position: document.getElementById('yt-pos').value, startTime: total, createdAt: new Date() });
        t.value = ""; u.value = ""; hr.value = 0; min.value = 0; sec.value = 0;
        alert("YouTube Clip gespeichert!"); loadBaseData();
    }

    async function saveSession() {
        const t = document.getElementById('s-title'), d = document.getElementById('s-desc');
        if(!t.value || selectedForSession.length === 0) return alert("Titel & Videos fehlen!");
        await db.collection("sessions").add({ title: t.value, description: d.value, videoIds: selectedForSession, createdAt: new Date() });
        t.value = ""; d.value = ""; selectedForSession = [];
        document.querySelectorAll('.session-cb').forEach(cb => cb.checked = false);
        alert("Session erstellt!"); loadBaseData();
    }

    async function addPlayer() {
        const n = document.getElementById('p-nr'), nm = document.getElementById('p-name');
        if(!n.value || !nm.value) return;
        await db.collection("players").doc(n.value).set({ name: nm.value, nr: n.value });
        n.value = ""; nm.value = "";
        alert("Spieler hinzugefügt!"); loadBaseData();
    }

    async function addAdmin() {
        const n = document.getElementById('admin-nr');
        if(!n.value) return;
        await db.collection("admins").doc(n.value).set({ active: true });
        n.value = "";
        alert("Admin-Rechte vergeben!"); loadBaseData();
    }

    function toggleVideoSelection(id) {
        const i = selectedForSession.indexOf(id);
        if(i > -1) selectedForSession.splice(i,1); else selectedForSession.push(id);
    }

    async function saveMeta(id) {
        await db.collection("video_metadata").doc(id).set({ position: document.getElementById('pos-' + id).value });
        alert("Position gespeichert!");
    }

    async function loadSessions() {
        const snap = await db.collection("sessions").get();
        const tbody = document.querySelector("#session-table tbody"); tbody.innerHTML = "";
        snap.forEach(d => tbody.innerHTML += `<tr><td>${d.data().title}</td><td><button class="delete-btn" onclick="deleteDoc('sessions','${d.id}')">🗑</button></td></tr>`);
    }

    async function loadAdmins() {
        const snap = await db.collection("admins").get();
        const tbody = document.querySelector("#admin-table tbody"); tbody.innerHTML = "";
        snap.forEach(d => tbody.innerHTML += `<tr><td>#${d.id}</td><td><button class="delete-btn" onclick="deleteDoc('admins','${d.id}')">🗑</button></td></tr>`);
    }

    async function loadStatusData(mode) {
        const container = document.getElementById('status-list-container'); container.innerHTML = "Lade...";
        const [sSnap, progSnap, viewSnap] = await Promise.all([db.collection("sessions").get(), db.collection("progress").get(), db.collection("video_views").get()]);
        let progress = {}; progSnap.forEach(d => progress[d.id] = d.data());
        let views = {}; viewSnap.forEach(d => views[d.id] = d.data());
        container.innerHTML = "";
        if(mode === 'sessions') {
            sSnap.forEach(doc => renderStatusAccordion(container, doc.data().title, doc.id, doc.data().videoIds.length, progress, 'session'));
        } else {
            allVideos.forEach(v => renderStatusAccordion(container, v.title, v.id, 1, views, 'video'));
        }
    }

    function renderStatusAccordion(container, title, id, target, dataMap, type) {
        let watched = [], open = [];
        allPlayers.forEach(p => {
            let hasSeen = type === 'session' ? (dataMap[p.id] && dataMap[p.id][id] >= target) : (dataMap[p.id] && dataMap[p.id][id] === true);
            const html = `<div class="player-tag">#${p.id} ${p.name} <span>${hasSeen?'✅':'❌'}</span></div>`;
            if(hasSeen) watched.push(html); else open.push(html);
        });
        const div = document.createElement('div'); div.className = 'status-row';
        div.innerHTML = `<div class="status-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display==='block'?'none':'block'"><span>${title}</span><span>${watched.length}/${allPlayers.length} ▼</span></div><div class="status-content"><p style="color:var(--green); font-size:0.7rem;">GESEHEN (${watched.length})</p><div class="player-status-grid">${watched.join('') || 'Niemand'}</div><p style="color:var(--red); font-size:0.7rem;">OFFEN (${open.length})</p><div class="player-status-grid">${open.join('') || 'Alle fertig!'}</div></div>`;
        container.appendChild(div);
    }

    async function deleteDoc(col, id) { if(confirm("Löschen?")) { await db.collection(col).doc(id).delete(); loadBaseData(); } }
    checkAuth();
</script>
</body>
</html>
