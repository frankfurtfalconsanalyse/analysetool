<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Falcons Admin | Positionen zuweisen</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Montserrat'; background: #121212; color: white; padding: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e1e1e; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        th { background: #e30613; position: sticky; top: 0; }
        select { padding: 8px; background: #333; color: white; border: 1px solid #e30613; border-radius: 4px; }
        .status-tag { font-size: 0.7rem; padding: 3px 6px; border-radius: 3px; margin-left: 10px; }
        .saved { background: #006400; } .unsaved { background: #8b0000; }
        #loading { font-size: 1.5rem; text-align: center; margin: 50px; }
    </style>
</head>
<body>
    <h1>Video-Management: Positionen zuweisen</h1>
    <p>Hier werden alle Videos aus Drive aufgelistet. Wähle eine Position und klicke Speichern.</p>
    
    <div id="loading">Synchronisiere mit Google Drive...</div>

    <table id="admin-table" style="display:none;">
        <thead>
            <tr><th>Clip Name</th><th>Ordner (Kat.)</th><th>Zugeordnete Position</th><th>Aktion</th></tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU",
            authDomain: "falcons-video-tool.firebaseapp.com",
            projectId: "falcons-video-tool",
            storageBucket: "falcons-video-tool.firebasestorage.app",
            messagingSenderId: "306689889088",
            appId: "1:306689889088:web:ad525fecd0682069c6e0a5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // DEINE GOOGLE APPS SCRIPT URL
        const DRIVE_API_URL = 'https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec';

        async function initAdmin() {
            try {
                // 1. Daten aus Drive holen
                const driveRes = await fetch(DRIVE_API_URL);
                const driveVideos = await driveRes.json();

                // 2. Daten aus Firebase holen (Metadaten)
                const metaSnap = await db.collection("video_metadata").get();
                let metaData = {};
                metaSnap.forEach(doc => { metaData[doc.id] = doc.data().position; });

                const tbody = document.getElementById('table-body');
                
                driveVideos.forEach(v => {
                    // Extrahiere ID aus dem Link: ...file/d/ID/preview
                    const fileId = v.link.split('/d/')[1].split('/')[0];
                    const currentPos = metaData[fileId] || "Keine Auswahl";

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${v.title}</td>
                        <td>${v.category}</td>
                        <td>
                            <select id="pos-${fileId}">
                                <option value="Nicht zugewiesen" ${currentPos==='Nicht zugewiesen'?'selected':''}>Wählen...</option>
                                <option value="Angriff" ${currentPos==='Angriff'?'selected':''}>Angriff</option>
                                <option value="Center" ${currentPos==='Center'?'selected':''}>Center</option>
                                <option value="Verteidigung" ${currentPos==='Verteidigung'?'selected':''}>Verteidigung</option>
                                <option value="Goalie" ${currentPos==='Goalie'?'selected':''}>Goalie</option>
                                <option value="Alle" ${currentPos==='Alle'?'selected':''}>Alle Positionen</option>
                            </select>
                            <span class="status-tag ${metaData[fileId]?'saved':'unsaved'}">${metaData[fileId]?'OK':'FEHLT'}</span>
                        </td>
                        <td><button onclick="savePosition('${fileId}')" style="cursor:pointer; padding:5px 10px;">Speichern</button></td>
                    `;
                    tbody.appendChild(tr);
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('admin-table').style.display = 'table';

            } catch (e) {
                console.error(e);
                document.getElementById('loading').innerText = "Fehler beim Laden!";
            }
        }

        async function savePosition(fileId) {
            const pos = document.getElementById('pos-' + fileId).value;
            await db.collection("video_metadata").doc(fileId).set({
                position: pos,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Position für diesen Clip gespeichert!");
            location.reload();
        }

        initAdmin();
    </script>
</body>
</html>
