<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Admin | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --card: #1a1a1a; }
        body { font-family: 'Montserrat'; background: var(--bg); color: white; padding: 20px; display: none; }
        .section { background: var(--card); padding: 20px; border-radius: 10px; margin-bottom: 30px; border: 1px solid #333; }
        input, select, button { padding: 10px; margin: 5px; border-radius: 4px; border: 1px solid #444; background: #222; color: white; }
        button { background: var(--red); border: none; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { background: var(--red); }
        .yt-box { border: 1px dashed #555; padding: 15px; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <a href="index.html" style="color:white; text-decoration:none; font-size:0.8rem;">← ZURÜCK ZUM HUB</a>
    <h1>Falcons Admin Zentrale</h1>

    <!-- YOUTUBE CLIP HINZUFÜGEN -->
    <div class="section">
        <h3>🎥 YouTube Clip hinzufügen</h3>
        <div class="yt-box">
            <input type="text" id="yt-title" placeholder="Titel (z.B. Powerplay Tor)" style="width:250px;">
            <input type="text" id="yt-url" placeholder="YouTube Link" style="width:250px;">
            <select id="yt-cat">
                <option value="Offense">Offense</option>
                <option value="Defense">Defense</option>
                <option value="Powerplay">Powerplay</option>
                <option value="Penalty Kill">Penalty Kill</option>
                <option value="Setplays">Setplays</option>
            </select>
            <select id="yt-pos">
                <option value="Angriff">Angriff</option>
                <option value="Center">Center</option>
                <option value="Verteidigung">Verteidigung</option>
                <option value="Goalie">Goalie</option>
                <option value="Alle">Alle</option>
            </select>
            <div style="margin-top:10px;">
                Startzeit: <input type="number" id="yt-min" placeholder="Min" style="width:60px;"> : <input type="number" id="yt-sec" placeholder="Sek" style="width:60px;">
                <button onclick="addYoutubeClip()">Hinzufügen</button>
            </div>
        </div>
        <table id="yt-table">
            <thead><tr><th>YouTube Titel</th><th>Startzeit</th><th>Aktion</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- SPIELER VERWALTUNG -->
    <div class="section">
        <h3>👥 Kader pflegen</h3>
        <input type="number" id="p-nr" placeholder="Nr." style="width:60px;">
        <input type="text" id="p-name" placeholder="Name">
        <button onclick="addPlayer()">Spieler speichern</button>
        <table id="player-table">
            <thead><tr><th>Nr.</th><th>Name</th><th>Löschen</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- DRIVE ZUORDNUNG -->
    <div class="section">
        <h3>📂 Google Drive Positionen</h3>
        <table id="video-table">
            <thead><tr><th>Drive Video</th><th>Position</th><th>Save</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const user = JSON.parse(localStorage.getItem('falcons_user') || '{}');

        async function checkAuth() {
            const adminDoc = await db.collection("admins").doc(user.nr || "0").get();
            if (user.nr === "22" || adminDoc.exists) { document.body.style.display = "block"; loadData(); }
            else { alert("Kein Zugriff!"); window.location.href = "index.html"; }
        }

        function extractYTId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : null;
        }

        async function addYoutubeClip() {
            const title = document.getElementById('yt-title').value;
            const url = document.getElementById('yt-url').value;
            const cat = document.getElementById('yt-cat').value;
            const pos = document.getElementById('yt-pos').value;
            const min = parseInt(document.getElementById('yt-min').value) || 0;
            const sec = parseInt(document.getElementById('yt-sec').value) || 0;
            
            const ytId = extractYTId(url);
            if(!ytId || !title) return alert("Link oder Titel ungültig!");

            const totalSeconds = (min * 60) + sec;

            await db.collection("youtube_clips").add({
                title, ytId, category: cat, position: pos, startTime: totalSeconds, createdAt: new Date()
            });
            location.reload();
        }

        async function addPlayer() {
            const nr = document.getElementById('p-nr').value;
            const name = document.getElementById('p-name').value;
            if(!nr || !name) return;
            await db.collection("players").doc(nr).set({ name, nr });
            location.reload();
        }

        async function loadData() {
            // YouTube Clips
            const ytSnap = await db.collection("youtube_clips").get();
            ytSnap.forEach(doc => {
                const d = doc.data();
                document.querySelector("#yt-table tbody").innerHTML += `<tr><td>${d.title}</td><td>${Math.floor(d.startTime/60)}:${d.startTime%60}</td><td><button onclick="deleteDoc('youtube_clips','${doc.id}')">Löschen</button></td></tr>`;
            });

            // Spieler
            const pSnap = await db.collection("players").get();
            pSnap.forEach(doc => {
                const p = doc.data();
                document.querySelector("#player-table tbody").innerHTML += `<tr><td>${p.nr}</td><td>${p.name}</td><td><button onclick="deleteDoc('players','${p.nr}')">X</button></td></tr>`;
            });

            // Drive Videos
            const driveRes = await fetch('https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec');
            const driveData = await driveRes.json();
            const metaSnap = await db.collection("video_metadata").get();
            let meta = {}; metaSnap.forEach(d => meta[d.id] = d.data().position);

            driveData.forEach(v => {
                const id = v.link.split('/d/')[1].split('/')[0];
                document.querySelector("#video-table tbody").innerHTML += `<tr><td>${v.title}</td><td><select id="v-${id}"><option value="Alle" ${meta[id]==='Alle'?'selected':''}>Alle</option><option value="Angriff" ${meta[id]==='Angriff'?'selected':''}>Angriff</option><option value="Center" ${meta[id]==='Center'?'selected':''}>Center</option><option value="Verteidigung" ${meta[id]==='Verteidigung'?'selected':''}>Verteidigung</option><option value="Goalie" ${meta[id]==='Goalie'?'selected':''}>Goalie</option></select></td><td><button onclick="saveVideoMeta('${id}')">Ok</button></td></tr>`;
            });
        }

        async function saveVideoMeta(id) {
            const pos = document.getElementById('v-'+id).value;
            await db.collection("video_metadata").doc(id).set({ position: pos });
            alert("Gespeichert");
        }

        async function deleteDoc(col, id) { if(confirm("Löschen?")) { await db.collection(col).doc(id).delete(); location.reload(); } }
        checkAuth();
    </script>
</body>
</html>
