<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Admin | Zentrale</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --card: #1a1a1a; --border: #333; --green: #28a745; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; margin: 0; display: none; padding-bottom: 120px; }
        header { background: #000; padding: 20px 40px; border-bottom: 4px solid var(--red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem; }
        .btn-hub { text-decoration: none; color: white; background: #333; padding: 8px 15px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .tab-nav { display: flex; gap: 5px; margin-bottom: 30px; border-bottom: 1px solid var(--border); overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: none; border: none; color: #666; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { color: var(--red); border-bottom: 3px solid var(--red); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        .admin-card { background: var(--card); border-radius: 12px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        h3 { margin-top: 0; text-transform: uppercase; font-size: 0.9rem; color: var(--red); letter-spacing: 1px; margin-bottom: 20px; border-left: 3px solid var(--red); padding-left: 10px; font-weight: 400; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; margin-bottom: 15px; }
        input, select, textarea { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 5px; font-family: inherit; }
        .btn-action { background: #444; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; transition: 0.2s; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.65rem; color: #555; text-transform: uppercase; padding: 12px 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .status-row { background: #111; margin-bottom: 10px; border-radius: 8px; border: 1px solid #222; overflow: hidden; }
        .status-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .status-header:hover { background: #1a1a1a; }
        .status-content { display: none; padding: 20px; background: #0a0a0a; border-top: 1px solid #222; }
        .player-status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .player-tag { background: #1a1a1a; padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; border: 1px solid #333; font-size: 0.8rem; }
        .pin-badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 3px; font-weight: 900; margin-left: 10px; text-transform: uppercase; }
        .pin-set { background: var(--green); color: white; }
        .pin-none { background: #444; color: #aaa; }
    </style>
</head>
<body>

<header>
    <div class="logo">Falcons <span>Admin</span></div>
    <div class="header-right"><a href="index.html" class="btn-hub">HUB ÖFFNEN</a></div>
</header>

<div class="container">
    <nav class="tab-nav">
        <button class="tab-btn active" id="tab-btn-status" onclick="openTab('status')">Status-Check</button>
        <button class="tab-btn" id="tab-btn-sessions" onclick="openTab('sessions')">Sessions</button>
        <button class="tab-btn" id="tab-btn-yt" onclick="openTab('yt')">Clips</button>
        <button class="tab-btn" id="tab-btn-games" onclick="openTab('games')">Spiele</button>
        <button class="tab-btn" id="tab-btn-trainings" onclick="openTab('trainings')">Trainings</button>
        <button class="tab-btn" id="tab-btn-kader" onclick="openTab('kader')">Kader</button>
    </nav>

    <div id="status" class="tab-content active">
        <div class="admin-card">
            <h3>Konsum prüfen</h3>
            <div style="display:flex; gap:10px; margin-bottom:20px; flex-wrap: wrap;">
                <button id="mode-sessions" class="btn-action" onclick="loadStatusData('sessions')">Sessions</button>
                <button id="mode-clips" class="btn-action" onclick="loadStatusData('clips')">Einzelclips</button>
                <button id="mode-games" class="btn-action" onclick="loadStatusData('games')">Spiele Hub</button>
                <button id="mode-trainings" class="btn-action" onclick="loadStatusData('trainings')">Trainings Hub</button>
            </div>
            <div id="status-list-container">Wähle eine Kategorie...</div>
        </div>
    </div>

    <!-- TABS INHALTE -->
    <div id="sessions" class="tab-content">
        <div class="admin-card">
            <h3>Neue Session erstellen</h3>
            <input type="text" id="s-title" placeholder="Titel" style="width:100%; margin-bottom:10px;">
            <textarea id="s-desc" placeholder="Anweisungen..." style="width:100%; height:60px; margin-bottom:15px;"></textarea>
            <div id="s-video-list" style="max-height:200px; overflow-y:auto; background:#111; padding:10px; border:1px solid #333; margin-bottom:15px;"></div>
            <button class="btn-action" style="background:var(--red)" onclick="saveSession()">Speichern</button>
        </div>
        <div class="admin-card"><table id="session-table"><thead><tr><th>Titel</th><th>Löschen</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div id="yt" class="tab-content">
        <div class="admin-card">
            <h3>Clip hinzufügen</h3>
            <div class="form-row">
                <input type="text" id="yt-title" placeholder="Titel">
                <input type="text" id="yt-url" placeholder="Link">
                <select id="yt-cat-in"><option value="Offense">Offense</option><option value="Defense">Defense</option><option value="Powerplay">Powerplay</option><option value="Penalty Kill">Penalty Kill</option><option value="Setplays">Setplays</option></select>
                <button class="btn-action" style="background:var(--red)" onclick="addYT()">Hinzufügen</button>
            </div>
        </div>
        <div class="admin-card"><table id="yt-table"><thead><tr><th>Clip</th><th>Löschen</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div id="games" class="tab-content">
        <div class="admin-card"><h3>Spiel hinzufügen</h3><div class="form-row"><input type="text" id="g-title" placeholder="Spiel"><input type="text" id="g-url" placeholder="Link"><input type="date" id="g-date"><button class="btn-action" style="background:var(--red)" onclick="addGame()">Speichern</button></div></div>
        <div class="admin-card"><table id="games-table"><tbody></tbody></table></div>
    </div>

    <div id="trainings" class="tab-content">
        <div class="admin-card"><h3>Training hinzufügen</h3><div class="form-row"><input type="text" id="t-title" placeholder="Fokus"><input type="text" id="t-url" placeholder="Link"><input type="date" id="t-date"><button class="btn-action" style="background:var(--red)" onclick="addTraining()">Speichern</button></div></div>
        <div class="admin-card"><table id="trainings-table"><tbody></tbody></table></div>
    </div>

    <div id="kader" class="tab-content">
        <div class="admin-card">
            <h3>Mitglied hinzufügen</h3>
            <div class="form-row">
                <input type="number" id="p-nr" placeholder="Nr." style="width:70px;">
                <input type="text" id="p-name" placeholder="Name">
                <button class="btn-action" style="background:var(--red)" onclick="addMember()">Speichern</button>
            </div>
            <div id="pin-stats" style="margin-top:10px; font-size:0.75rem; color:#888;"></div>
        </div>
        <div class="admin-card">
            <table id="full-member-table">
                <thead><tr><th>Nr.</th><th>Name / Passwort-Status</th><th style="text-align:right;">Aktion</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const user = JSON.parse(localStorage.getItem('falcons_user') || '{}');

    let allPlayers = [], allVideos = [], selectedForSession = [];

    async function checkAuth() {
        const adminDoc = await db.collection("admins").doc(user.nr || "0").get();
        if (user.nr === "22" || adminDoc.exists) { document.body.style.display = "block"; loadBaseData(); }
        else { alert("Kein Zugriff!"); window.location.href = "index.html"; }
    }

    function openTab(id) {
        document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('tab-btn-' + id).classList.add('active');
    }

    async function loadBaseData() {
        const [pSnap, ytSnap, gSnap, trSnap, driveRes] = await Promise.all([
            db.collection("players").get(), db.collection("youtube_clips").get(),
            db.collection("games").orderBy("date", "desc").get(), db.collection("trainings").orderBy("date", "desc").get(),
            fetch('https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec').then(r => r.json())
        ]);
        allPlayers = pSnap.docs.map(d => ({id: d.id, ...d.data()}));
        allVideos = [
            ...driveRes.map(v => ({ id: v.link.split('/d/')[1].split('/')[0], title: v.title, type: 'Drive' })),
            ...ytSnap.docs.map(d => ({ id: d.id, title: d.data().title, type: 'YouTube' }))
        ];
        renderKader(); renderYT(ytSnap); renderGames(gSnap); renderTrainings(trSnap); renderSessions(); renderSessionSelector();
        loadStatusData('sessions');
    }

    function renderKader() {
        const tbody = document.querySelector("#full-member-table tbody"); tbody.innerHTML = "";
        let pinCount = 0;

        allPlayers.sort((a,b)=>a.id-b.id).forEach(p => {
            const hasPin = (p.pin && p.pin.length === 4);
            if(hasPin) pinCount++;

            const pinLabel = hasPin 
                ? '<span class="pin-badge pin-set">Passwort AKTIV</span>' 
                : '<span class="pin-badge pin-none">Kein Passwort</span>';

            tbody.innerHTML += `<tr>
                <td>#${p.id}</td>
                <td>${p.name} ${pinLabel}</td>
                <td style="text-align:right;">
                    <button class="btn-action" style="background:#444; padding:5px 10px; margin-right:5px;" onclick="resetPin('${p.id}')">PIN Reset</button>
                    <button class="btn-action" style="background:none; color:#444" onclick="deleteDoc('players','${p.id}')">🗑</button>
                </td>
            </tr>`;
        });
        document.getElementById('pin-stats').innerText = `${pinCount} von ${allPlayers.length} Spielern haben ein Passwort vergeben.`;
    }

    async function loadStatusData(mode) {
        const container = document.getElementById('status-list-container');
        container.innerHTML = "Lade Status...";
        ['sessions', 'clips', 'games', 'trainings'].forEach(m => {
            const btn = document.getElementById('mode-' + m);
            if(btn) btn.style.background = (m === mode) ? 'var(--red)' : '#444';
        });

        let viewCol = mode === 'sessions' ? 'progress' : (mode === 'clips' ? 'video_views' : (mode === 'games' ? 'game_views' : 'training_views'));
        const [itemsSnap, viewsSnap] = await Promise.all([
            mode === 'clips' ? {docs: allVideos.map(v=>({id:v.id, data:()=>v}))} : db.collection(mode).get(),
            db.collection(viewCol).get()
        ]);
        let vMap = {}; viewsSnap.forEach(d => vMap[d.id] = d.data());
        container.innerHTML = "";
        itemsSnap.docs.forEach(doc => {
            const d = doc.data();
            renderStatusAccordion(container, d.title, doc.id || d.id, (mode==='sessions'?d.videoIds.length:1), vMap, mode==='sessions');
        });
    }

    function renderStatusAccordion(cont, title, id, target, vMap, isSess) {
        let watched = [], open = [];
        allPlayers.forEach(p => {
            let val = (vMap[p.id] && vMap[p.id][id]) ? vMap[p.id][id] : 0;
            let done = isSess ? val >= target : (val === true || val === 1);
            const html = `<div class="player-tag">#${p.id} ${p.name} <span>${done?'✅':'❌'}</span></div>`;
            if(done) watched.push(html); else open.push(html);
        });
        const div = document.createElement('div'); div.className = 'status-row';
        div.innerHTML = `<div class="status-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display==='block'?'none':'block'"><span>${title}</span><span>${watched.length}/${allPlayers.length} ▼</span></div>
            <div class="status-content"><p style="color:var(--green); font-size:0.7rem;">GESEHEN</p><div class="player-status-grid">${watched.join('')}</div><p style="color:var(--red); font-size:0.7rem; margin-top:15px;">OFFEN</p><div class="player-status-grid">${open.join('')}</div></div>`;
        cont.appendChild(div);
    }

    function renderYT(snap) { const tbody = document.querySelector("#yt-table tbody"); tbody.innerHTML = ""; snap.forEach(d => tbody.innerHTML += `<tr><td>${d.data().title}</td><td><button class="btn-action" style="background:none; color:#444" onclick="deleteDoc('youtube_clips','${d.id}')">🗑</button></td></tr>`); }
    function renderGames(snap) { const tbody = document.querySelector("#games-table tbody"); tbody.innerHTML = ""; snap.forEach(d => tbody.innerHTML += `<tr><td>${d.data().title}</td><td><button class="btn-action" style="background:none; color:#444" onclick="deleteDoc('games','${d.id}')">🗑</button></td></tr>`); }
    function renderTrainings(snap) { const tbody = document.querySelector("#trainings-table tbody"); tbody.innerHTML = ""; snap.forEach(d => tbody.innerHTML += `<tr><td>${d.data().title}</td><td><button class="btn-action" style="background:none; color:#444" onclick="deleteDoc('trainings','${d.id}')">🗑</button></td></tr>`); }
    async function renderSessions() { const snap = await db.collection("sessions").orderBy("createdAt", "desc").get(); const tbody = document.querySelector("#session-table tbody"); tbody.innerHTML = ""; snap.forEach(d => tbody.innerHTML += `<tr><td>${d.data().title}</td><td><button class="btn-action" style="background:none; color:#444" onclick="deleteDoc('sessions','${d.id}')">🗑</button></td></tr>`); }
    function renderSessionSelector() { const list = document.getElementById('s-video-list'); list.innerHTML = ""; allVideos.forEach(v => list.innerHTML += `<div><input type="checkbox" onchange="toggleSelect('${v.id}')"> [${v.type}] ${v.title}</div>`); }
    function toggleSelect(id) { const i = selectedForSession.indexOf(id); if(i>-1) selectedForSession.splice(i,1); else selectedForSession.push(id); }
    async function saveSession() { await db.collection("sessions").add({ title: document.getElementById('s-title').value, description: document.getElementById('s-desc').value, videoIds: selectedForSession, createdAt: new Date() }); location.reload(); }
    async function addYT() { const u = document.getElementById('yt-url').value; const ytId = u.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/ytscreeningroom\?v=|live\/|shorts\/))([\w\-]{11})/)?.[1]; await db.collection("youtube_clips").add({ title: document.getElementById('yt-title').value, ytId, category: document.getElementById('yt-cat-in').value, createdAt: new Date() }); location.reload(); }
    async function addGame() { const u = document.getElementById('g-url').value; const ytId = u.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/ytscreeningroom\?v=|live\/|shorts\/))([\w\-]{11})/)?.[1]; await db.collection("games").add({ title: document.getElementById('g-title').value, ytId, date: document.getElementById('g-date').value, createdAt: new Date() }); location.reload(); }
    async function addTraining() { const u = document.getElementById('t-url').value; const ytId = u.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/ytscreeningroom\?v=|live\/|shorts\/))([\w\-]{11})/)?.[1]; await db.collection("trainings").add({ title: document.getElementById('t-title').value, ytId, date: document.getElementById('t-date').value, createdAt: new Date() }); location.reload(); }
    async function addMember() { let nr = document.getElementById('p-nr').value; if(nr.length===1) nr="0"+nr; await db.collection("players").doc(nr).set({ name: document.getElementById('p-name').value, nr }); location.reload(); }
    async function resetPin(id) { if(confirm("Passwort zurücksetzen?")) { await db.collection("players").doc(id).update({ pin: firebase.firestore.FieldValue.delete() }); alert("Passwort gelöscht."); loadBaseData(); } }
    async function deleteDoc(col, id) { if(confirm("Löschen?")) { await db.collection(col).doc(id).delete(); location.reload(); } }
    
    checkAuth();
</script>
</body>
</html>
