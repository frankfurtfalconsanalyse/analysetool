<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Admin | Kader & Videos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --card: #1a1a1a; }
        body { font-family: 'Montserrat'; background: var(--bg); color: white; padding: 20px; }
        .section { background: var(--card); padding: 20px; border-radius: 10px; margin-bottom: 30px; border: 1px solid #333; }
        input, select, button { padding: 10px; margin: 5px; border-radius: 4px; border: 1px solid #444; background: #222; color: white; }
        button { background: var(--red); border: none; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { background: var(--red); }
    </style>
</head>
<body>
    <h1>Falcons Team Management</h1>

    <!-- SPIELER VERWALTUNG -->
    <div class="section">
        <h3>Kader pflegen</h3>
        <input type="number" id="p-nr" placeholder="Nr.">
        <input type="text" id="p-name" placeholder="Name">
        <select id="p-pos">
            <option value="Angriff">Angriff</option>
            <option value="Center">Center</option>
            <option value="Verteidigung">Verteidigung</option>
            <option value="Goalie">Goalie</option>
        </select>
        <button onclick="addPlayer()">Spieler hinzufügen</button>
        <table id="player-table">
            <thead><tr><th>Nr.</th><th>Name</th><th>Position</th><th>Aktion</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- VIDEO VERWALTUNG (Drive Sync) -->
    <div class="section">
        <h3>Video Zuordnung</h3>
        <table id="video-table">
            <thead><tr><th>Video</th><th>Position</th><th>Speichern</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // SPIELER LOGIK
        async function addPlayer() {
            const nr = document.getElementById('p-nr').value;
            const name = document.getElementById('p-name').value;
            const pos = document.getElementById('p-pos').value;
            if(!nr || !name) return;
            await db.collection("players").doc(nr).set({ name, pos, nr });
            location.reload();
        }

        async function loadData() {
            // Spieler laden
            const pSnap = await db.collection("players").get();
            const pBody = document.querySelector("#player-table tbody");
            pSnap.forEach(doc => {
                const p = doc.data();
                pBody.innerHTML += `<tr><td>${p.nr}</td><td>${p.name}</td><td>${p.pos}</td><td><button onclick="deleteDoc('players','${p.nr}')">X</button></td></tr>`;
            });

            // Videos laden (Drive)
            const driveRes = await fetch('https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec');
            const driveData = await driveRes.json();
            const metaSnap = await db.collection("video_metadata").get();
            let meta = {}; metaSnap.forEach(d => meta[d.id] = d.data().position);

            const vBody = document.querySelector("#video-table tbody");
            driveData.forEach(v => {
                const id = v.link.split('/d/')[1].split('/')[0];
                vBody.innerHTML += `<tr>
                    <td>${v.title}</td>
                    <td><select id="v-${id}"><option value="Angriff" ${meta[id]==='Angriff'?'selected':''}>Angriff</option><option value="Center" ${meta[id]==='Center'?'selected':''}>Center</option><option value="Verteidigung" ${meta[id]==='Verteidigung'?'selected':''}>Verteidigung</option><option value="Goalie" ${meta[id]==='Goalie'?'selected':''}>Goalie</option><option value="Alle" ${meta[id]==='Alle'?'selected':''}>Alle</option></select></td>
                    <td><button onclick="saveVideoMeta('${id}')">Save</button></td>
                </tr>`;
            });
        }

        async function saveVideoMeta(id) {
            const pos = document.getElementById('v-'+id).value;
            await db.collection("video_metadata").doc(id).set({ position: pos });
            alert("Gespeichert");
        }

        async function deleteDoc(col, id) { if(confirm("Löschen?")) { await db.collection(col).doc(id).delete(); location.reload(); } }
        loadData();
    </script>
</body>
</html>
