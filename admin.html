<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Falcons Admin | Positionen Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --black: #000; --dark: #121212; --gray: #1e1e1e; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; padding: 30px; margin: 0; }
        h1 { border-bottom: 3px solid var(--red); padding-bottom: 10px; margin-bottom: 30px; }
        
        #status-container { text-align: center; padding: 50px; }
        .error-box { background: #3d0000; border: 1px solid var(--red); color: #ff9999; padding: 20px; border-radius: 8px; display: none; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; background: var(--gray); display: none; margin-top: 20px; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        th { background: var(--red); color: white; text-transform: uppercase; font-size: 0.8rem; position: sticky; top: 0; }
        
        select { padding: 8px; background: #333; color: white; border: 1px solid var(--red); border-radius: 4px; width: 100%; }
        .btn-save { background: var(--red); color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-save:disabled { background: #555; cursor: not-allowed; }

        /* Loader Animation */
        .loader { border: 4px solid #333; border-top: 4px solid var(--red); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1>Falcons Video-Management</h1>

    <!-- Fehlermeldung -->
    <div id="error-box" class="error-box">
        <h3>Fehler beim Laden der Daten</h3>
        <p id="error-message"></p>
        <button onclick="location.reload()" style="background:white; border:none; padding:10px; cursor:pointer; font-weight:bold;">Erneut versuchen</button>
    </div>

    <!-- Lade-Anzeige -->
    <div id="status-container">
        <div id="loader" class="loader"></div>
        <p id="status-text">Daten von Google Drive und Firebase werden synchronisiert...</p>
    </div>

    <!-- Haupt-Tabelle -->
    <table id="admin-table">
        <thead>
            <tr>
                <th>Video Titel</th>
                <th>Kategorie (Drive Ordner)</th>
                <th>Position zuweisen</th>
                <th style="width: 150px;">Aktion</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        // FIREBASE KONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU",
            authDomain: "falcons-video-tool.firebaseapp.com",
            projectId: "falcons-video-tool",
            storageBucket: "falcons-video-tool.firebasestorage.app",
            messagingSenderId: "306689889088",
            appId: "1:306689889088:web:ad525fecd0682069c6e0a5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // GOOGLE APPS SCRIPT URL
        const DRIVE_API_URL = 'https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec';

        async function init() {
            const table = document.getElementById('admin-table');
            const statusContainer = document.getElementById('status-container');
            const errorBox = document.getElementById('error-box');
            const errorMessage = document.getElementById('error-message');

            try {
                // 1. Daten laden (Drive und Firebase parallel)
                const [driveRes, metaSnap] = await Promise.all([
                    fetch(DRIVE_API_URL).then(r => {
                        if (!r.ok) throw new Error("Google Drive API nicht erreichbar.");
                        return r.json();
                    }),
                    db.collection("video_metadata").get().catch(err => {
                        throw new Error("Keine Verbindung zur Firebase Datenbank.");
                    })
                ]);

                // 2. Metadaten-Map erstellen
                let metaData = {};
                metaSnap.forEach(doc => { metaData[doc.id] = doc.data().position; });

                // 3. Tabelle befüllen
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = ""; // Leer machen

                driveRes.forEach(v => {
                    const fileId = v.link.split('/d/')[1].split('/')[0];
                    const currentPos = metaData[fileId] || "Nicht zugewiesen";

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${v.title}</td>
                        <td><strong>${v.category}</strong></td>
                        <td>
                            <select id="pos-${fileId}">
                                <option value="Nicht zugewiesen" ${currentPos==='Nicht zugewiesen'?'selected':''}>Wählen...</option>
                                <option value="Angriff" ${currentPos==='Angriff'?'selected':''}>Angriff</option>
                                <option value="Center" ${currentPos==='Center'?'selected':''}>Center</option>
                                <option value="Verteidigung" ${currentPos==='Verteidigung'?'selected':''}>Verteidigung</option>
                                <option value="Goalie" ${currentPos==='Goalie'?'selected':''}>Goalie</option>
                                <option value="Alle" ${currentPos==='Alle'?'selected':''}>Alle Positionen</option>
                            </select>
                        </td>
                        <td>
                            <button class="btn-save" id="btn-${fileId}" onclick="savePosition('${fileId}')">Speichern</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                // UI umschalten
                statusContainer.style.display = 'none';
                table.style.display = 'table';

            } catch (e) {
                // Fehler anzeigen
                statusContainer.style.display = 'none';
                errorBox.style.display = 'block';
                errorMessage.innerText = e.message;
                console.error("Init-Fehler:", e);
            }
        }

        async function savePosition(fileId) {
            const btn = document.getElementById('btn-' + fileId);
            const pos = document.getElementById('pos-' + fileId).value;

            btn.innerText = "Wird gespeichert...";
            btn.disabled = true;

            try {
                await db.collection("video_metadata").doc(fileId).set({
                    position: pos,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                btn.innerText = "Gespeichert!";
                btn.style.background = "#28a745";

                setTimeout(() => {
                    btn.innerText = "Speichern";
                    btn.style.background = "#e30613";
                    btn.disabled = false;
                }, 2000);

            } catch (e) {
                alert("Fehler beim Speichern: " + e.message);
                btn.innerText = "Fehler!";
                btn.style.background = "#e30613";
                btn.disabled = false;
            }
        }

        // Start
        init();
    </script>
</body>
</html>
