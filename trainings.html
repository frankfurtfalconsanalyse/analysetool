<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons | Trainings Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --card: #1a1a1a; }
        body { font-family: 'Montserrat'; background: var(--bg); color: white; margin: 0; }
        header { background: #000; padding: 20px; border-bottom: 4px solid var(--red); display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; }
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .training-card { background: var(--card); border-radius: 15px; border: 1px solid #333; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .training-card:hover { border-color: var(--red); transform: translateY(-5px); }
        .thumb { width: 100%; height: 180px; background-size: cover; background-position: center; background-color: #222; }
        .training-info { padding: 20px; }
        .btn-back { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <h1 style="margin:0; font-size: 1.2rem;">FALCONS <span style="color:var(--red)">TRAININGS HUB</span></h1>
        <a href="index.html" class="btn-back">← ZURÜCK ZUM HUB</a>
    </header>
    <div class="container">
        <h2 style="border-left: 4px solid var(--red); padding-left: 15px; margin-bottom: 30px; text-transform: uppercase;">Vergangene Trainings</h2>
        <div id="training-grid" class="grid"></div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadTrainings() {
            const snap = await db.collection("trainings").orderBy("date", "desc").get();
            const grid = document.getElementById('training-grid');
            snap.forEach(doc => {
                const t = doc.data();
                const thumbUrl = `https://img.youtube.com/vi/${t.ytId}/mqdefault.jpg`;
                grid.innerHTML += `
                    <div class="training-card" onclick="location.href='training_view.html?id=${doc.id}'">
                        <div class="thumb" style="background-image: url('${thumbUrl}')"></div>
                        <div class="training-info">
                            <h3 style="margin:0; text-transform:uppercase; font-size:1rem;">${t.title}</h3>
                            <p style="color:#888; font-size:0.8rem; margin:10px 0 0 0;">${new Date(t.date).toLocaleDateString('de-DE')}</p>
                        </div>
                    </div>`;
            });
        }
        loadTrainings();
    </script>
</body>
</html>
