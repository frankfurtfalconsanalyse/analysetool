<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Falcons Hub | Taktik Pro Touch</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --card: #1a1a1a; --floor: #ffffff; --line: #000000; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; touch-action: none; }

        header { background: #000; padding: 10px 25px; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-weight: 900; text-transform: uppercase; letter-spacing: 1px; font-size: 1rem; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }

        /* TOOLS */
        .toolbar { width: 70px; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 15px; }
        .tool { width: 45px; height: 45px; background: #222; border: 1px solid #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; }
        .tool.active { border-color: var(--red); background: #2a2a2a; }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #000; cursor: pointer; margin: 5px 0; }

        /* RINK */
        .rink-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #1a1a1a; padding: 10px; }
        #rink { 
            width: 960px; height: 560px; background: var(--floor); border: 4px solid #000; border-radius: 60px; position: relative; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8); overflow: hidden;
        }

        /* LINIEN */
        .line { position: absolute; background: #000; pointer-events: none; }
        .center-line { width: 3px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
        .center-circle { width: 40px; height: 40px; border: 3px solid #000; border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%, -50%); position: absolute; }
        .torraum { position: absolute; border: 3px solid #000; width: 120px; height: 180px; top: 50%; transform: translateY(-50%); }
        .schutzraum { position: absolute; border: 3px solid #000; width: 40px; height: 100px; top: 50%; transform: translateY(-50%); }
        .goal-box { position: absolute; width: 24px; height: 64px; border: 4px solid #000; top: 50%; transform: translateY(-50%); background: #fff; z-index: 5; }

        /* SPIELER & BALL */
        .player { width: 36px; height: 36px; border-radius: 50%; position: absolute; z-index: 100; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid #000; cursor: move; user-select: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); touch-action: none; }
        .p-falcons { background: var(--red); color: white; }
        .p-opponent { background: #fff; color: #000; }
        .p-ball { width: 18px; height: 18px; background: orange; z-index: 101; border-radius: 50%; border: 2px solid #000; }

        #draw-canvas { position: absolute; top: 0; left: 0; z-index: 50; pointer-events: none; }
        #draw-canvas.active { pointer-events: auto; }

        /* SIDEBAR RECHTS */
        .sidebar-right { width: 200px; background: #111; border-left: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
        .bench { display: flex; justify-content: space-around; padding-bottom: 20px; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .bench-item { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid #000; cursor: pointer; }
        
        .tactic-list { flex: 1; overflow-y: auto; margin-bottom: 15px; }
        .tactic-item { padding: 10px; background: #222; border-radius: 6px; margin-bottom: 8px; font-size: 0.75rem; cursor: pointer; border-left: 3px solid var(--red); display: flex; justify-content: space-between; }

        .trash { width: 100%; height: 50px; border: 2px dashed #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #444; font-size: 1.5rem; margin-bottom: 15px; }
        .trash.hover { border-color: var(--red); color: var(--red); background: rgba(227,6,19,0.1); }
        input { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
        .btn-red { background: var(--red); color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">Falcons <span>Tactic Hub</span></div>
    <button style="background:#333; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;" onclick="location.href='index.html'">← Zurück</button>
</header>

<div class="main-layout">
    <div class="toolbar">
        <div class="tool active" id="btn-move" onclick="setMode('move')">🖐️</div>
        <div class="tool" id="btn-draw" onclick="setMode('draw')">✏️</div>
        <div class="tool" onclick="undo()">↩️</div>
        <div class="tool" onclick="clearBoard()">🗑</div>
        <hr style="width:40%; border-color:#333;">
        <div class="color-dot" style="background:#e30613;" onclick="setColor('#e30613')"></div>
        <div class="color-dot" style="background:#0055ff;" onclick="setColor('#0055ff')"></div>
        <div class="color-dot" style="background:#000000;" onclick="setColor('#000000')"></div>
    </div>

    <div class="rink-container">
        <div id="rink">
            <div class="line center-line"></div>
            <div class="center-circle"></div>
            <!-- Links -->
            <div class="torraum" style="left: 120px; border-left: none;"></div>
            <div class="schutzraum" style="left: 120px; border-left: none;"></div>
            <div class="goal-box" style="left: 120px;"></div>
            <!-- Rechts -->
            <div class="torraum" style="right: 120px; border-right: none;"></div>
            <div class="schutzraum" style="right: 120px; border-right: none;"></div>
            <div class="goal-box" style="right: 120px;"></div>

            <canvas id="draw-canvas"></canvas>
            <div id="players-layer"></div>
        </div>
    </div>

    <div class="sidebar-right">
        <small style="color:#555; font-weight:900; margin-bottom:10px; display:block;">BANK</small>
        <div class="bench">
            <div class="bench-item p-falcons" onmousedown="spawn('falcons')" ontouchstart="spawn('falcons')">F</div>
            <div class="bench-item p-opponent" onmousedown="spawn('opponent')" ontouchstart="spawn('opponent')">G</div>
            <div class="bench-item p-ball" onmousedown="spawn('ball')" ontouchstart="spawn('ball')" style="width:22px; height:22px; background:orange;"></div>
        </div>

        <div class="tactic-list">
            <small style="color:#555; font-weight:900; margin-bottom:10px; display:block;">GESPEICHERT</small>
            <div id="list-container"></div>
        </div>

        <div class="trash" id="trash">🗑</div>
        <input type="text" id="t-name" placeholder="Titel...">
        <button class="btn-red" onclick="saveTactic()">SPEICHERN</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const rink = document.getElementById('rink');
    const canvas = document.getElementById('draw-canvas');
    const ctx = canvas.getContext('2d');
    const trash = document.getElementById('trash');

    let mode = 'move', penColor = '#e30613', isDrawing = false, history = [], draggedEl = null, offset = {x:17, y:17};

    window.onload = () => {
        canvas.width = rink.offsetWidth;
        canvas.height = rink.offsetHeight;
        saveState();
        loadTacticsList();
    };

    // --- UNIVERSAL DRAG LOGIC (MOUSE & TOUCH) ---
    function spawn(type) {
        setMode('move');
        const el = document.createElement('div');
        el.className = 'player ' + (type === 'ball' ? 'p-ball' : (type === 'falcons' ? 'p-falcons' : 'p-opponent'));
        el.innerHTML = type === 'ball' ? '' : (type === 'falcons' ? 'F' : 'G');
        el.style.left = "50%"; el.style.top = "50%";
        document.getElementById('players-layer').appendChild(el);
        draggedEl = el;
    }

    function handleStart(e) {
        if(e.target.classList.contains('player')) {
            if(mode !== 'move') return;
            draggedEl = e.target;
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            const rect = draggedEl.getBoundingClientRect();
            offset.x = clientX - rect.left;
            offset.y = clientY - rect.top;
        }
    }

    function handleMove(e) {
        if(!draggedEl) return;
        e.preventDefault();
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        
        const rinkRect = rink.getBoundingClientRect();
        let x = clientX - rinkRect.left - offset.x;
        let y = clientY - rinkRect.top - offset.y;
        
        draggedEl.style.left = x + 'px';
        draggedEl.style.top = y + 'px';

        const tRect = trash.getBoundingClientRect();
        trash.classList.toggle('hover', clientX > tRect.left && clientX < tRect.right && clientY > tRect.top && clientY < tRect.bottom);
    }

    function handleEnd(e) {
        if(!draggedEl) return;
        const clientX = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.changedTouches[0].clientY : e.clientY;
        
        const tRect = trash.getBoundingClientRect();
        if(clientX > tRect.left && clientX < tRect.right && clientY > tRect.top && clientY < tRect.bottom) {
            draggedEl.remove();
        }
        draggedEl = null; trash.classList.remove('hover');
    }

    document.addEventListener('mousedown', handleStart);
    document.addEventListener('mousemove', handleMove);
    document.addEventListener('mouseup', handleEnd);
    document.addEventListener('touchstart', handleStart, {passive: false});
    document.addEventListener('touchmove', handleMove, {passive: false});
    document.addEventListener('touchend', handleEnd);

    // --- DRAW LOGIK (MOUSE & TOUCH) ---
    function setMode(m) {
        mode = m;
        document.getElementById('btn-move').classList.toggle('active', m==='move');
        document.getElementById('btn-draw').classList.toggle('active', m==='draw');
        canvas.classList.toggle('active', m==='draw');
    }
    function setColor(c) { penColor = c; }
    function saveState() { if(history.length > 30) history.shift(); history.push(canvas.toDataURL()); }
    function undo() {
        if(history.length <= 1) return;
        history.pop();
        const img = new Image(); img.src = history[history.length - 1];
        img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
    }
    function clearBoard() { if(confirm("Board leeren?")) { ctx.clearRect(0,0,canvas.width,canvas.height); document.querySelectorAll('.player').forEach(p=>p.remove()); saveState(); } }

    function startDraw(e) {
        if(mode !== 'draw') return;
        isDrawing = true;
        saveState();
        ctx.beginPath();
        ctx.strokeStyle = penColor;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        const rect = canvas.getBoundingClientRect();
        ctx.moveTo(clientX - rect.left, clientY - rect.top);
    }

    function moveDraw(e) {
        if(!isDrawing) return;
        e.preventDefault();
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(clientX - rect.left, clientY - rect.top);
        ctx.stroke();
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', moveDraw);
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('touchstart', startDraw, {passive: false});
    canvas.addEventListener('touchmove', moveDraw, {passive: false});
    canvas.addEventListener('touchend', () => isDrawing = false);

    // --- FIREBASE SAVE/LOAD ---
    async function saveTactic() {
        const title = document.getElementById('t-name').value;
        if(!title) return alert("Name fehlt!");
        const players = [];
        document.querySelectorAll('.player').forEach(p => {
            players.push({ type: p.classList.contains('p-falcons')?'falcons':(p.classList.contains('p-ball')?'ball':'opponent'), x: p.style.left, y: p.style.top });
        });
        await db.collection("tactics").add({ title, players, drawing: canvas.toDataURL(), createdAt: new Date() });
        alert("Board gespeichert!"); document.getElementById('t-name').value = ""; loadTacticsList();
    }

    async function loadTacticsList() {
        const snap = await db.collection("tactics").orderBy("createdAt", "desc").get();
        const cont = document.getElementById('list-container'); cont.innerHTML = "";
        snap.forEach(doc => {
            const div = document.createElement('div'); div.className="tactic-item";
            div.innerHTML = `<span>${doc.data().title}</span><span onclick="event.stopPropagation(); deleteTac('${doc.id}')">🗑</span>`;
            div.onclick = () => loadTactic(doc.id);
            cont.appendChild(div);
        });
    }

    async function loadTactic(id) {
        const doc = await db.collection("tactics").doc(id).get();
        const d = doc.data();
        document.querySelectorAll('.player').forEach(p=>p.remove());
        ctx.clearRect(0,0,canvas.width,canvas.height);
        d.players.forEach(p => {
            const el = document.createElement('div');
            el.className = 'player ' + (p.type === 'ball' ? 'p-ball' : (p.type === 'falcons' ? 'p-falcons' : 'p-opponent'));
            el.innerHTML = p.type==='ball'?'':(p.type==='falcons'?'F':'G');
            el.style.left = p.x; el.style.top = p.y;
            document.getElementById('players-layer').appendChild(el);
        });
        const img = new Image(); img.src = d.drawing;
        img.onload = () => { ctx.drawImage(img,0,0); saveState(); };
    }

    async function deleteTac(id) { if(confirm("Löschen?")) { await db.collection("tactics").doc(id).delete(); loadTacticsList(); } }
</script>
</body>
</html>
