<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Hub | Taktik Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --card: #1a1a1a; --floor: #ffffff; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

        header { background: #000; padding: 10px 25px; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; }

        /* TOOLBAR LINKS */
        .toolbar { width: 70px; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 15px; }
        .tool { width: 45px; height: 45px; background: #222; border: 1px solid #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 1.2rem; }
        .tool:hover, .tool.active { border-color: var(--red); background: #2a2a2a; }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #000; cursor: pointer; margin: 5px 0; }

        /* SPIELFELD BEREICH */
        .rink-container { flex: 1; position: relative; padding: 20px; display: flex; align-items: center; justify-content: center; background: #111; }
        
        #rink { 
            width: 900px; height: 450px; background: var(--floor); border: 4px solid #000; border-radius: 60px; position: relative; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); overflow: hidden;
        }

        /* MARKIERUNGEN NACH VORLAGE */
        .line { position: absolute; background: #000; pointer-events: none; }
        .center-line { width: 3px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
        .center-dot { width: 16px; height: 16px; background: #000; border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        
        /* Bullykreuze (+) */
        .cross { position: absolute; width: 20px; height: 20px; pointer-events: none; }
        .cross::before { content: ""; position: absolute; background: #000; width: 100%; height: 2px; top: 50%; left: 0; }
        .cross::after { content: ""; position: absolute; background: #000; width: 2px; height: 100%; left: 50%; top: 0; }

        /* Torräume (Rechtecke) */
        .goal-area { position: absolute; border: 2px solid #000; pointer-events: none; }
        .area-large { width: 112px; height: 90px; top: 50%; transform: translateY(-50%); }
        .area-small { width: 22px; height: 67px; top: 50%; transform: translateY(-50%); }

        /* SPIELER */
        .player { width: 34px; height: 34px; border-radius: 50%; position: absolute; z-index: 100; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid #000; cursor: move; user-select: none; }
        .p-falcons { background: var(--red); color: white; }
        .p-opponent { background: #fff; color: #000; }
        .p-ball { width: 14px; height: 14px; background: #ffcc00; z-index: 101; }

        #draw-canvas { position: absolute; top: 0; left: 0; z-index: 50; pointer-events: none; }
        #draw-canvas.active { pointer-events: auto; cursor: crosshair; }

        /* SEITENLEISTE RECHTS (BANK & LADEN) */
        .sidebar-right { width: 200px; background: #111; border-left: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
        .bench { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .bench-item { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: grab; border: 2px solid #000; }
        
        .tactic-list { flex: 1; overflow-y: auto; }
        .tactic-item { padding: 8px; background: #222; border-radius: 5px; margin-bottom: 5px; font-size: 0.75rem; cursor: pointer; display: flex; justify-content: space-between; }
        .tactic-item:hover { background: #333; }

        .save-area { margin-top: auto; }
        input { background: #222; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn-red { background: var(--red); color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; }
        .trash { width: 100%; height: 40px; border: 2px dashed #444; display: flex; align-items: center; justify-content: center; margin-top: 10px; color: #444; font-size: 1.2rem; }
        .trash.hover { border-color: var(--red); color: var(--red); background: rgba(227, 6, 19, 0.1); }
    </style>
</head>
<body>

<header>
    <div class="logo">Falcons <span>Tactic Pro</span></div>
    <button class="btn-red" style="width:auto; padding: 5px 15px;" onclick="window.location.href='index.html'">Hub verlassen</button>
</header>

<div class="main-layout">
    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="tool active" id="btn-move" onclick="setMode('move')">🖐️</div>
        <div class="tool" id="btn-draw" onclick="setMode('draw')">✏️</div>
        <div class="tool" onclick="undo()">↩️</div>
        <div class="tool" onclick="clearBoard()">🗑</div>
        <hr style="width:40%; border-color:#333;">
        <div class="color-dot" style="background:red;" onclick="setColor('#e30613')"></div>
        <div class="color-dot" style="background:blue;" onclick="setColor('blue')"></div>
        <div class="color-dot" style="background:black;" onclick="setColor('black')"></div>
    </div>

    <!-- FIELD -->
    <div class="rink-container">
        <div id="rink">
            <div class="line center-line"></div>
            <div class="center-dot"></div>
            <!-- Bullykreuze -->
            <div class="cross" style="top: 15%; left: 20%;"></div>
            <div class="cross" style="bottom: 15%; left: 20%;"></div>
            <div class="cross" style="top: 15%; right: 20%;"></div>
            <div class="cross" style="bottom: 15%; right: 20%;"></div>
            <div class="cross" style="top: 50%; left: 45%; transform: translateY(-50%);"></div>
            <div class="cross" style="top: 50%; right: 45%; transform: translateY(-50%);"></div>
            
            <!-- Torräume Links -->
            <div class="goal-area area-large" style="left:0; border-left:none;"></div>
            <div class="goal-area area-small" style="left:0; border-left:none;"></div>
            <!-- Torräume Rechts -->
            <div class="goal-area area-large" style="right:0; border-right:none;"></div>
            <div class="goal-area area-small" style="right:0; border-right:none;"></div>

            <canvas id="draw-canvas"></canvas>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar-right">
        <div class="bench">
            <div class="bench-item p-falcons" onmousedown="spawn('falcons')">F</div>
            <div class="bench-item p-opponent" onmousedown="spawn('opponent')">G</div>
            <div class="bench-item p-ball" onmousedown="spawn('ball')" style="border-radius:50%"></div>
        </div>

        <div class="tactic-list" id="tactic-list">
            <small style="color:#555;">GESPEICHERTE BOARDS</small>
            <div id="list-container"></div>
        </div>

        <div class="save-area">
            <div class="trash" id="trash">🗑</div>
            <input type="text" id="t-name" placeholder="Titel...">
            <button class="btn-red" onclick="saveTactic()">Speichern</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const rink = document.getElementById('rink');
    const canvas = document.getElementById('draw-canvas');
    const ctx = canvas.getContext('2d');
    const trash = document.getElementById('trash');

    let mode = 'move', penColor = '#e30613', isDrawing = false, history = [], draggedEl = null, offset = {x:0, y:0};

    window.onload = () => {
        canvas.width = rink.offsetWidth;
        canvas.height = rink.offsetHeight;
        saveState();
        loadTacticsList();
    };

    // --- DRAG & DROP (FIXED) ---
    function spawn(type) {
        setMode('move');
        const el = document.createElement('div');
        el.className = 'player ' + (type === 'ball' ? 'p-ball' : (type === 'falcons' ? 'p-falcons' : 'p-opponent'));
        el.innerHTML = type === 'ball' ? '' : (type === 'falcons' ? 'F' : 'G');
        el.style.left = "50%"; el.style.top = "50%";
        rink.appendChild(el);
        draggedEl = el;
    }

    document.addEventListener('mousedown', e => {
        if(e.target.classList.contains('player')) {
            if(mode !== 'move') return;
            draggedEl = e.target;
            const rect = draggedEl.getBoundingClientRect();
            offset.x = e.clientX - rect.left;
            offset.y = e.clientY - rect.top;
        }
    });

    document.addEventListener('mousemove', e => {
        if(!draggedEl) return;
        const rinkRect = rink.getBoundingClientRect();
        let x = e.clientX - rinkRect.left - offset.x;
        let y = e.clientY - rinkRect.top - offset.y;
        draggedEl.style.left = x + 'px';
        draggedEl.style.top = y + 'px';

        const trashRect = trash.getBoundingClientRect();
        trash.classList.toggle('hover', e.clientX > trashRect.left && e.clientX < trashRect.right && e.clientY > trashRect.top && e.clientY < trashRect.bottom);
    });

    document.addEventListener('mouseup', e => {
        if(!draggedEl) return;
        const trashRect = trash.getBoundingClientRect();
        if(e.clientX > trashRect.left && e.clientX < trashRect.right && e.clientY > trashRect.top && e.clientY < trashRect.bottom) {
            draggedEl.remove();
        }
        draggedEl = null; trash.classList.remove('hover');
    });

    // --- ZEICHNEN & UNDO ---
    function setMode(m) {
        mode = m;
        document.getElementById('btn-move').classList.toggle('active', mode === 'move');
        document.getElementById('btn-draw').classList.toggle('active', mode === 'draw');
        canvas.classList.toggle('active', mode === 'draw');
    }
    function setColor(c) { penColor = c; }
    function saveState() { if (history.length > 30) history.shift(); history.push(canvas.toDataURL()); }
    function undo() {
        if (history.length <= 1) return;
        history.pop();
        const img = new Image(); img.src = history[history.length - 1];
        img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
    }
    function clearBoard() { if(confirm("Löschen?")) { ctx.clearRect(0,0,canvas.width, canvas.height); document.querySelectorAll('.player').forEach(p => p.remove()); saveState(); } }

    canvas.onmousedown = (e) => { if(mode !== 'draw') return; isDrawing = true; ctx.beginPath(); ctx.strokeStyle = penColor; ctx.lineWidth = 4; ctx.lineCap = 'round'; const rect = canvas.getBoundingClientRect(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top); };
    canvas.onmousemove = (e) => { if(!isDrawing) return; const rect = canvas.getBoundingClientRect(); ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top); ctx.stroke(); };
    canvas.onmouseup = () => { if(isDrawing) { isDrawing = false; saveState(); } };

    // --- SPEICHERN & LADEN ---
    async function saveTactic() {
        const title = document.getElementById('t-name').value;
        if(!title) return alert("Name fehlt!");

        const players = [];
        document.querySelectorAll('.player').forEach(p => {
            players.push({ type: p.classList.contains('p-falcons') ? 'falcons' : (p.classList.contains('p-ball') ? 'ball' : 'opponent'), x: p.style.left, y: p.style.top });
        });

        await db.collection("tactics").add({
            title, players, drawing: canvas.toDataURL(), createdAt: new Date()
        });
        alert("Gespeichert!"); loadTacticsList();
    }

    async function loadTacticsList() {
        const snap = await db.collection("tactics").orderBy("createdAt", "desc").get();
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            const div = document.createElement('div');
            div.className = "tactic-item";
            div.innerHTML = `<span>${d.title}</span><span onclick="deleteTactic('${doc.id}')">🗑</span>`;
            div.onclick = (e) => { if(e.target.tagName !== 'SPAN' || e.target.innerHTML !== '🗑') loadTactic(doc.id); };
            container.appendChild(div);
        });
    }

    async function loadTactic(id) {
        const doc = await db.collection("tactics").doc(id).get();
        const d = doc.data();
        // Board leeren
        document.querySelectorAll('.player').forEach(p => p.remove());
        ctx.clearRect(0,0,canvas.width, canvas.height);
        
        // Spieler setzen
        d.players.forEach(p => {
            const el = document.createElement('div');
            el.className = 'player ' + (p.type === 'ball' ? 'p-ball' : (p.type === 'falcons' ? 'p-falcons' : 'p-opponent'));
            el.innerHTML = p.type === 'ball' ? '' : (p.type === 'falcons' ? 'F' : 'G');
            el.style.left = p.x; el.style.top = p.y;
            rink.appendChild(el);
        });

        // Zeichnung laden
        const img = new Image(); img.src = d.drawing;
        img.onload = () => { ctx.drawImage(img, 0, 0); saveState(); };
    }

    async function deleteTactic(id) { if(confirm("Löschen?")) { await db.collection("tactics").doc(id).delete(); loadTacticsList(); } }
</script>
</body>
</html>
