<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Falcons Taktik-Board</title>
    <style>
        body { background: #0d0d0d; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .rink { 
            width: 900px; height: 450px; background: #222; border: 4px solid #fff; 
            margin: 40px auto; position: relative; border-radius: 20px; 
            background-image: radial-gradient(circle at 50% 50%, transparent 60px, white 60px, white 62px, transparent 62px);
        }
        .center-line { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: white; }
        .player { 
            width: 35px; height: 35px; border-radius: 50%; position: absolute; z-index: 10;
            cursor: move; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #000;
        }
        .falcons { background: #e30613; color: white; }
        .opponent { background: #fff; color: #000; }
        .controls { padding: 20px; background: #1a1a1a; }
        .btn { background: #e30613; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 0 5px; }
    </style>
</head>
<body>
    <div class="controls">
        <h2 style="margin:0 0 15px 0;">📋 FLOORBALL TAKTIK-BOARD</h2>
        <button class="btn" onclick="addP('falcons')">+ FALCONS</button>
        <button class="btn" onclick="addP('opponent')">+ GEGNER</button>
        <button class="btn" style="background:#555;" onclick="location.href='index.html'">ZURÜCK</button>
    </div>
    <div class="rink" id="rink"><div class="center-line"></div></div>

    <script>
        function addP(team) {
            const p = document.createElement('div');
            p.className = 'player ' + team;
            p.innerHTML = team === 'falcons' ? 'F' : 'G';
            p.style.left = "50px"; p.style.top = "50px";
            p.onmousedown = (e) => {
                let el = e.target;
                document.onmousemove = (e) => {
                    el.style.left = e.pageX - 17 + 'px';
                    el.style.top = e.pageY - 120 + 'px';
                };
                document.onmouseup = () => document.onmousemove = null;
            };
            document.getElementById('rink').appendChild(p);
        }
    </script>
</body>
</html>
