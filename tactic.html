<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Hub | Taktik Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --card: #1a1a1a; --floor: #252525; --line: rgba(255,255,255,0.9); }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

        header { background: #000; padding: 15px 25px; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }

        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* LINKER TOOLBAR */
        .toolbar { width: 70px; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; z-index: 10; }
        .tool { width: 45px; height: 45px; background: #222; border: 1px solid #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 1.2rem; }
        .tool:hover, .tool.active { border-color: var(--red); background: #2a2a2a; }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid white; cursor: pointer; }

        /* RECHTE BANK (SPIELER-VORRAT) */
        .side-bench { width: 100px; background: #111; border-left: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 15px; z-index: 10; }
        .bench-item { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: grab; border: 2px solid #000; box-shadow: 0 4px 6px rgba(0,0,0,0.4); user-select: none; }
        .falcons-player { background: var(--red); color: white; }
        .opponent-player { background: white; color: black; }
        .ball-item { width: 18px; height: 18px; background: orange; border-radius: 50%; border: 2px solid #000; cursor: grab; }
        
        .trash-zone { margin-top: auto; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border: 2px dashed #444; border-radius: 10px; color: #444; transition: 0.3s; }
        .trash-zone.hover { border-color: var(--red); color: var(--red); background: rgba(227, 6, 19, 0.1); }

        /* RINK BEREICH */
        .rink-container { flex: 1; position: relative; padding: 40px; display: flex; align-items: center; justify-content: center; background: #080808; cursor: default; }
        
        /* Floorball Feld 40x20m (Maßstab 1m = 22.5px) */
        #rink { 
            width: 900px; height: 450px; background: var(--floor); border: 4px solid #fff; border-radius: 10px; position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Floorball Linien */
        .line { position: absolute; border: 2px solid var(--line); pointer-events: none; }
        .center-line { width: 0; height: 100%; left: 50%; top: 0; border-style: dashed; opacity: 0.5; }
        .center-circle { width: 60px; height: 60px; border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        /* Torraum (5x4m) */
        .goal-area { width: 112px; height: 90px; top: 50%; transform: translateY(-50%); }
        /* Schutzraum (3x1m) */
        .crease { width: 22px; height: 67px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); }

        /* PLAYER ON FIELD */
        .player { width: 36px; height: 36px; border-radius: 50%; position: absolute; z-index: 100; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid #000; cursor: move; user-select: none; transition: transform 0.1s; }
        .player:active { transform: scale(1.1); cursor: grabbing; }
        .player.ball { width: 18px; height: 18px; background: orange; z-index: 101; }

        #draw-canvas { position: absolute; top: 0; left: 0; z-index: 50; pointer-events: none; }
        #draw-canvas.active { pointer-events: auto; cursor: crosshair; }

        /* SAVE PANEL */
        .save-panel { position: fixed; bottom: 30px; right: 130px; background: #000; padding: 20px; border-radius: 15px; border: 1px solid var(--red); z-index: 1000; width: 250px; }
        input { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; margin-bottom: 10px; width: 100%; box-sizing: border-box; font-family: inherit; }
        .btn-red { background: var(--red); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <div class="logo">Falcons <span>Tactic Hub</span></div>
    <button class="btn-red" style="width:auto; padding: 10px 20px;" onclick="window.location.href='index.html'">Hub verlassen</button>
</header>

<div class="main-layout">
    <div class="toolbar">
        <div class="tool active" id="btn-move" onclick="setMode('move')" title="Bewegen">🖐️</div>
        <div class="tool" id="btn-draw" onclick="setMode('draw')" title="Zeichnen">✏️</div>
        <div class="tool" onclick="undo()" title="Rückgängig">↩️</div>
        <div class="tool" onclick="clearBoard()" title="Alles löschen">🗑</div>
        <hr style="width: 40%; border-color: #333;">
        <div class="color-dot" style="background: #e30613;" onclick="setColor('#e30613')"></div>
        <div class="color-dot" style="background: #ffff00;" onclick="setColor('#ffff00')"></div>
        <div class="color-dot" style="background: #ffffff;" onclick="setColor('#ffffff')"></div>
    </div>

    <div class="rink-container">
        <div id="rink">
            <div class="line center-line"></div>
            <div class="line center-circle"></div>
            <!-- Torraum Links -->
            <div class="line goal-area" style="left:0; border-left:none;"></div>
            <div class="line crease" style="left:0; border-left:none;"></div>
            <!-- Torraum Rechts -->
            <div class="line goal-area" style="right:0; border-right:none;"></div>
            <div class="line crease" style="right:0; border-right:none;"></div>
            
            <canvas id="draw-canvas"></canvas>
        </div>
    </div>

    <div class="side-bench">
        <small style="color:#444; font-weight:900;">BANK</small>
        <div class="bench-item falcons-player" onmousedown="spawn('falcons')">F</div>
        <div class="bench-item opponent-player" onmousedown="spawn('opponent')">G</div>
        <div class="ball-item" onmousedown="spawn('ball')"></div>
        
        <div class="trash-zone" id="trash">🗑</div>
    </div>
</div>

<div class="save-panel">
    <input type="text" id="t-title" placeholder="Titel der Taktik">
    <button class="btn-red" onclick="saveTactic()">In Sessions speichern</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const rink = document.getElementById('rink');
    const canvas = document.getElementById('draw-canvas');
    const ctx = canvas.getContext('2d');
    const trash = document.getElementById('trash');

    let mode = 'move'; // 'move' oder 'draw'
    let penColor = '#e30613';
    let isDrawing = false;
    let history = [];

    // --- INITIALISIERUNG ---
    window.onload = () => {
        canvas.width = rink.offsetWidth;
        canvas.height = rink.offsetHeight;
        saveState(); // Erster leerer State
    };

    // --- DRAG & DROP LOGIK (GLOBAL GEGEN KLEBEN) ---
    let draggedEl = null;
    let offset = { x: 0, y: 0 };

    function spawn(type) {
        if(mode !== 'move') setMode('move');
        const el = document.createElement('div');
        el.className = 'player ' + (type === 'ball' ? 'ball' : (type === 'falcons' ? 'falcons-player' : 'opponent-player'));
        el.innerHTML = type === 'ball' ? '' : (type === 'falcons' ? 'F' : 'G');
        
        // Startposition auf dem Mauszeiger
        el.style.left = "-100px"; 
        rink.appendChild(el);
        draggedEl = el;
    }

    document.addEventListener('mousedown', e => {
        if(e.target.classList.contains('player')) {
            if(mode !== 'move') return;
            draggedEl = e.target;
            const rect = draggedEl.getBoundingClientRect();
            offset.x = e.clientX - rect.left;
            offset.y = e.clientY - rect.top;
        }
    });

    document.addEventListener('mousemove', e => {
        if(!draggedEl) return;

        const rinkRect = rink.getBoundingClientRect();
        const trashRect = trash.getBoundingClientRect();

        // Position berechnen
        let x = e.clientX - rinkRect.left - offset.x;
        let y = e.clientY - rinkRect.top - offset.y;

        draggedEl.style.left = x + 'px';
        draggedEl.style.top = y + 'px';

        // Trash Highlight
        if(e.clientX > trashRect.left && e.clientX < trashRect.right && e.clientY > trashRect.top && e.clientY < trashRect.bottom) {
            trash.classList.add('hover');
        } else {
            trash.classList.remove('hover');
        }
    });

    document.addEventListener('mouseup', e => {
        if(!draggedEl) return;

        const trashRect = trash.getBoundingClientRect();
        if(e.clientX > trashRect.left && e.clientX < trashRect.right && e.clientY > trashRect.top && e.clientY < trashRect.bottom) {
            draggedEl.remove();
        }

        draggedEl = null;
        trash.classList.remove('hover');
    });

    // --- ZEICHEN LOGIK ---
    function setMode(m) {
        mode = m;
        document.getElementById('btn-move').classList.toggle('active', mode === 'move');
        document.getElementById('btn-draw').classList.toggle('active', mode === 'draw');
        canvas.classList.toggle('active', mode === 'draw');
    }

    function setColor(c) { penColor = c; }

    canvas.onmousedown = (e) => {
        if(mode !== 'draw') return;
        isDrawing = true;
        ctx.beginPath();
        ctx.strokeStyle = penColor;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        const rect = canvas.getBoundingClientRect();
        ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    };

    canvas.onmousemove = (e) => {
        if(!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
    };

    canvas.onmouseup = () => {
        if(isDrawing) {
            isDrawing = false;
            saveState();
        }
    };

    function saveState() {
        if (history.length > 20) history.shift();
        history.push(canvas.toDataURL());
    }

    function undo() {
        if (history.length <= 1) return;
        history.pop(); // Aktuellen State entfernen
        const img = new Image();
        img.src = history[history.length - 1];
        img.onload = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
        };
    }

    function clearBoard() {
        if(confirm("Spielfeld leeren?")) {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            document.querySelectorAll('.player').forEach(p => p.remove());
            saveState();
        }
    }

    // --- FIREBASE SAVE ---
    async function saveTactic() {
        const title = document.getElementById('t-title').value;
        if(!title) return alert("Bitte Titel eingeben!");

        // Wir erstellen ein kombiniertes Bild (Zeichnung + Feld-Snapshot)
        // Einfachheitshalber speichern wir hier das Canvas-Bild (Zeichnung)
        const imageData = canvas.toDataURL();

        await db.collection("tactics").add({
            title: title,
            drawing: imageData,
            createdAt: new Date()
        });

        alert("Taktik erfolgreich gespeichert! Du kannst sie jetzt im Admin-Panel in Sessions einbauen.");
        document.getElementById('t-title').value = "";
    }
</script>
</body>
</html>
