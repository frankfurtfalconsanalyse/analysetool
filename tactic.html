<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Hub | Floorball Taktik</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --card: #1a1a1a; --floor: #2a2a2a; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

        header { background: #000; padding: 15px 25px; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; }

        /* TOOLBAR */
        .toolbar { width: 80px; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 15px; }
        .tool { width: 45px; height: 45px; background: #222; border: 1px solid #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 1.1rem; }
        .tool:hover, .tool.active { border-color: var(--red); background: #2a2a2a; }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; cursor: pointer; margin: 5px 0; }

        /* BENCH (DIE BANK) */
        .side-bench { width: 120px; background: #111; border-left: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 10px; }
        .bench-player { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: grab; border: 2px solid #000; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .falcons-bench { background: var(--red); color: white; }
        .opponent-bench { background: white; color: black; }
        .ball-bench { width: 20px; height: 20px; background: orange; border-radius: 50%; border: 2px solid black; cursor: grab; }

        /* RINK BEREICH */
        .rink-container { flex: 1; position: relative; padding: 20px; display: flex; align-items: center; justify-content: center; background: #050505; }
        
        /* Floorball Rink (40x20 Verhältnis) */
        #rink { 
            width: 900px; height: 450px; background: var(--floor); border: 4px solid #fff; border-radius: 10px; position: relative; 
            box-shadow: 0 0 40px rgba(0,0,0,0.5); overflow: hidden;
        }

        /* Linien Markierungen */
        .line { position: absolute; border: 1.5px solid rgba(255,255,255,0.8); }
        .center-line { width: 0; height: 100%; left: 50%; top: 0; }
        .center-circle { width: 60px; height: 60px; border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        /* Torraum groß (5x4m) */
        .goal-box-large { width: 112px; height: 90px; top: 50%; transform: translateY(-50%); }
        /* Torraum klein (3x1m) */
        .goal-box-small { width: 22px; height: 67px; top: 50%; transform: translateY(-50%); }

        /* SPIELER AUF DEM FELD */
        .player { 
            width: 36px; height: 36px; border-radius: 50%; position: absolute; z-index: 100; 
            display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem;
            cursor: move; border: 2px solid #000; user-select: none;
        }
        .p-ball { width: 18px; height: 18px; background: orange; }

        #draw-canvas { position: absolute; top: 0; left: 0; z-index: 50; pointer-events: none; }
        #draw-canvas.active { pointer-events: auto; cursor: crosshair; }

        .save-panel { position: fixed; right: 140px; top: 80px; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 12px; border: 1px solid var(--red); z-index: 1000; }
        input { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        .btn-red { background: var(--red); color: white; border: none; padding: 12px; border-radius: 5px; font-weight: 900; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<header>
    <div class="logo" style="font-weight:900; letter-spacing:1px; text-transform:uppercase;">FALCONS <span>TACTIC PRO</span></div>
    <div style="font-size:0.8rem; color:#888;">Zieh Spieler von der Bank aufs Feld</div>
    <button class="btn-red" style="width:auto; padding: 10px 20px;" onclick="window.location.href='index.html'">Hub beenden</button>
</header>

<div class="main-layout">
    <!-- TOOLS -->
    <div class="toolbar">
        <div class="tool active" id="tool-move" onclick="setTool('move')" title="Bewegen">🖐️</div>
        <div class="tool" id="tool-draw" onclick="setTool('draw')" title="Zeichnen">✏️</div>
        <div class="tool" onclick="undo()" title="Rückgängig">↩️</div>
        <div class="tool" onclick="clearCanvas()" title="Alles löschen">🗑</div>
        <hr style="width:40%; border-color:#333;">
        <div class="color-dot" style="background: red;" onclick="setColor('#e30613')"></div>
        <div class="color-dot" style="background: #ffff00;" onclick="setColor('#ffff00')"></div>
        <div class="color-dot" style="background: #ffffff;" onclick="setColor('#ffffff')"></div>
    </div>

    <!-- RINK -->
    <div class="rink-container">
        <div id="rink">
            <div class="center-line line"></div>
            <div class="center-circle line"></div>
            <!-- Links -->
            <div class="goal-box-large line" style="left:0; border-left:none;"></div>
            <div class="goal-box-small line" style="left:0; border-left:none;"></div>
            <!-- Rechts -->
            <div class="goal-box-large line" style="right:0; border-right:none;"></div>
            <div class="goal-box-small line" style="right:0; border-right:none;"></div>
            
            <canvas id="draw-canvas"></canvas>
        </div>
    </div>

    <!-- BANK -->
    <div class="side-bench">
        <p style="font-size:0.6rem; font-weight:900; color:#555;">FALCONS</p>
        <div class="bench-player falcons-bench" onmousedown="spawnPlayer('falcons')">+</div>
        <p style="font-size:0.6rem; font-weight:900; color:#555; margin-top:20px;">GEGNER</p>
        <div class="bench-player opponent-bench" onmousedown="spawnPlayer('opponent')">+</div>
        <p style="font-size:0.6rem; font-weight:900; color:#555; margin-top:20px;">BALL</p>
        <div class="ball-bench" onmousedown="spawnPlayer('ball')"></div>
    </div>
</div>

<div class="save-panel">
    <h4 style="margin:0 0 10px 0; font-size:0.8rem;">TAKTIK SPEICHERN</h4>
    <input type="text" id="tactic-name" placeholder="z.B. Freistoß Variante A">
    <button class="btn-red" onclick="saveTactic()">IN CLIPS SPEICHERN</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const rink = document.getElementById('rink');
    const canvas = document.getElementById('draw-canvas');
    const ctx = canvas.getContext('2d');
    
    let currentTool = 'move';
    let currentColor = '#e30613';
    let isDrawing = false;
    let history = []; // Für Undo

    // 1. Drag & Drop Logik (Verbessert: Globaler Listener gegen Klebenbleiben)
    let activeElement = null;
    let shiftX, shiftY;

    function spawnPlayer(type) {
        const p = document.createElement('div');
        p.className = 'player ' + (type === 'ball' ? 'p-ball' : (type === 'falcons' ? 'falcons-bench' : 'opponent-bench'));
        p.innerHTML = type === 'ball' ? '' : (type === 'falcons' ? 'F' : 'G');
        p.style.left = '10px';
        p.style.top = '10px';
        rink.appendChild(p);
        startDragging(p);
    }

    document.addEventListener('mousedown', e => {
        if(e.target.classList.contains('player')) {
            startDragging(e.target);
            shiftX = e.clientX - e.target.getBoundingClientRect().left;
            shiftY = e.clientY - e.target.getBoundingClientRect().top;
        }
    });

    function startDragging(el) {
        if(currentTool !== 'move') return;
        activeElement = el;
    }

    document.addEventListener('mousemove', e => {
        if(!activeElement || currentTool !== 'move') return;
        let rect = rink.getBoundingClientRect();
        let x = e.pageX - rect.left - window.scrollX - (shiftX || 18);
        let y = e.pageY - rect.top - window.scrollY - (shiftY || 18);

        // Grenzen einhalten
        x = Math.max(-10, Math.min(x, rink.offsetWidth - 25));
        y = Math.max(-10, Math.min(y, rink.offsetHeight - 25));

        activeElement.style.left = x + 'px';
        activeElement.style.top = y + 'px';
    });

    document.addEventListener('mouseup', () => { 
        activeElement = null; 
        shiftX = null; shiftY = null;
    });

    // 2. Zeichen-Logik mit Undo
    function setTool(t) {
        currentTool = t;
        document.querySelectorAll('.tool').forEach(el => el.classList.remove('active'));
        document.getElementById('tool-' + t).classList.add('active');
        canvas.classList.toggle('active', t === 'draw');
    }

    function setColor(c) { currentColor = c; }

    function saveState() {
        history.push(canvas.toDataURL());
        if(history.length > 20) history.shift();
    }

    function undo() {
        if(history.length === 0) return;
        let previous = new Image();
        previous.src = history.pop();
        previous.onload = () => {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.drawImage(previous, 0, 0);
        };
    }

    canvas.onmousedown = (e) => {
        if(currentTool !== 'draw') return;
        saveState();
        isDrawing = true;
        ctx.beginPath();
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        const rect = canvas.getBoundingClientRect();
        ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    };

    canvas.onmousemove = (e) => {
        if(!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
    };

    canvas.onmouseup = () => isDrawing = false;
    function clearCanvas() { saveState(); ctx.clearRect(0,0,canvas.width,canvas.height); }

    // 3. Speichern für Sessions
    async function saveTactic() {
        const name = document.getElementById('tactic-name').value;
        if(!name) return alert("Bitte Namen eingeben!");

        // Wir "rendern" das Board für die Session-Vorschau
        // Hierfür erstellen wir ein temporäres Canvas, das Spieler und Linien kombiniert
        const finalImage = canvas.toDataURL(); // In dieser Version speichern wir die Zeichnung

        await db.collection("tactics").add({
            title: name,
            drawing: finalImage,
            category: "Taktik",
            createdAt: new Date()
        });

        alert("Taktik-Board gespeichert! Du kannst es jetzt im Admin-Panel in Sessions einbauen.");
        location.reload();
    }

    window.onload = () => {
        canvas.width = rink.offsetWidth;
        canvas.height = rink.offsetHeight;
    };
</script>
</body>
</html>
