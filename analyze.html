<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Pro Analyse | Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --panel: #1a1a1a; --border: #333; --mention: #5dade2; --text-gray: #aaaaaa; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* VIEWER AREA */
        .viewer { flex: 3; position: relative; display: flex; flex-direction: column; background: #000; }
        .video-box { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        iframe { width: 100%; height: 100%; border: none; z-index: 1; position: absolute; top:0; left:0; }
        
        /* CANVAS LAYER: Liegt über dem Video */
        #draw-canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 5; pointer-events: none; /* Standardmäßig klickt man durch zum Video */
        }
        #draw-canvas.active { pointer-events: auto; cursor: crosshair; }

        /* TOOLBAR */
        .toolbar { background: var(--panel); padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 2px solid var(--border); z-index: 10; }
        .btn { 
            background: #333; color: white; border: 1px solid #444; padding: 10px 18px; 
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.8rem; transition: 0.2s;
        }
        .btn:hover { border-color: var(--red); }
        .btn.active { background: var(--red); border-color: white; box-shadow: 0 0 10px var(--red); }
        .btn-hub { background: transparent; border: 1px solid white; margin-left: auto; }

        /* SIDEBAR */
        .sidebar { flex: 1; background: var(--panel); border-left: 2px solid var(--border); display: flex; flex-direction: column; min-width: 350px; }
        .sidebar-header { padding: 20px; border-bottom: 2px solid var(--red); background: #000; }
        
        .comment-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #111; }
        .comment-item { background: #1e1e1e; padding: 12px; border-radius: 8px; border-left: 4px solid var(--red); position: relative; }
        .comment-meta { font-size: 0.65rem; color: var(--red); font-weight: 900; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        
        .comment-text { font-size: 0.9rem; color: var(--text-gray); line-height: 1.4; }
        .mention { color: var(--mention) !important; font-weight: bold !important; }
        
        .delete-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 1rem; }
        .delete-btn:hover { color: var(--red); }

        .input-area { padding: 15px; background: #000; border-top: 1px solid var(--border); }
        textarea { 
            width: 100%; height: 80px; background: #222; border: 1px solid #444; 
            color: white; border-radius: 5px; padding: 10px; resize: none; font-family: 'Montserrat'; box-sizing: border-box; 
        }
        
        .color-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="viewer">
        <div class="video-box" id="v-box">
            <!-- Video Iframe -->
            <iframe id="main-frame" src="" allow="autoplay; fullscreen"></iframe>
            <!-- Zeichen-Fläche -->
            <canvas id="draw-canvas"></canvas>
        </div>

        <div class="toolbar">
            <button class="btn" id="btn-draw-mode" onclick="toggleDrawingMode()">✏️ ZEICHNEN AKTIVIEREN</button>
            <button class="btn" onclick="clearDraw()">🗑 LÖSCHEN</button>
            
            <div style="display: flex; gap: 8px; margin-left: 10px;">
                <div class="color-dot" style="background: #e30613;" onclick="setPenColor('#e30613')"></div>
                <div class="color-dot" style="background: #ffff00;" onclick="setPenColor('#ffff00')"></div>
                <div class="color-dot" style="background: #00ffff;" onclick="setPenColor('#00ffff')"></div>
            </div>

            <button class="btn btn-hub" onclick="window.location.href='index.html'">ZURÜCK ZUM HUB</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header"><h3 style="margin:0;">FEEDBACK & ANALYSE</h3></div>
        <div class="comment-list" id="comment-display"></div>
        <div class="input-area">
            <textarea id="com-input" placeholder="Tippe Feedback... Nutze @Nr (z.B. @19) für Autocomplete"></textarea>
            <button class="btn" style="width:100%; background:var(--red); border:none; margin-top:10px; padding:12px;" onclick="sendComment()">KOMMENTAR ABSCHICKEN</button>
        </div>
    </div>

    <script>
        // FIREBASE KONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU",
            authDomain: "falcons-video-tool.firebaseapp.com",
            projectId: "falcons-video-tool",
            storageBucket: "falcons-video-tool.firebasestorage.app",
            messagingSenderId: "306689889088",
            appId: "1:306689889088:web:ad525fecd0682069c6e0a5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // GLOBALE VARIABLEN
        const params = new URLSearchParams(window.location.search);
        const videoId = params.get('id');
        const videoType = params.get('type') || 'drive';
        const user = JSON.parse(localStorage.getItem('falcons_user') || '{"name":"Gast","nr":"0"}');
        
        let playerMap = {};
        let isAdmin = false;
        let isDrawingMode = false;
        let isPainting = false;
        let penColor = "#e30613";

        const canvas = document.getElementById('draw-canvas');
        const ctx = canvas.getContext('2d');

        // 1. INITIALISIERUNG
        async function init() {
            if(!videoId) return location.href='index.html';

            // Spieler für Autocomplete laden
            const pSnap = await db.collection("players").get();
            pSnap.forEach(doc => { playerMap[doc.id] = doc.data().name; });

            // Admin Check
            const adminDoc = await db.collection("admins").doc(user.nr).get();
            if(user.nr === "22" || adminDoc.exists) isAdmin = true;

            // Video laden
            const frame = document.getElementById('main-frame');
            if(videoType === 'youtube') {
                const ytDoc = await db.collection("youtube_clips").doc(videoId).get();
                if(ytDoc.exists) {
                    const d = ytDoc.data();
                    frame.src = `https://www.youtube.com/embed/${d.ytId}?start=${d.startTime}&autoplay=1&rel=0`;
                }
            } else {
                frame.src = `https://drive.google.com/file/d/${videoId}/preview`;
            }

            listenForComments();
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
        }

        // 2. ZEICHEN-FUNKTIONEN
        function toggleDrawingMode() {
            isDrawingMode = !isDrawingMode;
            const btn = document.getElementById('btn-draw-mode');
            
            if(isDrawingMode) {
                canvas.classList.add('active');
                btn.classList.add('active');
                btn.innerText = "✏️ ZEICHNEN STOPPEN (VIDEO AKTIVIEREN)";
                resizeCanvas();
            } else {
                canvas.classList.remove('active');
                btn.classList.remove('active');
                btn.innerText = "✏️ ZEICHNEN AKTIVIEREN";
            }
        }

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        function setPenColor(c) { penColor = c; }
        function clearDraw() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        canvas.onmousedown = (e) => {
            if(!isDrawingMode) return;
            isPainting = true;
            ctx.beginPath();
            ctx.strokeStyle = penColor;
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            const rect = canvas.getBoundingClientRect();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        };

        canvas.onmousemove = (e) => {
            if(!isPainting) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
        };

        canvas.onmouseup = () => isPainting = false;

        // 3. KOMMENTAR-FUNKTIONEN
        async function sendComment() {
            const input = document.getElementById('com-input');
            let text = input.value.trim();
            if(!text) return;

            let mentions = [];
            // @19 -> @19 | Name
            let resolvedText = text.replace(/@(\d+)/g, (match, nr) => {
                mentions.push(nr);
                return playerMap[nr] ? `@${nr} | ${playerMap[nr]}*` : `${match}*`;
            });

            try {
                await db.collection("comments").add({
                    videoId: videoId,
                    text: resolvedText,
                    author: user.name,
                    authorNr: user.nr,
                    mentions: mentions,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = "";
            } catch (e) { console.error(e); }
        }

        function listenForComments() {
            db.collection("comments")
              .where("videoId", "==", videoId)
              .onSnapshot(snapshot => {
                  const display = document.getElementById('comment-display');
                  display.innerHTML = "";
                  
                  let docs = [];
                  snapshot.forEach(d => docs.push({id: d.id, ...d.data()}));
                  docs.sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));

                  docs.forEach(c => {
                      // Regex markiert nur den Block @Nr | Name
                      const formatted = c.text.replace(/(@\d+ \| [^*]+|@\d+)*/g, '<span class="mention">$1</span>');
                      const delBtn = (isAdmin || user.nr === c.authorNr) ? `<button class="delete-btn" onclick="deleteCom('${c.id}')">🗑</button>` : '';
                      
                      display.innerHTML += `
                        <div class="comment-item">
                            <div class="comment-meta">
                                <span>${c.author} (#${c.authorNr})</span>
                                ${delBtn}
                            </div>
                            <div class="comment-text">${formatted}</div>
                        </div>`;
                  });
                  display.scrollTop = display.scrollHeight;
              });
        }

        async function deleteCom(cid) {
            if(confirm("Löschen?")) await db.collection("comments").doc(cid).delete();
        }

        window.onload = init;
    </script>
</body>
</html>
