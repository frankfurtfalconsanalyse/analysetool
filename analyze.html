<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Pro Analyse | Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --panel: #1a1a1a; --border: #333; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* VIDEO AREA */
        .viewer-container { flex: 3; position: relative; display: flex; flex-direction: column; background: #000; }
        .video-box { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; }
        #drive-frame { width: 100%; height: 100%; border: none; z-index: 1; }
        #draw-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        #draw-layer.active { pointer-events: auto; cursor: crosshair; }

        /* TOOLBAR */
        .toolbar { background: var(--panel); padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 2px solid var(--border); z-index: 10; }
        .btn { background: #333; color: white; border: 1px solid #444; padding: 10px 18px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .btn.active { background: var(--red); border-color: white; }
        .btn-hub { background: transparent; border: 1px solid white; margin-left: auto; }

        /* SIDEBAR / COMMENTS */
        .sidebar { flex: 1; background: var(--panel); border-left: 2px solid var(--border); display: flex; flex-direction: column; min-width: 350px; }
        .sidebar-header { padding: 20px; border-bottom: 2px solid var(--red); background: #000; }
        
        .comment-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #111; }
        .comment-item { background: #252525; padding: 12px; border-radius: 8px; border-left: 4px solid var(--red); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .comment-meta { font-size: 0.7rem; color: var(--red); font-weight: 900; margin-bottom: 5px; text-transform: uppercase; display: flex; justify-content: space-between; }
        .comment-text { font-size: 0.9rem; line-height: 1.4; color: #eee; }
        .mention { color: #5dade2; font-weight: bold; background: rgba(93, 173, 226, 0.1); padding: 2px 4px; border-radius: 3px; }

        .input-area { padding: 15px; background: #000; border-top: 1px solid var(--border); }
        textarea { width: 100%; height: 80px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; padding: 10px; resize: none; font-family: 'Montserrat'; box-sizing: border-box; margin-bottom: 10px; }
        
        .color-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="viewer-container">
        <div class="video-box">
            <iframe id="drive-frame" src=""></iframe>
            <canvas id="draw-layer"></canvas>
        </div>
        <div class="toolbar">
            <button class="btn" id="btn-draw" onclick="toggleDrawing()">✏️ ZEICHNEN</button>
            <button class="btn" onclick="clearCanvas()">🗑 LÖSCHEN</button>
            <div style="display: flex; gap: 8px; margin-left: 10px;">
                <div class="color-dot" style="background: red;" onclick="changeColor('#e30613')"></div>
                <div class="color-dot" style="background: yellow;" onclick="changeColor('#ffff00')"></div>
                <div class="color-dot" style="background: cyan;" onclick="changeColor('#00ffff')"></div>
            </div>
            <button class="btn btn-hub" onclick="window.location.href='index.html'">HUB</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header"><h3 style="margin:0;">ANALYSE & FEEDBACK</h3></div>
        <div class="comment-list" id="comment-display"></div>
        <div class="input-area">
            <textarea id="com-input" placeholder="Tippe Feedback... Nutze @Nummer (z.B. @22)"></textarea>
            <button class="btn" style="width:100%; background:var(--red); border:none;" onclick="sendComment()">SENDEN</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const params = new URLSearchParams(window.location.search);
        const videoId = params.get('id');
        const user = JSON.parse(localStorage.getItem('falcons_user') || '{"name":"Gast","nr":"0"}');

        // Team-Speicher
        let playerMap = {}; 

        // INITIALISIERUNG
        async function init() {
            if(videoId) {
                document.getElementById('drive-frame').src = `https://drive.google.com/file/d/${videoId}/preview`;
                await loadPlayers(); // Lade Teamverzeichnis
                listenForComments(); // Starte Echtzeit-Überwachung
            }
        }

        // Lade alle Spieler für die Namensauflösung
        async function loadPlayers() {
            const snap = await db.collection("players").get();
            snap.forEach(doc => {
                const p = doc.data();
                playerMap[p.nr] = p.name; // Speichert Nr -> Name
            });
            console.log("Team geladen:", playerMap);
        }

        // ZEICHEN-LOGIK
        const canvas = document.getElementById('draw-layer');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let paintColor = "#e30613";

        function toggleDrawing() {
            canvas.classList.toggle('active');
            const active = canvas.classList.contains('active');
            if(active) { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
            document.getElementById('btn-draw').classList.toggle('active', active);
        }

        canvas.addEventListener('mousedown', (e) => {
            if(!canvas.classList.contains('active')) return;
            drawing = true;
            ctx.beginPath();
            ctx.strokeStyle = paintColor;
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            const rect = canvas.getBoundingClientRect();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('mousemove', (e) => {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
        });

        canvas.addEventListener('mouseup', () => drawing = false);
        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        function changeColor(c) { paintColor = c; }

        // KOMMENTAR SENDEN (mit Auto-Name-Fill)
        async function sendComment() {
            const input = document.getElementById('com-input');
            let text = input.value.trim();
            if(!text) return;

            // 1. Mentions extrahieren (@22 -> 22)
            const mentionRegex = /@(\d+)/g;
            let mentions = [];
            let match;
            
            // 2. Ersetze @22 durch @22 (Name) im Text
            let resolvedText = text.replace(/@(\d+)/g, (fullMatch, nr) => {
                mentions.push(nr); // Füge Nummer zum Array für das Dashboard hinzu
                if (playerMap[nr]) {
                    return `@${nr} (${playerMap[nr]})`; // Ersetzt @22 durch @22 (Lukas Müller)
                }
                return fullMatch; // Falls Nummer unbekannt, lass @22 stehen
            });

            try {
                await db.collection("comments").add({
                    videoId: videoId,
                    text: resolvedText, // Speicher den Text mit Namen
                    author: user.name,
                    authorNr: user.nr,
                    mentions: mentions,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = ""; 
            } catch (e) { alert("Fehler: " + e.message); }
        }

        // ECHTZEIT-ÜBERWACHUNG
        function listenForComments() {
            db.collection("comments")
              .where("videoId", "==", videoId)
              .orderBy("createdAt", "asc")
              .onSnapshot((snapshot) => {
                  const display = document.getElementById('comment-display');
                  display.innerHTML = "";
                  
                  snapshot.forEach(doc => {
                      const c = doc.data();
                      // @Nummer (Name) blau markieren
                      const formattedText = c.text.replace(/(@\d+ \([^)]+\)|@\d+)/g, '<span class="mention">$1</span>');
                      
                      const div = document.createElement('div');
                      div.className = "comment-item";
                      div.innerHTML = `
                          <div class="comment-meta">
                              <span>${c.author} (#${c.authorNr})</span>
                              <span>${c.createdAt ? new Date(c.createdAt.seconds*1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'neu...'}</span>
                          </div>
                          <div class="comment-text">${formattedText}</div>
                      `;
                      display.appendChild(div);
                  });
                  display.scrollTop = display.scrollHeight;
              });
        }

        window.onload = init;
    </script>
</body>
</html>
