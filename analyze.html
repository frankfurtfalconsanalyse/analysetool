<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Falcons Pro Analyse | Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --panel: #1a1a1a; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Linke Seite: Video & Zeichenfläche */
        .viewer-container { flex: 3; position: relative; display: flex; flex-direction: column; background: #000; }
        
        .video-box { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; }
        
        /* Das Video Iframe von Google Drive */
        #drive-frame { width: 100%; height: 100%; border: none; z-index: 1; }

        /* Das transparente Zeichen-Layer */
        #draw-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 2; pointer-events: none; /* Klicks gehen standardmäßig durch zum Video */
        }
        #draw-layer.active { pointer-events: auto; cursor: crosshair; }

        /* Toolbar unten */
        .toolbar { background: var(--panel); padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 2px solid #333; z-index: 10; }
        .btn { 
            background: #333; color: white; border: 1px solid #444; padding: 10px 18px; 
            border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 0.8rem;
        }
        .btn:hover { background: #444; border-color: var(--red); }
        .btn.active { background: var(--red); border-color: white; box-shadow: 0 0 10px var(--red); }
        .btn-hub { background: transparent; border: 1px solid white; margin-left: auto; }

        /* Rechte Seite: Kommentare */
        .sidebar { flex: 1; background: var(--panel); border-left: 2px solid #333; display: flex; flex-direction: column; min-width: 300px; }
        .sidebar-header { padding: 20px; border-bottom: 2px solid var(--red); }
        .comment-input-area { padding: 15px; background: #111; }
        .comment-input-area input { 
            width: 100%; padding: 10px; background: #222; border: 1px solid #444; 
            color: white; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px;
        }
        .comment-list { flex: 1; overflow-y: auto; padding: 15px; }
        .comment-item { 
            background: #252525; padding: 12px; border-radius: 8px; margin-bottom: 12px; 
            border-left: 4px solid var(--red); position: relative;
        }
        .time-tag { color: var(--red); font-weight: bold; font-size: 0.75rem; margin-bottom: 5px; display: block; }

        /* Zeichnen Farbe */
        .color-dot { width: 20px; height: 20px; border-radius: 50%; display: inline-block; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body>

    <div class="viewer-container">
        <div class="video-box">
            <!-- Video wird hier geladen -->
            <iframe id="drive-frame" src=""></iframe>
            <canvas id="draw-layer"></canvas>
        </div>

        <div class="toolbar">
            <button class="btn" id="btn-draw" onclick="toggleDrawing()">✏️ ZEICHNEN AKTIVIEREN</button>
            <button class="btn" onclick="clearCanvas()">🗑 LÖSCHEN</button>
            <div style="margin-left: 10px; display: flex; gap: 5px;">
                <div class="color-dot" style="background: red;" onclick="changeColor('#e30613')"></div>
                <div class="color-dot" style="background: yellow;" onclick="changeColor('#ffff00')"></div>
                <div class="color-dot" style="background: cyan;" onclick="changeColor('#00ffff')"></div>
            </div>
            <button class="btn btn-hub" onclick="window.location.href='index.html'">ZURÜCK ZUM HUB</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <h3 id="clip-title" style="margin:0;">Lade Video...</h3>
        </div>
        <div class="comment-input-area">
            <input type="text" id="com-text" placeholder="Kommentar eingeben (@Spieler)...">
            <button class="btn" style="width:100%;" onclick="saveComment()">KOMMENTAR ABSCHICKEN</button>
        </div>
        <div class="comment-list" id="comment-list">
            <!-- Kommentare werden geladen -->
        </div>
    </div>

    <script>
        // FIREBASE CONFIG (Deine Daten)
        const firebaseConfig = {
            apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU",
            authDomain: "falcons-video-tool.firebaseapp.com",
            projectId: "falcons-video-tool",
            storageBucket: "falcons-video-tool.firebasestorage.app",
            messagingSenderId: "306689889088",
            appId: "1:306689889088:web:ad525fecd0682069c6e0a5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // URL Parameter (Video ID)
        const params = new URLSearchParams(window.location.search);
        const videoId = params.get('id');

        // Video & Canvas Setup
        const canvas = document.getElementById('draw-layer');
        const ctx = canvas.getContext('2d');
        const frame = document.getElementById('drive-frame');
        let drawing = false;
        let paintColor = "#e30613";

        // 1. VIDEO LADEN
        function loadVideo() {
            if(!videoId) {
                alert("Kein Video ausgewählt!");
                window.location.href='index.html';
                return;
            }
            // Wir bauen den Link direkt aus der ID
            frame.src = `https://drive.google.com/file/d/${videoId}/preview`;
            
            // Titel abfragen (optional aus Firebase oder Drive Name)
            document.getElementById('clip-title').innerText = "Analyse Modus";
            loadComments();
        }

        // 2. ZEICHEN-LOGIK
        function toggleDrawing() {
            const btn = document.getElementById('btn-draw');
            canvas.classList.toggle('active');
            
            if(canvas.classList.contains('active')) {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                btn.innerText = "✏️ ZEICHNEN STOPPEN";
                btn.classList.add('active');
            } else {
                btn.innerText = "✏️ ZEICHNEN AKTIVIEREN";
                btn.classList.remove('active');
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            if(!canvas.classList.contains('active')) return;
            drawing = true;
            ctx.beginPath();
            ctx.strokeStyle = paintColor;
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            const rect = canvas.getBoundingClientRect();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('mousemove', (e) => {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
        });

        canvas.addEventListener('mouseup', () => drawing = false);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function changeColor(c) {
            paintColor = c;
        }

        // 3. KOMMENTAR-SYSTEM
        async function saveComment() {
            const text = document.getElementById('com-text').value;
            if(!text) return;

            await db.collection("comments").add({
                videoId: videoId,
                text: text,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('com-text').value = "";
            loadComments();
        }

        async function loadComments() {
            const snap = await db.collection("comments")
                                .where("videoId", "==", videoId)
                                .orderBy("createdAt", "desc")
                                .get();
            
            const list = document.getElementById('comment-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const c = doc.data();
                const div = document.createElement('div');
                div.className = "comment-item";
                div.innerHTML = `
                    <small class="time-tag">HINWEIS</small>
                    <div style="font-size:0.9rem;">${c.text}</div>
                `;
                list.appendChild(div);
            });
        }

        // Init
        window.onload = loadVideo;
        window.onresize = () => {
            // Bei Resize Canvas anpassen ohne Zeichnung zu verlieren (einfachheitshalber hier Reset)
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        };
    </script>
</body>
</html>
