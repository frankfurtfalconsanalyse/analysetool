<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Falcons Pro Analyse</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Montserrat'; background: #000; color: white; margin: 0; display: flex; height: 100vh; }
        .video-main { flex: 3; position: relative; border-right: 2px solid #333; display: flex; flex-direction: column; }
        .canvas-layer { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }
        .canvas-layer.active { pointer-events: auto; cursor: crosshair; }
        
        .toolbar { background: #1a1a1a; padding: 15px; display: flex; gap: 10px; justify-content: center; border-top: 1px solid #333; }
        .btn-tool { background: #333; border: 1px solid #444; color: white; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        .btn-tool:hover, .btn-tool.active { background: #e30613; }

        .sidebar { flex: 1; background: #111; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #000; border-bottom: 2px solid #e30613; }
        .comment-list { flex: 1; overflow-y: auto; padding: 20px; }
        .comment-item { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 3px solid #e30613; }
        .timestamp { color: #e30613; font-weight: bold; font-size: 0.8rem; display: block; margin-bottom: 5px; cursor: pointer; }
        
        input { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="video-main">
    <div style="flex:1; position:relative; overflow:hidden;">
        <video id="v-player" style="width:100%; height:100%; background:#000;"></video>
        <canvas id="canvas" class="canvas-layer"></canvas>
    </div>
    <div class="toolbar">
        <button class="btn-tool" onclick="v.playbackRate = 0.25">0.25x</button>
        <button class="btn-tool" onclick="v.playbackRate = 0.5">0.5x</button>
        <button class="btn-tool" onclick="v.playbackRate = 1">NORMAL</button>
        <button class="btn-tool" onclick="v.currentTime -= 0.04">← FRAME</button>
        <button class="btn-tool" onclick="v.currentTime += 0.04">FRAME →</button>
        <button class="btn-tool" id="drawBtn" onclick="toggleDraw()">✏️ ZEICHNEN</button>
        <button class="btn-tool" onclick="clearDraw()">🗑</button>
        <button class="btn-tool" onclick="window.location.href='index.html'" style="margin-left:auto;">HUB</button>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-header">
        <h3 id="v-title">Lädt...</h3>
        <input type="text" id="comInput" placeholder="Kommentar @Name...">
        <button onclick="addComment()" class="btn-tool" style="width:100%; margin-top:10px;">SENDEN</button>
    </div>
    <div class="comment-list" id="comments"></div>
</div>

<script>
    const firebaseConfig = { /* wie oben */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const v = document.getElementById('v-player');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    async function load() {
        const driveRes = await fetch('https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec');
        const data = await driveRes.json();
        const video = data.find(item => item.link.includes(id));
        v.src = video.link;
        document.getElementById('v-title').innerText = video.title;
        loadComments();
    }

    function toggleDraw() {
        canvas.classList.toggle('active');
        document.getElementById('drawBtn').classList.toggle('active');
        if(canvas.classList.contains('active')) v.pause();
    }

    canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); ctx.strokeStyle = "#e30613"; ctx.lineWidth = 3; };
    canvas.onmousemove = (e) => {
        if(!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
    };
    canvas.onmouseup = () => drawing = false;
    function clearDraw() { ctx.clearRect(0,0,canvas.width, canvas.height); }

    async function addComment() {
        const text = document.getElementById('comInput').value;
        if(!text) return;
        await db.collection("comments").add({
            videoId: id, text, time: v.currentTime, createdAt: new Date()
        });
        document.getElementById('comInput').value = "";
        loadComments();
    }

    async function loadComments() {
        const snap = await db.collection("comments").where("videoId", "==", id).orderBy("time").get();
        const box = document.getElementById('comments');
        box.innerHTML = "";
        snap.forEach(doc => {
            const c = doc.data();
            box.innerHTML += `
                <div class="comment-item" onclick="v.currentTime=${c.time}">
                    <span class="timestamp">${new Date(c.time * 1000).toISOString().substr(14, 5)}</span>
                    <div>${c.text}</div>
                </div>`;
        });
    }

    window.onresize = () => { canvas.width = v.offsetWidth; canvas.height = v.offsetHeight; };
    v.onloadedmetadata = window.onresize;
    load();
</script>
</body>
</html>
