<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Falcons Pro Analyse | Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Montserrat'; background: #000; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Video & Canvas Area */
        .video-area { flex: 3; position: relative; background: #000; display: flex; flex-direction: column; }
        #video-container { position: relative; flex: 1; }
        video { width: 100%; height: 100%; object-fit: contain; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        canvas.active { pointer-events: auto; cursor: crosshair; }

        /* Sidebar */
        .sidebar { flex: 1; background: #1a1a1a; border-left: 2px solid #e30613; display: flex; flex-direction: column; }
        .controls { padding: 15px; border-bottom: 1px solid #333; }
        .comments { flex: 1; overflow-y: auto; padding: 15px; }

        /* Tools */
        .tool-btn { background: #333; color: white; border: none; padding: 10px; margin: 5px; cursor: pointer; border-radius: 4px; }
        .tool-btn.active { background: #e30613; }
        .comment-entry { background: #252525; padding: 10px; border-radius: 5px; margin-bottom: 10px; border-left: 3px solid #e30613; }
        .timestamp { color: #e30613; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="video-area">
    <div id="video-container">
        <video id="main-v" src=""></video>
        <canvas id="draw-canvas"></canvas>
    </div>
    <div class="controls">
        <button class="tool-btn" onclick="adjustSpeed(0.25)">0.25x</button>
        <button class="tool-btn" onclick="adjustSpeed(0.5)">0.5x</button>
        <button class="tool-btn" onclick="adjustSpeed(1)">1x</button>
        <button class="tool-btn" onclick="stepFrame(-0.04)">← Frame</button>
        <button class="tool-btn" onclick="stepFrame(0.04)">Frame →</button>
        <button class="tool-btn" id="draw-toggle" onclick="toggleDraw()">✏️ Zeichnen</button>
        <button class="tool-btn" onclick="clearCanvas()">🗑 Clear</button>
    </div>
</div>

<div class="sidebar">
    <div class="controls">
        <h3>Kommentare & Mentions</h3>
        <input type="text" id="com-text" placeholder="Kommentar @Spieler..." style="width:70%; padding:8px;">
        <button onclick="addComment()" style="background:#e30613; border:none; color:white; padding:8px;">Senden</button>
    </div>
    <div class="comments" id="comment-list">
        <!-- Kommentare aus Firebase -->
    </div>
</div>

<script>
    // Firebase Init (wie oben)
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('id');
    const v = document.getElementById('main-v');
    const canvas = document.getElementById('draw-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let drawingEnabled = false;

    // Load Video
    async function loadVideo() {
        const doc = await db.collection("videos").doc(videoId).get();
        v.src = doc.data().url;
        loadComments();
    }

    // Frame-by-Frame & Speed
    function adjustSpeed(s) { v.playbackRate = s; }
    function stepFrame(t) { v.pause(); v.currentTime += t; }

    // Drawing Logic
    function toggleDraw() {
        drawingEnabled = !drawingEnabled;
        canvas.classList.toggle('active', drawingEnabled);
        document.getElementById('draw-toggle').classList.toggle('active', drawingEnabled);
        if(drawingEnabled) v.pause();
    }

    canvas.onmousedown = (e) => { if(!drawingEnabled) return; isDrawing = true; ctx.beginPath(); ctx.strokeStyle = "#e30613"; ctx.lineWidth = 3; };
    canvas.onmousemove = (e) => { 
        if(!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
    };
    canvas.onmouseup = () => isDrawing = false;

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // Comments
    async function addComment() {
        const text = document.getElementById('com-text').value;
        const time = v.currentTime;
        await db.collection("comments").add({
            videoId, text, time, createdAt: new Date(), user: "Trainer"
        });
        document.getElementById('com-text').value = "";
        loadComments();
    }

    async function loadComments() {
        const snap = await db.collection("comments").where("videoId", "==", videoId).orderBy("time").get();
        const list = document.getElementById('comment-list');
        list.innerHTML = "";
        snap.forEach(doc => {
            const c = doc.data();
            list.innerHTML += `<div class="comment-entry">
                <span class="timestamp" onclick="v.currentTime=${c.time}">${formatTime(c.time)}</span><br>
                ${c.text}
            </div>`;
        });
    }

    function formatTime(s) { return new Date(s * 1000).toISOString().substr(14, 5); }
    
    // Resize Canvas to Video
    v.onloadedmetadata = () => { canvas.width = v.offsetWidth; canvas.height = v.offsetHeight; };
    loadVideo();
</script>
</body>
</html>
