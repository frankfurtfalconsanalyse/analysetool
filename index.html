<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Hub | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="falcons-init.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --card: #161616; --blue: #5dade2; --gray: #aaaaaa; --border: #252525; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        header { background: #000; padding: 15px 25px; border-bottom: 3px solid var(--red); display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 100; }
        .logo { font-weight:900; letter-spacing:2px; cursor:pointer; text-transform: uppercase; font-size: 1.3rem; }
        .header-right { display: flex; gap: 12px; align-items: center; }
        .nav-btn { background: #222; color: white; padding: 10px 18px; border-radius: 6px; text-decoration: none; font-weight: 700; font-size: 0.75rem; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; }
        #admin-link { background: var(--red); border: none; display: none; }
        
        /* NOTIFICATION BADGE */
        .notif-badge { position: absolute; top: -5px; right: -5px; background: white; color: var(--red); font-size: 0.65rem; font-weight: 900; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 2px solid var(--red); }

        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
        .hero-session { background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); border: 1px solid var(--red); border-radius: 20px; padding: 50px; margin-bottom: 60px; display: none; position: relative; overflow: hidden; }
        .hero-session h1 { font-size: 2.5rem; margin: 0; text-transform: uppercase; font-weight: 700; }
        .section-title { color: var(--red); text-transform: uppercase; margin-top: 60px; border-left: 5px solid var(--red); padding-left: 15px; font-size: 1.2rem; font-weight: 400; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 25px; }
        .card, .s-card { background: var(--card); padding: 40px 20px; border-radius: 15px; cursor: pointer; border: 1px solid var(--border); transition: 0.3s; text-align: center; position: relative; }
        .card:hover, .s-card:hover { border-color: var(--red); transform: translateY(-5px); }
        .watched-dot { position: absolute; top: 15px; right: 15px; width: 10px; height: 10px; background: var(--red); border-radius: 50%; box-shadow: 0 0 10px var(--red); }
        .video-list-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; margin-top: 30px; }
        .v-card { background: var(--card); border-radius: 16px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); transition: 0.4s; position: relative; }
        .v-thumb { width: 100%; aspect-ratio: 16 / 9; background-size: cover; background-position: center; background-color: #0a0a0a; }
        .v-info { padding: 20px; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { max-width: 1200px; width: 95%; margin: 20px auto; background: #111; border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #333; }
        .modal-main { display: flex; flex-wrap: wrap; }
        .video-side { flex: 2.2; min-width: 300px; background: #000; position: relative; padding-bottom: 40%; height: 0; }
        .video-side iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border:none; }
        .comment-side { flex: 1; min-width: 350px; background: #161616; display: flex; flex-direction: column; max-height: 600px; border-left: 1px solid #333; }
        .modal-comment-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .mini-comment { background: #222; padding: 15px; border-radius: 10px; border-left: 4px solid var(--red); font-size: 0.9rem; color: var(--gray); }
        .mini-comment.is-read { opacity: 0.3; filter: grayscale(1); }
        .mention { color: var(--blue) !important; font-weight: bold !important; }
        .timestamp { background: var(--blue); color: white !important; padding: 2px 6px; border-radius: 4px; cursor: pointer; }
        .hub-check-btn { background: #28a745; color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 0.65rem; }
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #login-overlay input { padding: 15px; font-size: 2.5rem; width: 120px; text-align: center; border: 2px solid var(--red); background: #111; color: white; border-radius: 10px; margin-top: 20px; }
        .back-btn { background: #333; border: 1px solid var(--border); color: white; padding: 12px 25px; cursor: pointer; display: none; margin-bottom: 30px; font-weight: 700; border-radius: 5px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h1 style="font-size: 3rem; margin:0; font-weight: 900;">FRANKFURT <span style="color:var(--red);">FALCONS</span></h1>
    <p style="color: #555;">TRIKOTNUMMER ZUM LOGIN (ZWEISTELLIG)</p>
    <input type="text" id="login-nr" placeholder="00" maxlength="2" oninput="this.value = this.value.replace(/[^0-9]/g, ''); checkLogin();">
</div>

<header>
    <div class="logo" onclick="location.reload()">FALCONS <span style="color:var(--red);">HUB</span></div>
    <div class="header-right">
        <span id="user-display" style="font-size: 0.7rem; color: #666;"></span>
        <a href="index.html" class="nav-btn">DASHBOARD <div id="notif-count" class="notif-badge">0</div></a>
        <a href="games.html" class="nav-btn">GAME HUB</a>
        <a href="tactic.html" class="nav-btn">TACTIC BOARD</a>
        <a href="help.html" class="nav-btn">HELP</a>
        <a href="admin.html" id="admin-link" class="nav-btn">ADMIN</a>
        <button class="nav-btn" onclick="logout()">LOGOUT</button>
    </div>
</header>

<div class="container" id="hub-content" style="display:none;">
    <div id="hero-area" class="hero-session">
        <h1 id="hero-title"></h1><p id="hero-desc"></p>
        <button class="nav-btn" style="background:var(--red); padding:15px 30px;" id="hero-btn">Session starten</button>
    </div>
    <button id="back-btn" class="back-btn" onclick="location.reload()">← ZURÜCK</button>
    <div id="lobby-view">
        <h2 class="section-title">Sessions</h2><div id="session-grid" class="grid"></div>
        <h2 class="section-title">Für dich markiert</h2><div id="personal-grid" class="grid"></div>
        <h2 class="section-title">Spielsituation</h2>
        <div class="grid">
            <div class="card" onclick="filterVideos('cat', 'Offense')"><h3>Offense</h3></div>
            <div class="card" onclick="filterVideos('cat', 'Defense')"><h3>Defense</h3></div>
            <div class="card" onclick="filterVideos('cat', 'Powerplay')"><h3>Powerplay</h3></div>
            <div class="card" onclick="filterVideos('cat', 'Penalty Kill')"><h3>Penalty Kill</h3></div>
            <div class="card" onclick="filterVideos('cat', 'Setplays')"><h3>Setplays</h3></div>
        </div>
    </div>
    <div id="video-list-view" class="video-list-grid"></div>
</div>

<div id="videoModal" class="modal" onclick="closePlayer()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-main">
            <div class="video-side"><iframe id="modal-iframe" src="" allowfullscreen></iframe></div>
            <div class="comment-side">
                <h4>Feedback & Analyse</h4><div class="modal-comment-list" id="modal-comment-display"></div>
            </div>
        </div>
        <div style="padding:15px; background:#000; display:flex; justify-content:space-between; align-items:center;">
            <h3 id="modal-title" style="margin:0; font-size:0.9rem;">Clip</h3>
            <button class="nav-btn" id="btn-goto-analyse" style="background:var(--red);">ZUR PRO-ANALYSE</button>
        </div>
    </div>
</div>

<script>
    let combinedVideos = [], commentUnsubscribe = null, currentVideo = null;

    async function checkLogin() {
        const nr = document.getElementById('login-nr').value;
        if(nr.length !== 2) return;
        const doc = await db.collection("players").doc(nr).get();
        if(doc.exists) { 
            localStorage.setItem('falcons_user', JSON.stringify(doc.data())); 
            location.reload(); 
        }
    }

    async function startHub() {
        if(!currentUser.nr) return;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('hub-content').style.display = 'block';
        document.getElementById('user-display').innerText = `${currentUser.name} (#${currentUser.nr})`;
        
        if(await checkAdminStatus(currentUser.nr)) document.getElementById('admin-link').style.display = 'block';
        loadAllData();
    }

    async function loadAllData() {
        const [driveRes, ytSnap, metaSnap, sessSnap, progSnap] = await Promise.all([
            fetch('https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec').then(r => r.json()),
            db.collection("youtube_clips").get(),
            db.collection("video_metadata").get(),
            db.collection("sessions").orderBy("createdAt", "desc").get(),
            db.collection("progress").doc(currentUser.nr).get()
        ]);
        let meta = {}; metaSnap.forEach(d => meta[d.id] = d.data().position);
        combinedVideos = [
            ...driveRes.map(v => { const fid = v.link.split('/d/')[1].split('/')[0]; return { id: fid, title: v.title, category: v.category, type: 'drive', position: meta[fid] || 'Alle', link: `https://drive.google.com/file/d/${fid}/preview`, ytId: null }; }),
            ...ytSnap.docs.map(doc => ({ id: doc.id, ...doc.data(), type: 'youtube', link: `https://www.youtube.com/embed/${doc.data().ytId}?start=${doc.data().startTime}&autoplay=1`, ytId: doc.data().ytId }))
        ];
        renderSessions(sessSnap, progSnap);
        loadMentions();
    }

    function renderSessions(sessSnap, progSnap) {
        const sGrid = document.getElementById('session-grid'), hero = document.getElementById('hero-area'), progress = progSnap.exists ? progSnap.data() : {};
        sGrid.innerHTML = "";
        sessSnap.docs.forEach((doc, index) => {
            const s = doc.data(), sid = doc.id, hasStarted = progress[sid] > 0;
            if(index === 0) { hero.style.display = 'block'; document.getElementById('hero-title').innerText = s.title; document.getElementById('hero-desc').innerText = s.description || ""; document.getElementById('hero-btn').onclick = () => location.href=`session_view.html?id=${sid}`; }
            else { sGrid.innerHTML += `<div class="s-card" onclick="location.href='session_view.html?id=${sid}'">${hasStarted ? '<div class="watched-dot"></div>' : ''}<h3>${s.title}</h3></div>`; }
        });
    }

    async function loadMentions() {
        const snap = await db.collection("comments").where("mentions", "array-contains", currentUser.nr).get();
        const pGrid = document.getElementById('personal-grid'); pGrid.innerHTML = "";
        let unread = 0;
        snap.forEach(doc => {
            const c = doc.data();
            if(!(c.readBy || []).includes(currentUser.nr)) {
                unread++;
                const v = combinedVideos.find(item => item.id === c.videoId);
                if(v) pGrid.innerHTML += createVideoCard(v, "NEUE MARKIERUNG");
            }
        });
        const badge = document.getElementById('notif-count');
        if(unread > 0) { badge.innerText = unread; badge.style.display = "flex"; }
    }

    function createVideoCard(v, badge) {
        const thumb = v.ytId ? `https://img.youtube.com/vi/${v.ytId}/mqdefault.jpg` : `https://via.placeholder.com/400x225/111/e30613?text=Video`;
        return `<div class="v-card" onclick="openPlayer('${v.id}')"><div class="v-thumb" style="background-image:url('${thumb}')"></div><div class="v-info"><small>${badge || v.category}</small><h3>${v.title}</h3></div></div>`;
    }

    function getSec(txt) { const m = txt.match(/(\d{1,2}:\d{2}:\d{2})/); return m ? m[0].split(':').reduce((acc,time) => (60 * acc) + +time) : 0; }

    function openPlayer(id) {
        currentVideo = combinedVideos.find(item => item.id === id);
        document.getElementById('modal-iframe').src = currentVideo.link;
        document.getElementById('modal-title').innerText = currentVideo.title;
        document.getElementById('videoModal').style.display = 'block';
        document.getElementById('btn-goto-analyse').onclick = () => location.href=`analyze.html?id=${id}&type=${currentVideo.type}`;
        
        if(commentUnsubscribe) commentUnsubscribe();
        commentUnsubscribe = db.collection("comments").where("videoId", "==", id).onSnapshot(snap => {
            const display = document.getElementById('modal-comment-display'); display.innerHTML = "";
            snap.forEach(doc => {
                const c = doc.data();
                const isRead = (c.readBy || []).includes(currentUser.nr);
                const formatted = c.text.replace(/(\d{1,2}:\d{2}:\d{2})/g, '<span class="timestamp" onclick="jumpTo(\'$1\')">$1</span>').replace(/(@\d+ \| [^*]+|@\d+)\*/g, '<span class="mention">$1</span>');
                display.innerHTML += `<div class="mini-comment ${isRead ? 'is-read' : ''}"><small>${c.author} ${(c.mentions||[]).includes(currentUser.nr)?`<button class="hub-check-btn" onclick="markRead('${doc.id}', ${isRead})">${isRead?'↺':'✓'}</button>`:''}</small><div>${formatted}</div></div>`;
            });
        });
    }

    async function markRead(cid, isRead) {
        const ref = db.collection("comments").doc(cid);
        if(isRead) await ref.update({ readBy: firebase.firestore.FieldValue.arrayRemove(currentUser.nr) });
        else await ref.update({ readBy: firebase.firestore.FieldValue.arrayUnion(currentUser.nr) });
    }

    function jumpTo(ts) { if(currentVideo.type === 'youtube') document.getElementById('modal-iframe').src = `https://www.youtube.com/embed/${currentVideo.ytId}?start=${getSec(ts)}&autoplay=1`; }
    function closePlayer() { document.getElementById('videoModal').style.display='none'; document.getElementById('modal-iframe').src=''; }
    function logout() { localStorage.removeItem('falcons_user'); location.reload(); }
    function filterVideos(t, v) {
        document.getElementById('lobby-view').style.display='none'; document.getElementById('video-list-view').style.display='grid'; document.getElementById('back-btn').style.display='block';
        const grid = document.getElementById('video-list-view'); grid.innerHTML = "";
        combinedVideos.filter(x => t==='cat' ? x.category === v : (x.position === v || x.position === 'Alle')).forEach(x => grid.innerHTML += createVideoCard(x));
    }
    window.onload = startHub;
</script>
</body>
</html>
