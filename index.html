<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Hub | Video Analyse</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --card: #1a1a1a; }
        body { font-family: 'Montserrat'; background: var(--bg); color: white; margin: 0; }
        
        header { 
            background: #000; padding: 15px 25px; border-bottom: 4px solid var(--red); 
            display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 100;
        }
        .header-right { display: flex; align-items: center; gap: 15px; }
        
        #admin-link { background: var(--red); color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; display: none; font-size: 0.75rem; }
        .logout-btn { background: transparent; border: 1px solid #555; color: #888; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .logout-btn:hover { color: white; border-color: white; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align:center; }
        #login-overlay input { padding: 15px; font-size: 1.5rem; width: 120px; text-align: center; border-radius: 10px; border: 2px solid var(--red); background: #222; color: white; margin-top: 20px; }

        .section-title { color: var(--red); text-transform: uppercase; margin-top: 40px; border-left: 4px solid var(--red); padding-left: 15px; font-size: 1.2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 15px; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; cursor: pointer; border: 1px solid #333; transition: 0.3s; text-align: center; }
        .card:hover { border-color: var(--red); transform: translateY(-5px); background: #222; }
        .card h3 { margin: 0; text-transform: uppercase; font-size: 1rem; }

        .video-list-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .v-card { background: var(--card); border-radius: 10px; padding: 20px; cursor: pointer; border-left: 5px solid var(--red); }
        .v-card h3 { margin: 10px 0 0 0; font-size: 1rem; }
        .v-card small { color: var(--red); font-weight: bold; text-transform: uppercase; font-size: 0.7rem; }
        
        .back-btn { background: none; border: 1px solid white; color: white; padding: 10px 20px; cursor: pointer; display: none; margin-bottom: 20px; font-family: 'Montserrat'; font-weight: bold; }

        /* MODAL PLAYER MIT KOMMENTAREN */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { 
            max-width: 1100px; width: 95%; margin: 20px auto; background: #111; 
            border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; 
            box-shadow: 0 0 30px rgba(0,0,0,1); border: 1px solid #333;
        }
        .modal-main { display: flex; flex-wrap: wrap; }
        
        .video-side { flex: 2; min-width: 300px; background: #000; position: relative; padding-bottom: 37%; height: 0; } /* 16:9 Verhältnis angepasst */
        .video-side iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border:none; }

        .comment-side { flex: 1; min-width: 300px; background: #1a1a1a; display: flex; flex-direction: column; max-height: 500px; }
        .comment-side h4 { padding: 15px; margin: 0; background: #000; border-bottom: 2px solid var(--red); font-size: 0.8rem; text-transform: uppercase; }
        
        .modal-comment-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .mini-comment { background: #252525; padding: 10px; border-radius: 5px; border-left: 3px solid var(--red); font-size: 0.85rem; }
        .mini-comment small { color: var(--red); font-weight: bold; font-size: 0.65rem; display: block; margin-bottom: 3px; }
        .mention { color: #5dade2; font-weight: bold; }

        .modal-footer { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #000; border-top: 1px solid #333; }
        .btn-analyse { background: var(--red); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: 900; text-transform: uppercase; }
        .btn-close-modal { color: white; font-size: 35px; cursor: pointer; margin-left: 20px; font-weight: bold; }

        @media (max-width: 800px) { .video-side { padding-bottom: 56.25%; } .modal-content { margin: 10px auto; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <h1 style="font-size: 3rem; margin:0;">FRANKFURT <span style="color:var(--red);">FALCONS</span></h1>
    <p>TRIKOTNUMMER EINGEBEN</p>
    <input type="number" id="login-nr" oninput="checkLogin()">
</div>

<header>
    <div class="logo" style="font-weight:900; letter-spacing:2px; cursor:pointer;" onclick="location.reload()">FALCONS <span style="color:var(--red);">HUB</span></div>
    <div class="header-right">
        <span id="user-display" style="font-size: 0.8rem; color: #ccc;"></span>
        <a href="admin.html" id="admin-link">ADMIN PANEL</a>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>
</header>

<div class="container" id="hub-content" style="display:none;">
    <button id="back-btn" class="back-btn" onclick="location.reload()">← ZURÜCK</button>

    <div id="lobby">
        <h2 class="section-title">Für dich markiert</h2>
        <div id="personal-grid" class="grid"></div>

        <h2 class="section-title">Spielsituation (Ordner)</h2>
        <div class="grid">
            <div class="card" onclick="filterVideos('cat', 'Offense')"><h3>Offense</h3></div>
            <div class="card" onclick="filterVideos('cat', 'Defense')"><h3>Defense</h3></div>
            <div class="card" onclick="filterVideos('cat', 'Powerplay')"><h3>Powerplay</h3></div>
            <div class="card" onclick="filterVideos('cat', 'Penalty Kill')"><h3>Penalty Kill</h3></div>
            <div class="card" onclick="filterVideos('cat', 'Setplays')"><h3>Setplays</h3></div>
        </div>

        <h2 class="section-title">Positionen (Zuweisung)</h2>
        <div class="grid">
            <div class="card" onclick="filterVideos('pos', 'Angriff')"><h3>Angriff</h3></div>
            <div class="card" onclick="filterVideos('pos', 'Center')"><h3>Center</h3></div>
            <div class="card" onclick="filterVideos('pos', 'Verteidigung')"><h3>Verteidigung</h3></div>
            <div class="card" onclick="filterVideos('pos', 'Goalie')"><h3>Goalie</h3></div>
        </div>
    </div>

    <div id="video-grid" class="video-list-grid"></div>
</div>

<!-- MODAL MIT KOMMENTAREN -->
<div id="videoModal" class="modal" onclick="closePlayer()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-main">
            <div class="video-side">
                <iframe id="modal-iframe" src="" allowfullscreen></iframe>
            </div>
            <div class="comment-side">
                <h4>Feedback & Analyse</h4>
                <div class="modal-comment-list" id="modal-comment-display">
                    <!-- Kommentare laden hier -->
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <h3 id="modal-title" style="margin:0; font-size:0.9rem;">Video</h3>
            <div style="display:flex; align-items:center;">
                <button class="btn-analyse" id="btn-goto-analyse">ZUR ANALYSE</button>
                <span class="btn-close-modal" onclick="closePlayer()">&times;</span>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = null;
    let driveVideos = [];
    let commentUnsubscribe = null; // Um den Listener zu stoppen

    async function checkLogin() {
        const nr = document.getElementById('login-nr').value;
        if(!nr) return;
        const doc = await db.collection("players").doc(nr).get();
        if(doc.exists) {
            currentUser = doc.data();
            localStorage.setItem('falcons_user', JSON.stringify(currentUser));
            startHub();
        }
    }

    async function startHub() {
        const saved = localStorage.getItem('falcons_user');
        if(!saved) return;
        currentUser = JSON.parse(saved);
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('hub-content').style.display = 'block';
        document.getElementById('user-display').innerText = `${currentUser.name} (#${currentUser.nr})`;

        const adminDoc = await db.collection("admins").doc(currentUser.nr).get();
        if(currentUser.nr === "22" || adminDoc.exists) {
            document.getElementById('admin-link').style.display = 'block';
        }
        loadData();
    }

    function logout() { localStorage.removeItem('falcons_user'); location.reload(); }

    async function loadData() {
        const res = await fetch('https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec');
        driveVideos = await res.json();
        
        const mSnap = await db.collection("comments").where("mentions", "array-contains", currentUser.nr).get();
        const pGrid = document.getElementById('personal-grid');
        pGrid.innerHTML = mSnap.empty ? "<p style='color:#666;'>Keine Markierungen.</p>" : "";
        
        mSnap.forEach(doc => {
            const c = doc.data();
            const v = driveVideos.find(item => item.link.includes(c.videoId));
            if(v) {
                const fileId = v.link.split('/d/')[1].split('/')[0];
                pGrid.innerHTML += `<div class="v-card" onclick="openNormalPlayer('${fileId}', '${v.title}')">
                    <small>ERWÄHNUNG</small><h3>${v.title}</h3>
                </div>`;
            }
        });
    }

    // MODAL FUNKTIONEN (Normaler Player)
    function openNormalPlayer(id, title) {
        document.getElementById('modal-iframe').src = `https://drive.google.com/file/d/${id}/preview`;
        document.getElementById('modal-title').innerText = title;
        document.getElementById('videoModal').style.display = 'block';
        document.getElementById('btn-goto-analyse').onclick = () => window.location.href=`analyze.html?id=${id}`;
        
        // Kommentare für dieses Video laden
        listenForComments(id);
    }

    function listenForComments(videoId) {
        // Falls bereits ein Listener läuft, stoppen
        if(commentUnsubscribe) commentUnsubscribe();

        commentUnsubscribe = db.collection("comments")
            .where("videoId", "==", videoId)
            .orderBy("createdAt", "asc")
            .onSnapshot((snapshot) => {
                const display = document.getElementById('modal-comment-display');
                display.innerHTML = snapshot.empty ? "<p style='color:#555; font-size:0.8rem; padding:10px;'>Kein Feedback zu diesem Clip vorhanden.</p>" : "";
                
                snapshot.forEach(doc => {
                    const c = doc.data();
                    const formattedText = c.text.replace(/(@\d+ \([^)]+\)|@\d+)/g, '<span class="mention">$1</span>');
                    
                    const div = document.createElement('div');
                    div.className = "mini-comment";
                    div.innerHTML = `
                        <small>${c.author} (#${c.authorNr})</small>
                        <div>${formattedText}</div>
                    `;
                    display.appendChild(div);
                });
                display.scrollTop = display.scrollHeight;
            });
    }

    function closePlayer() {
        document.getElementById('videoModal').style.display = 'none';
        document.getElementById('modal-iframe').src = '';
        if(commentUnsubscribe) commentUnsubscribe(); // Stop Firebase Listener
    }

    async function filterVideos(type, value) {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('video-grid').style.display = 'grid';
        document.getElementById('back-btn').style.display = 'block';
        
        const grid = document.getElementById('video-grid');
        grid.innerHTML = "Lade Clips...";

        const metaSnap = await db.collection("video_metadata").get();
        let meta = {}; metaSnap.forEach(d => meta[d.id] = d.data().position);

        const filtered = driveVideos.filter(v => {
            const fileId = v.link.split('/d/')[1].split('/')[0];
            if(type === 'cat') return v.category.toLowerCase().trim() === value.toLowerCase().trim();
            else return meta[fileId] === value || meta[fileId] === 'Alle';
        });

        grid.innerHTML = filtered.length ? "" : "<p>Keine Videos gefunden.</p>";
        filtered.forEach(v => {
            const fileId = v.link.split('/d/')[1].split('/')[0];
            grid.innerHTML += `<div class="v-card" onclick="openNormalPlayer('${fileId}', '${v.title}')">
                <small>${v.category}</small><h3>${v.title}</h3>
            </div>`;
        });
    }

    startHub();
</script>
</body>
</html>
