<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frankfurt Falcons | Video Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs (Compatibility Mode) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        :root { --red: #e30613; --black: #0d0d0d; --gray: #1a1a1a; --card: #252525; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: white; margin: 0; }
        
        header { background: #000; padding: 25px; text-align: center; border-bottom: 4px solid var(--red); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 2rem; font-weight: 900; cursor: pointer; }
        .logo span { color: var(--red); }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px; }

        /* Admin & Upload */
        .admin-section { background: var(--gray); border: 2px dashed #444; border-radius: 12px; padding: 20px; margin-bottom: 40px; }
        .admin-section h3 { margin-top: 0; color: var(--red); }
        .form-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        input, select, button.upload-btn { padding: 12px; border-radius: 6px; border: none; font-family: 'Montserrat'; }
        input, select { background: #333; color: white; flex: 1; min-width: 200px; }
        .upload-btn { background: var(--red); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .upload-btn:hover { background: #ff1a1a; }
        
        #progress-container { width: 100%; background: #000; height: 10px; margin-top: 15px; border-radius: 10px; display: none; }
        #progress-bar { height: 100%; background: var(--red); width: 0%; border-radius: 10px; transition: 0.2s; }

        /* Lobby & Grid */
        .lobby { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .cat-card { 
            background: var(--card); height: 180px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; cursor: pointer; border-bottom: 5px solid var(--red); transition: 0.3s;
        }
        .cat-card:hover { transform: translateY(-5px); background: #333; }
        .cat-card h2 { text-transform: uppercase; letter-spacing: 1px; }

        .video-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .video-card { background: var(--card); border-radius: 10px; padding: 20px; cursor: pointer; transition: 0.2s; border-left: 5px solid var(--red); }
        .video-card:hover { background: #333; transform: scale(1.02); }
        .video-card small { color: var(--red); font-weight: bold; text-transform: uppercase; }

        /* Navigation */
        .nav-back { display: none; margin-bottom: 20px; cursor: pointer; color: #888; font-weight: bold; }
        .nav-back:hover { color: white; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; }
        .modal-content { max-width: 900px; margin: 40px auto; padding: 20px; position: relative; }
        video { width: 100%; border: 2px solid var(--red); box-shadow: 0 0 30px rgba(227, 6, 19, 0.4); }
        .close { position: absolute; right: 0; top: -10px; font-size: 40px; cursor: pointer; color: white; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="showLobby()">FRANKFURT <span>FALCONS</span></div>
</header>

<div class="container">
    
    <!-- Admin Upload Bereich -->
    <div class="admin-section">
        <h3>Neues Video hinzufügen</h3>
        <div class="form-group">
            <input type="text" id="v-title" placeholder="Titel des Videos (z.B. Tor PP vs Kassel)">
            <select id="v-category">
                <option value="Offense">Offense</option>
                <option value="Defense">Defense</option>
                <option value="Powerplay">Powerplay</option>
                <option value="Penalty Kill">Penalty Kill</option>
                <option value="Setplays">Setplays</option>
            </select>
            <input type="file" id="v-file" accept="video/mp4">
            <button class="upload-btn" onclick="uploadVideo()">VIDEO HOCHLADEN</button>
        </div>
        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div class="nav-back" id="back-btn" onclick="showLobby()">← ZURÜCK ZUR ÜBERSICHT</div>
    <h1 id="view-title">Analyse Übersicht</h1>

    <!-- Startseite: Kategorien -->
    <div id="lobby" class="lobby">
        <div class="cat-card" onclick="loadCategory('Offense')"><h2>Offense</h2></div>
        <div class="cat-card" onclick="loadCategory('Defense')"><h2>Defense</h2></div>
        <div class="cat-card" onclick="loadCategory('Powerplay')"><h2>Powerplay</h2></div>
        <div class="cat-card" onclick="loadCategory('Penalty Kill')"><h2>Penalty Kill</h2></div>
        <div class="cat-card" onclick="loadCategory('Setplays')"><h2>Setplays</h2></div>
    </div>

    <!-- Video Liste -->
    <div id="video-grid" class="video-grid"></div>

</div>

<!-- Player Modal -->
<div id="modal" class="modal" onclick="closePlayer()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="closePlayer()">&times;</span>
        <video id="main-player" controls controlsList="nodownload"></video>
        <h2 id="modal-title" style="margin-top:20px;"></h2>
    </div>
</div>

<script>
    // Deine Firebase Konfiguration
    const firebaseConfig = {
        apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU",
        authDomain: "falcons-video-tool.firebaseapp.com",
        projectId: "falcons-video-tool",
        storageBucket: "falcons-video-tool.firebasestorage.app",
        messagingSenderId: "306689889088",
        appId: "1:306689889088:web:ad525fecd0682069c6e0a5"
    };

    // Firebase initialisieren
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    // VIDEO HOCHLADEN
    async function uploadVideo() {
        const file = document.getElementById('v-file').files[0];
        const title = document.getElementById('v-title').value;
        const category = document.getElementById('v-category').value;

        if (!file || !title) return alert("Bitte Titel eingeben und Datei auswählen!");

        const storageRef = storage.ref(`videos/${Date.now()}_${file.name}`);
        const uploadTask = storageRef.put(file);

        document.getElementById('progress-container').style.display = 'block';

        uploadTask.on('state_changed', 
            (snapshot) => {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                document.getElementById('progress-bar').style.width = progress + '%';
            }, 
            (error) => { alert("Fehler: " + error.message); }, 
            async () => {
                const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
                await db.collection("videos").add({
                    title: title,
                    category: category,
                    url: downloadURL,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Erfolgreich hochgeladen!");
                location.reload();
            }
        );
    }

    // VIDEOS AUS KATEGORIE LADEN
    async function loadCategory(cat) {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('video-grid').style.display = 'grid';
        document.getElementById('back-btn').style.display = 'block';
        document.getElementById('view-title').innerText = cat;

        const grid = document.getElementById('video-grid');
        grid.innerHTML = "Lade Videos...";

        const snapshot = await db.collection("videos")
            .where("category", "==", cat)
            .orderBy("timestamp", "desc")
            .get();

        grid.innerHTML = "";
        if (snapshot.empty) grid.innerHTML = "<p>Noch keine Videos in dieser Kategorie.</p>";

        snapshot.forEach(doc => {
            const video = doc.data();
            const card = document.createElement('div');
            card.className = 'video-card';
            card.onclick = () => openPlayer(video.url, video.title);
            card.innerHTML = `
                <small>${video.category}</small>
                <h3>${video.title}</h3>
                <p>▶ Abspielen</p>
            `;
            grid.appendChild(card);
        });
    }

    function showLobby() {
        document.getElementById('lobby').style.display = 'grid';
        document.getElementById('video-grid').style.display = 'none';
        document.getElementById('back-btn').style.display = 'none';
        document.getElementById('view-title').innerText = "Analyse Übersicht";
    }

    function openPlayer(url, title) {
        const modal = document.getElementById('modal');
        const player = document.getElementById('main-player');
        player.src = url;
        document.getElementById('modal-title').innerText = title;
        modal.style.display = "block";
        player.play();
    }

    function closePlayer() {
        const modal = document.getElementById('modal');
        const player = document.getElementById('main-player');
        player.pause();
        player.src = "";
        modal.style.display = "none";
    }
</script>

</body>
</html>
