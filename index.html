<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Falcons Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --bg: #0d0d0d; --card: #1a1a1a; }
        body { font-family: 'Montserrat'; background: var(--bg); color: white; margin: 0; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 4px solid var(--red); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Login Overlay */
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #login-overlay input { padding: 15px; font-size: 1.5rem; width: 100px; text-align: center; border-radius: 10px; border: 2px solid var(--red); background: #222; color: white; }
        
        .section-title { color: var(--red); text-transform: uppercase; margin-top: 40px; border-left: 4px solid var(--red); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; cursor: pointer; border: 1px solid #333; }
        .card:hover { border-color: var(--red); transform: translateY(-5px); transition: 0.3s; }
        
        .mention-badge { background: var(--red); color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h1 style="margin-bottom:10px;">FRANKFURT <span>FALCONS</span></h1>
    <p>Bitte gib deine Trikotnummer ein:</p>
    <input type="number" id="login-nr" oninput="checkLogin()">
</div>

<header><div class="logo">FALCONS <span>VIDEO HUB</span></div></header>

<div class="container" id="hub-content" style="display:none;">
    <h2 id="welcome-msg">Willkommen</h2>
    
    <h2 class="section-title">Für dich markiert</h2>
    <div id="personal-grid" class="grid"></div>

    <h2 class="section-title">Kategorien</h2>
    <div class="grid" id="cat-grid">
        <div class="card" onclick="openCat('Offense')"><h3>Offense</h3></div>
        <div class="card" onclick="openCat('Defense')"><h3>Defense</h3></div>
        <div class="card" onclick="openCat('Powerplay')"><h3>Powerplay</h3></div>
        <div class="card" onclick="openCat('Penalty Kill')"><h3>Penalty Kill</h3></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU", authDomain: "falcons-video-tool.firebaseapp.com", projectId: "falcons-video-tool", storageBucket: "falcons-video-tool.firebasestorage.app", messagingSenderId: "306689889088", appId: "1:306689889088:web:ad525fecd0682069c6e0a5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = null;

    async function checkLogin() {
        const nr = document.getElementById('login-nr').value;
        if(nr.length < 1) return;
        
        const doc = await db.collection("players").doc(nr).get();
        if(doc.exists) {
            currentUser = doc.data();
            localStorage.setItem('falcons_user', JSON.stringify(currentUser));
            startHub();
        }
    }

    function startHub() {
        if(!currentUser) {
            const saved = localStorage.getItem('falcons_user');
            if(saved) currentUser = JSON.parse(saved);
            else return;
        }
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('hub-content').style.display = 'block';
        document.getElementById('welcome-msg').innerText = `Servus, ${currentUser.name} (#${currentUser.nr})`;
        loadPersonalClips();
    }

    async function loadPersonalClips() {
        // Suche nach Kommentaren mit @Nummer
        const snap = await db.collection("comments").where("mentions", "array-contains", currentUser.nr).get();
        const personalGrid = document.getElementById('personal-grid');
        
        // Hole alle Video-Infos von Drive
        const driveRes = await fetch('https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec');
        const driveData = await driveRes.json();

        snap.forEach(doc => {
            const c = doc.data();
            const v = driveData.find(item => item.link.includes(c.videoId));
            if(v) {
                personalGrid.innerHTML += `
                    <div class="card" onclick="location.href='analyze.html?id=${c.videoId}'">
                        <span class="mention-badge">ERWÄHNUNG</span>
                        <h3>${v.title}</h3>
                        <p style="font-size:0.8rem; color:#888;">"${c.text}"</p>
                    </div>`;
            }
        });
    }

    function openCat(cat) { location.href = `index.html?cat=${cat}`; } // Hier Logik für Filter einbauen
    window.onload = startHub;
</script>
</body>
</html>
