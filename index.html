<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frankfurt Falcons | Video Analyse Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* DESIGN-SYSTEM */
        :root { 
            --red: #e30613; 
            --black: #000000; 
            --dark: #121212; 
            --gray: #1e1e1e;
            --light-gray: #2d2d2d;
        }
        
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        header { 
            background: var(--black); padding: 20px; text-align: center; 
            border-bottom: 4px solid var(--red); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; }
        .logo span { color: var(--red); }

        .container { padding: 30px; max-width: 1200px; margin: 0 auto; min-height: 80vh; }
        
        /* STATUS & LOADER */
        #status { text-align: center; padding: 50px; color: #888; font-size: 1.2rem; }
        .loader { 
            border: 4px solid #333; border-top: 4px solid var(--red); border-radius: 50%; 
            width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* LOBBY: KATEGORIE-KACHELN */
        .category-lobby { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; margin-top: 20px;
        }
        .cat-card {
            background: var(--gray); height: 180px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; cursor: pointer; border-bottom: 5px solid var(--red); transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .cat-card:hover { transform: translateY(-5px); background: var(--light-gray); border-color: white; }
        .cat-card h2 { font-size: 1.5rem; text-transform: uppercase; z-index: 2; pointer-events: none; }

        /* VIDEO GRID */
        .video-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; display: none;
        }
        .video-card { 
            background: var(--gray); border-radius: 10px; padding: 20px; 
            cursor: pointer; border-left: 5px solid var(--red); transition: 0.2s;
        }
        .video-card:hover { background: var(--light-gray); transform: translateX(5px); }
        .video-card h3 { margin: 0; font-size: 1.1rem; line-height: 1.3; }
        .play-hint { margin-top: 15px; color: var(--red); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        
        .back-btn { 
            display: none; margin-bottom: 20px; background: none; border: 1px solid white; 
            color: white; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold;
        }
        .back-btn:hover { background: white; color: black; }

        /* MODAL PLAYER */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-body { width: 95%; max-width: 1000px; margin: 40px auto; position: relative; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border: 2px solid var(--red); background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .close { color: white; font-size: 40px; position: absolute; right: 0; top: -55px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="showLobby()">FRANKFURT <span>FALCONS</span></div>
</header>

<div class="container">
    <button class="back-btn" id="back-btn" onclick="showLobby()">← ZURÜCK ZUR ÜBERSICHT</button>
    <h1 id="view-title" style="text-transform: uppercase; margin-bottom: 30px;">Analyse Übersicht</h1>
    
    <div id="status">
        Verbindung zu Google Drive wird hergestellt...
        <div class="loader"></div>
    </div>

    <!-- Lobby -->
    <div id="lobby" class="category-lobby" style="display:none;">
        <div class="cat-card" onclick="filterContent('Offense')"><h2>Offense</h2></div>
        <div class="cat-card" onclick="filterContent('Defense')"><h2>Defense</h2></div>
        <div class="cat-card" onclick="filterContent('Powerplay')"><h2>Powerplay</h2></div>
        <div class="cat-card" onclick="filterContent('Penalty Kill')"><h2>Penalty Kill</h2></div>
        <div class="cat-card" onclick="filterContent('Setplays')"><h2>Setplays</h2></div>
    </div>

    <!-- Video Grid -->
    <div id="video-grid" class="video-grid"></div>
</div>

<div id="modal" class="modal" onclick="closePlayer()">
    <div class="modal-body" onclick="event.stopPropagation()">
        <span class="close" onclick="closePlayer()">&times;</span>
        <div class="video-wrapper">
            <iframe id="player" src="" frameborder="0" allowfullscreen></iframe>
        </div>
        <h2 id="modal-title" style="margin-top: 20px; font-size: 1.4rem;"></h2>
    </div>
</div>

<script>
    // DEINE LIVE-SCHNITTSTELLE
    const API_URL = 'https://script.google.com/macros/s/AKfycbwQp7jJO8U-kj6HCKX-PvzNKGydl-_MDF0qcqEPIht4boBNGFvsVDoGpgpKufmKdlry/exec';

    let videoData = [];

    async function init() {
        try {
            // Fetch die Daten von der Google Web App
            const response = await fetch(API_URL);
            videoData = await response.json();
            
            if(videoData.error) {
                document.getElementById('status').innerText = "Drive Fehler: " + videoData.error;
            } else {
                document.getElementById('status').style.display = 'none';
                document.getElementById('lobby').style.display = 'grid';
            }
        } catch (e) {
            console.error(e);
            document.getElementById('status').innerText = "Verbindung zum Google Server fehlgeschlagen.";
        }
    }

    function renderVideos(list) {
        const grid = document.getElementById('video-grid');
        grid.innerHTML = '';
        
        if(list.length === 0) {
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #666; padding: 40px;">Noch keine Videos in diesem Ordner hochgeladen.</p>';
        }

        list.forEach(video => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.onclick = () => openPlayer(video);
            card.innerHTML = `
                <div style="color: var(--red); font-size: 0.7rem; font-weight: 900; margin-bottom: 8px; text-transform: uppercase;">${video.category}</div>
                <h3>${video.title}</h3>
                <div class="play-hint">▶ Video ansehen</div>
            `;
            grid.appendChild(card);
        });
    }

    function filterContent(category) {
        // UI umschalten
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('video-grid').style.display = 'grid';
        document.getElementById('back-btn').style.display = 'block';
        document.getElementById('view-title').innerText = category;

        // Daten filtern (Groß/Kleinschreibung ignorieren)
        const filtered = videoData.filter(v => v.category.toLowerCase().trim() === category.toLowerCase().trim());
        renderVideos(filtered);
        window.scrollTo(0,0);
    }

    function showLobby() {
        document.getElementById('lobby').style.display = 'grid';
        document.getElementById('video-grid').style.display = 'none';
        document.getElementById('back-btn').style.display = 'none';
        document.getElementById('view-title').innerText = 'Analyse Übersicht';
    }

    function openPlayer(video) {
        document.getElementById('player').src = video.link;
        document.getElementById('modal-title').innerText = video.title;
        document.getElementById('modal').style.display = 'block';
    }

    function closePlayer() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('player').src = '';
    }

    // Start
    init();
</script>

</body>
</html>
