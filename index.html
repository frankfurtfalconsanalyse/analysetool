<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Falcons Hub | Pro Analyse</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #e30613; --black: #000; --dark: #121212; --gray: #1e1e1e; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; margin: 0; }
        header { background: var(--black); padding: 20px; text-align: center; border-bottom: 4px solid var(--red); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.8rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .logo span { color: var(--red); }
        .container { padding: 30px; max-width: 1200px; margin: 0 auto; }
        
        .nav-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; padding: 10px 20px; border: 1px solid var(--red); border-radius: 5px; }
        .nav-links a:hover { background: var(--red); }

        .section-title { text-transform: uppercase; border-left: 4px solid var(--red); padding-left: 15px; margin: 40px 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--gray); padding: 20px; border-radius: 10px; cursor: pointer; border-bottom: 4px solid transparent; transition: 0.3s; }
        .card:hover { border-color: var(--red); transform: translateY(-5px); }
        .card.homework { border-left: 10px solid orange; }
        .card small { color: var(--red); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<header><div class="logo" onclick="location.reload()">FRANKFURT <span>FALCONS</span></div></header>

<div class="container">
    <div class="nav-links">
        <a href="tactic.html">📋 Taktik-Board</a>
        <a href="admin.html">⚙️ Admin Panel</a>
    </div>

    <h2 class="section-title">Meine Hausaufgaben / Markierungen</h2>
    <div id="homework-grid" class="grid">
        <!-- Videos mit Mentions oder Homework-Flag -->
    </div>

    <h2 class="section-title">Alle Analysen</h2>
    <div class="nav-links" style="border:none; justify-content: flex-start;">
        <button onclick="loadAll('Offense')" class="f-btn">Offense</button>
        <button onclick="loadAll('Defense')" class="f-btn">Defense</button>
        <button onclick="loadAll('Goalie')" class="f-btn">Goalies</button>
    </div>
    <div id="main-grid" class="grid" style="margin-top:20px;"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBeH17b81pzmeS0NzdkG8QwwusfH1EyHzU",
        authDomain: "falcons-video-tool.firebaseapp.com",
        projectId: "falcons-video-tool",
        storageBucket: "falcons-video-tool.firebasestorage.app",
        messagingSenderId: "306689889088",
        appId: "1:306689889088:web:ad525fecd0682069c6e0a5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadHub() {
        const snap = await db.collection("videos").orderBy("createdAt", "desc").get();
        const mainGrid = document.getElementById('main-grid');
        const hwGrid = document.getElementById('homework-grid');
        
        snap.forEach(doc => {
            const v = doc.data();
            const card = `
                <div class="card ${v.homework?'homework':''}" onclick="window.location.href='analyze.html?id=${doc.id}'">
                    <small>${v.category} | ${v.position}</small>
                    <h3>${v.title}</h3>
                    ${v.homework ? '<p style="color:orange; font-size:0.8rem;">⚠️ HAUSAUFGABE</p>' : ''}
                </div>`;
            
            if(v.homework) hwGrid.innerHTML += card;
            mainGrid.innerHTML += card;
        });
    }
    loadHub();
</script>
</body>
</html>
